<!-- HALL OF DRAFT -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@300;400;500;600;700&family=Bebas+Neue&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

#hod-root {
  --bg:#0a0a0f;
  --panel:#15151f;
  --gold:#ffb627;
  --gold-deep:#e89200;
  --red:#e63946;
  --green:#2ec4b6;
  --ink:#f4f4f8;
  --muted:#8b8b9e;
  --line:#26263a;
  font-family:'Oswald',sans-serif;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,182,39,0.08), transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(46,196,182,0.06), transparent 60%),
    var(--bg);
  color:var(--ink);
  min-height:100vh;
  padding:24px 16px 60px;
  position:relative;
  overflow-x:hidden;
}
#hod-root::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:repeating-linear-gradient(0deg,rgba(255,255,255,0.015) 0 1px,transparent 1px 3px);
}
.hod-wrap{max-width:760px;margin:0 auto;position:relative;z-index:1;}

.hod-header{text-align:center;margin-bottom:18px;}
.hod-title{
  font-family:'Anton',sans-serif;font-size:clamp(38px,9vw,68px);line-height:0.9;
  letter-spacing:1px;text-transform:uppercase;
  background:linear-gradient(180deg,#fff 0%,var(--gold) 60%,var(--gold-deep) 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 4px 0 rgba(0,0,0,0.4));
}
.hod-sub{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:6px;}

.hod-progress{display:flex;align-items:center;justify-content:center;gap:6px;margin:16px 0 8px;flex-wrap:wrap;}
.hod-dot{width:9px;height:9px;border-radius:50%;background:var(--line);transition:.3s;}
.hod-dot.filled{background:var(--gold);box-shadow:0 0 8px var(--gold);}
.hod-counter{font-family:'Bebas Neue';font-size:20px;letter-spacing:1px;color:var(--gold);margin-left:6px;}

/* Slot machine */
.hod-slot-stage{text-align:center;padding:10px 0 4px;}
.hod-stage-label{font-size:14px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.hod-reels{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
.hod-reel{
  width:130px;height:110px;background:linear-gradient(180deg,#1c1c2a,#0e0e16);
  border:2px solid var(--line);border-radius:14px;overflow:hidden;position:relative;
  box-shadow:inset 0 0 30px rgba(0,0,0,0.6), 0 6px 20px rgba(0,0,0,0.4);
}
.hod-reel::before,.hod-reel::after{content:"";position:absolute;left:0;right:0;height:30px;z-index:3;pointer-events:none;}
.hod-reel::before{top:0;background:linear-gradient(180deg,#0e0e16,transparent);}
.hod-reel::after{bottom:0;background:linear-gradient(0deg,#0e0e16,transparent);}
.hod-reel-strip{position:absolute;left:0;right:0;top:0;display:flex;flex-direction:column;}
.hod-reel-item{height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.hod-reel-year{font-family:'Anton';font-size:34px;color:var(--gold);line-height:1;}
.hod-reel-era{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:4px;}
.hod-reel.spinning .hod-reel-strip{animation:hod-spin .3s linear infinite;}
@keyframes hod-spin{from{transform:translateY(0)}to{transform:translateY(-110px)}}
.hod-reel.locked{border-color:var(--gold);box-shadow:0 0 18px rgba(255,182,39,.4),inset 0 0 30px rgba(0,0,0,0.6);}

.hod-btn{
  font-family:'Bebas Neue';font-size:24px;letter-spacing:2px;
  background:linear-gradient(180deg,var(--gold),var(--gold-deep));
  color:#1a1200;border:none;padding:14px 40px;border-radius:50px;cursor:pointer;
  box-shadow:0 5px 0 #9c6400, 0 8px 20px rgba(0,0,0,.4);transition:.1s;text-transform:uppercase;
}
.hod-btn:active{transform:translateY(4px);box-shadow:0 1px 0 #9c6400,0 4px 12px rgba(0,0,0,.4);}
.hod-btn:disabled{opacity:.4;cursor:not-allowed;}
.hod-btn.secondary{background:transparent;color:var(--muted);border:1px solid var(--line);box-shadow:none;font-size:16px;padding:8px 22px;}
.hod-btn.secondary:active{transform:none;}

.hod-season-choices{display:flex;flex-direction:column;gap:10px;margin:8px 0 20px;}
.hod-season-card{
  background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:.15s;
}
.hod-season-card:hover{border-color:var(--gold);transform:translateX(4px);}
.hod-season-yr{font-family:'Anton';font-size:30px;color:var(--ink);}
.hod-season-fact{font-size:11.5px;color:var(--gold-deep);line-height:1.35;margin-top:4px;font-style:italic;}
.hod-season-meta{text-align:right;font-size:12px;color:var(--muted);letter-spacing:1px;flex:none;margin-left:10px;}

/* Player offer cards */
.hod-offer-grid{display:grid;grid-template-columns:1fr;gap:10px;margin:6px 0 16px;}
.hod-pcard{
  background:linear-gradient(135deg,#1a1a28,#12121c);border:1px solid var(--line);border-radius:14px;
  padding:14px 16px;cursor:pointer;transition:.15s;position:relative;overflow:hidden;
  display:flex;align-items:center;gap:14px;
}
.hod-pcard:hover{border-color:var(--gold);transform:scale(1.015);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.hod-pcard.disabled{opacity:.3;pointer-events:none;filter:grayscale(1);}
.hod-pos-badge{
  font-family:'Bebas Neue';font-size:16px;letter-spacing:.5px;
  min-width:46px;width:auto;padding:0 8px;height:46px;flex:none;border-radius:10px;
  display:flex;align-items:center;justify-content:center;color:#0a0a0f;white-space:nowrap;
}
.hod-pos-PG{background:#4cc9f0;} .hod-pos-SG{background:#4895ef;}
.hod-pos-SF{background:#b5179e;} .hod-pos-PF{background:#f72585;} .hod-pos-C{background:#ff8500;}
.hod-pinfo{flex:1;min-width:0;}
.hod-pname{font-size:18px;font-weight:600;line-height:1.1;}
.hod-pseason{font-size:12px;color:var(--muted);letter-spacing:.5px;}
.hod-pstats{display:flex;gap:12px;margin-top:5px;font-size:12px;}
.hod-pstats b{font-family:'Bebas Neue';font-size:17px;color:var(--gold);display:block;line-height:1;}
.hod-pstats span{color:var(--muted);font-size:10px;letter-spacing:1px;}
.hod-prating{font-family:'Anton';font-size:30px;flex:none;}
.hod-r-elite{color:#ffd60a;text-shadow:0 0 12px rgba(255,214,10,.5);}
.hod-r-good{color:#2ec4b6;} .hod-r-mid{color:#90a4ae;} .hod-r-low{color:#607d8b;}

/* Roster */
.hod-roster{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;margin-top:8px;}
.hod-roster-title{font-family:'Bebas Neue';font-size:18px;letter-spacing:2px;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between;}
.hod-pos-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap;}
.hod-pos-tag{font-family:'Bebas Neue';font-size:13px;width:34px;color:var(--gold);}
.hod-chip{font-size:12px;background:#1f1f2e;border:1px solid var(--line);border-radius:20px;padding:3px 10px;}
.hod-chip.empty{color:var(--muted);font-style:italic;border-style:dashed;}

/* Result */
.hod-result{text-align:center;padding:10px 0;}
.hod-grade{font-family:'Anton';font-size:clamp(80px,22vw,150px);line-height:0.8;margin:6px 0;}
.hod-overall{font-family:'Bebas Neue';font-size:24px;letter-spacing:2px;color:var(--muted);}
.hod-verdict{font-size:15px;color:var(--ink);margin:12px auto;max-width:440px;line-height:1.5;}
.hod-final-roster{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:18px 0;text-align:left;}
.hod-final-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px;}
.hod-fc-top{display:flex;justify-content:space-between;align-items:baseline;}
.hod-fc-name{font-size:14px;font-weight:600;}
.hod-fc-rating{font-family:'Anton';font-size:20px;color:var(--gold);}
.hod-fc-meta{font-size:11px;color:var(--muted);}
.hod-bar{height:5px;background:var(--line);border-radius:3px;margin-top:6px;overflow:hidden;}
.hod-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold-deep),var(--gold));border-radius:3px;}

.hod-fade{animation:hod-fade .4s ease;}
.hod-chem-tag{font-family:'Bebas Neue';font-size:14px;letter-spacing:1px;
  border:1px solid var(--cc);color:var(--cc);border-radius:20px;padding:4px 12px;}
.hod-era-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:440px;margin:0 auto;}
.hod-era-chip{background:var(--panel);border:2px solid var(--line);border-radius:14px;
  padding:12px 18px;cursor:pointer;transition:.15s;min-width:96px;display:flex;
  flex-direction:column;align-items:center;gap:2px;}
.hod-era-chip:hover{border-color:var(--gold);transform:translateY(-2px);}
.hod-era-chip.on{border-color:var(--gold);background:linear-gradient(180deg,rgba(255,182,39,.18),rgba(255,182,39,.05));
  box-shadow:0 0 14px rgba(255,182,39,.25);}
.hod-era-name{font-family:'Anton';font-size:26px;color:var(--ink);line-height:1;}
.hod-era-chip.on .hod-era-name{color:var(--gold);}
.hod-era-count{font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
#hod-draft-frame{display:flex;flex-direction:column;}
.hod-mode-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:460px;margin:0 auto;}
.hod-mode-chip{background:var(--panel);border:2px solid var(--line);border-radius:12px;
  padding:9px 14px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:92px;}
.hod-mode-chip:hover{border-color:var(--gold);transform:translateY(-2px);}
.hod-mode-chip.on{border-color:var(--gold);background:linear-gradient(180deg,rgba(255,182,39,.18),rgba(255,182,39,.05));}
.hod-mode-name{font-family:'Bebas Neue';font-size:17px;letter-spacing:.5px;}
.hod-mode-chip.on .hod-mode-name{color:var(--gold);}
.hod-mode-sub{font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
.hod-pright{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex:none;}
.hod-price{font-family:'Bebas Neue';font-size:15px;letter-spacing:.5px;color:var(--gold);
  background:rgba(255,182,39,.12);border:1px solid rgba(255,182,39,.4);border-radius:8px;padding:1px 8px;}
.hod-after{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.3px;}
.hod-wild{border-color:var(--gold);background:linear-gradient(135deg,rgba(255,182,39,.12),rgba(255,182,39,.03));}
.hod-wild-badge{background:linear-gradient(135deg,#ffb627,#e63946,#b5179e);color:#fff;font-size:20px;
  animation:hod-wildpulse 1.5s ease-in-out infinite;}
@keyframes hod-wildpulse{0%,100%{box-shadow:0 0 0 rgba(255,182,39,.5)}50%{box-shadow:0 0 14px rgba(255,182,39,.7)}}
.hod-roles-wrap{display:flex;flex-direction:column;gap:8px;max-width:460px;margin:0 auto;text-align:left;}
.hod-role-block{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 10px;cursor:pointer;transition:.12s;}
.hod-role-block:hover{border-color:var(--gold);}
.hod-role-head{font-family:'Bebas Neue';font-size:15px;letter-spacing:1px;margin-bottom:6px;display:flex;justify-content:space-between;}
.hod-role-head span{color:var(--muted);font-size:12px;}
.hod-role-head.ok{color:var(--green);} .hod-role-head.warn{color:var(--gold-deep);}
.hod-role-list{display:flex;flex-wrap:wrap;gap:5px;}
.hod-role-chip{display:flex;align-items:center;gap:6px;background:#1f1f2e;border:1px solid var(--line);
  border-radius:8px;padding:4px 8px;cursor:pointer;transition:.12s;}
.hod-role-chip:hover{border-color:var(--gold);}
.hod-role-chip.sel{border-color:var(--gold);background:rgba(255,182,39,.15);box-shadow:0 0 8px rgba(255,182,39,.3);}
.hod-role-pos{font-family:'Bebas Neue';font-size:11px;color:#0a0a0f;border-radius:5px;padding:1px 5px;}
.hod-role-nm{font-size:13px;}
.hod-role-rt{font-family:'Bebas Neue';font-size:15px;color:var(--gold);}
.hod-pen{color:var(--red);font-size:10px;margin-left:2px;}
/* košarkarsko igrišče */
.hod-court-wrap{position:relative;max-width:340px;margin:0 auto;aspect-ratio:1/1;}
.hod-court-bg{position:absolute;inset:0;width:100%;height:100%;border-radius:14px;
  border:1px solid var(--line);box-shadow:inset 0 0 30px rgba(0,0,0,.5);}
.hod-court-spots{position:absolute;inset:0;}
.hod-court-lines{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.hod-chem-legend{display:flex;gap:14px;justify-content:center;font-size:11px;color:var(--muted);margin-top:8px;flex-wrap:wrap;}
.hod-chem-legend span{display:flex;align-items:center;gap:5px;}
.hod-chem-legend i{width:16px;height:3px;border-radius:2px;display:inline-block;}
.hod-daily-banner{max-width:420px;margin:12px auto;padding:12px 16px;border-radius:14px;text-align:center;}
.hod-daily-banner.done{background:linear-gradient(135deg,rgba(46,196,182,.18),rgba(46,196,182,.05));border:1px solid var(--green);}
.hod-daily-banner.pending{background:rgba(255,182,39,.08);border:1px solid var(--gold-deep);}
.hod-daily-goalbar{background:linear-gradient(90deg,rgba(76,201,240,.15),rgba(76,201,240,.04));
  border:1px solid rgba(76,201,240,.4);border-radius:10px;padding:7px 12px;margin-bottom:10px;
  font-size:13px;color:#4cc9f0;text-align:center;}
.hod-daily-goalbar b{color:#fff;}
.hod-spot{position:absolute;transform:translate(-50%,-50%);width:74px;
  display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:.12s;}
.hod-spot-pos{font-family:'Bebas Neue';font-size:12px;letter-spacing:1px;color:var(--gold);}
.hod-spot.filled{background:rgba(15,15,25,.85);border:2px solid var(--gold);border-radius:10px;padding:4px 2px;}
.hod-spot.empty{background:rgba(15,15,25,.5);border:2px dashed var(--muted);border-radius:10px;padding:4px 2px;}
.hod-spot.sel{box-shadow:0 0 14px var(--gold);border-color:#fff;}
.hod-spot.filled:hover{transform:translate(-50%,-50%) scale(1.05);}
.hod-spot-name{font-size:12px;font-weight:600;line-height:1.1;text-align:center;}
.hod-spot-rt{font-family:'Bebas Neue';font-size:15px;color:var(--gold);}
.hod-spot-empty{font-size:10px;color:var(--muted);font-style:italic;}
.hod-spot-hint{font-family:'Bebas Neue';font-size:14px;margin-top:2px;padding:0 5px;border-radius:5px;}
.hod-spot-hint.good{color:#0a0a0f;background:var(--green);}
.hod-spot-hint.mid{color:#0a0a0f;background:var(--gold);}
.hod-spot-hint.bad{color:#fff;background:var(--red);}
.hod-bench{margin-top:14px;display:flex;flex-direction:column;gap:6px;max-width:440px;margin-left:auto;margin-right:auto;}
.hod-bench-row{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:7px 10px;text-align:left;}
.hod-bench-label{font-family:'Bebas Neue';font-size:13px;letter-spacing:1px;color:var(--muted);display:block;margin-bottom:4px;}
.hod-bench-chips{display:flex;flex-wrap:wrap;gap:5px;}
.hod-bench-chip{display:flex;align-items:center;gap:6px;background:#1f1f2e;border:1px solid var(--line);
  border-radius:8px;padding:4px 8px;cursor:pointer;transition:.12s;}
.hod-bench-chip:hover{border-color:var(--gold);}
.hod-bench-chip.sel{border-color:#fff;box-shadow:0 0 8px var(--gold);}
.hod-budget-bar{max-width:380px;margin:0 auto 12px;}
.hod-budget-row{display:flex;justify-content:space-between;font-size:12px;letter-spacing:1px;color:var(--muted);margin-bottom:4px;}
.hod-budget-row b{color:var(--gold);font-family:'Bebas Neue';font-size:16px;}
.hod-budget-track{height:7px;background:var(--line);border-radius:4px;overflow:hidden;}
.hod-budget-fill{height:100%;background:linear-gradient(90deg,var(--gold-deep),var(--gold));border-radius:4px;transition:width .3s;}
/* multiplayer */
.hod-mpname-list{display:flex;flex-direction:column;gap:8px;max-width:300px;margin:0 auto;}
.hod-mpname-row{display:flex;align-items:center;gap:10px;}
.hod-mpname-dot{width:14px;height:14px;border-radius:50%;flex:none;}
.hod-mpname-input{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:10px;
  padding:9px 12px;color:var(--ink);font-family:'Oswald';font-size:15px;}
.hod-mpname-input:focus{outline:none;border-color:var(--gold);}
.hod-mp-turn{font-size:14px;margin:8px 0;color:var(--ink);}
.hod-mp-turn b{color:var(--tc);font-size:18px;}
.hod-order-strip{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:12px;}
.hod-order-tag{font-size:11px;padding:2px 9px;border-radius:20px;border:1px solid var(--tc);color:var(--tc);opacity:.45;}
.hod-order-tag.active{opacity:1;background:var(--tc);color:#0a0a0f;font-weight:600;}
.hod-mp-grid{max-height:none;}
.hod-mp-team{border:1px solid var(--line);border-left:3px solid var(--tc);border-radius:8px;padding:7px 10px;margin-bottom:6px;background:var(--panel);}
.hod-mp-team-head{display:flex;justify-content:space-between;font-family:'Bebas Neue';font-size:14px;letter-spacing:1px;margin-bottom:4px;}
.hod-mp-team-head span:first-child{color:var(--tc);}
.hod-mp-team-chips{display:flex;flex-wrap:wrap;gap:4px;}
.hod-mp-results{display:flex;flex-direction:column;gap:8px;max-width:440px;margin:16px auto;}
.hod-mp-result-card{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);
  border-left:4px solid var(--tc);border-radius:12px;padding:12px 14px;text-align:left;}
.hod-mp-result-card.winner{box-shadow:0 0 18px rgba(255,182,39,.25);border-color:var(--gold);}
.hod-mp-rc-rank{font-size:22px;width:30px;text-align:center;flex:none;}
.hod-mp-rc-body{flex:1;}
.hod-mp-rc-name{font-size:16px;font-weight:600;color:var(--tc);}
.hod-mp-rc-sub{font-size:11px;color:var(--muted);}
.hod-mp-rc-grade{font-family:'Anton';font-size:34px;flex:none;}
.hod-mp-detail-wrap{display:flex;flex-direction:column;gap:14px;max-width:440px;margin:0 auto;}
.hod-mp-detail-block{border:1px solid var(--line);border-left:3px solid var(--tc);border-radius:10px;padding:10px;}
.hod-mp-detail-block .hod-mp-team-head span:first-child{color:var(--tc);}
.hod-pos-overlay{position:absolute;inset:0;background:rgba(10,10,15,.92);display:flex;
  align-items:center;justify-content:center;border-radius:14px;z-index:20;backdrop-filter:blur(3px);}
.hod-pos-modal{background:var(--panel);border:1px solid var(--gold);border-radius:16px;padding:20px 24px;max-width:360px;}
.hod-pos-pick-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.hod-btn.hod-pos-pick{padding:12px 18px;line-height:1.1;}
.hod-action-zone{min-height:230px;display:flex;flex-direction:column;justify-content:center;position:relative;}
#hod-roster-slot{margin-top:6px;}
.hod-chem-mini{display:inline-flex;align-items:center;gap:6px;margin-top:6px;
  padding:2px 8px;border-radius:20px;font-size:11px;border:1px solid var(--line);}
.hod-chem-mini .hod-chem-sign{font-family:'Bebas Neue';font-size:15px;letter-spacing:1px;line-height:1;}
.hod-chem-mini .hod-chem-why{color:var(--muted);letter-spacing:.3px;}
.hod-chem-mini.pos{border-color:rgba(46,196,182,.5);}
.hod-chem-mini.pos .hod-chem-sign{color:var(--green);}
.hod-chem-mini.neg{border-color:rgba(230,57,70,.5);}
.hod-chem-mini.neg .hod-chem-sign{color:var(--red);}
.hod-chem-mini.neu .hod-chem-sign{color:var(--muted);}
.hod-conf-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:480px;margin:0 auto;text-align:left;}
.hod-conf-title{font-family:'Bebas Neue';font-size:15px;letter-spacing:2px;color:var(--gold);margin-bottom:6px;text-align:center;}
.hod-team-chip{display:flex;justify-content:space-between;align-items:center;background:var(--panel);
  border:1px solid var(--line);border-radius:8px;padding:7px 11px;margin-bottom:5px;cursor:pointer;
  transition:.12s;font-size:13px;}
.hod-team-chip:hover{border-color:var(--gold);transform:translateX(3px);}
.hod-team-str{font-family:'Bebas Neue';color:var(--muted);font-size:14px;}
.hod-sim-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:420px;margin:16px auto;}
.hod-sim-stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 4px;}
.hod-sim-stat b{font-family:'Anton';font-size:26px;color:var(--ink);display:block;line-height:1;}
.hod-sim-stat span{font-size:9px;letter-spacing:1px;color:var(--muted);}
.hod-sim-title{border-color:var(--gold);background:linear-gradient(180deg,rgba(255,182,39,.15),transparent);}
.hod-sim-title b{color:var(--gold);}
.hod-stand-title{font-family:'Bebas Neue';font-size:15px;letter-spacing:2px;color:var(--muted);margin:14px 0 6px;}
.hod-standings{max-width:360px;margin:0 auto;text-align:left;}
.hod-stand-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 10px;border-bottom:1px solid var(--line);}
.hod-stand-row.mine{background:linear-gradient(90deg,rgba(255,182,39,.18),transparent);
  border-radius:6px;color:var(--gold);font-weight:600;border-bottom:none;}
@keyframes hod-fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.hod-pop{animation:hod-pop .35s cubic-bezier(.2,1.4,.4,1);}
@keyframes hod-pop{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}
.hod-hidden{display:none;}
.hod-foot{text-align:center;font-size:11px;color:var(--muted);margin-top:30px;letter-spacing:1px;line-height:1.6;}

/* ============ MOBILE ============ */
@media (max-width:560px){
  #hod-root{padding:14px 10px 50px;}
  .hod-sub{font-size:11px;letter-spacing:2px;}
  .hod-progress{gap:4px;}
  .hod-dot{width:7px;height:7px;}

  /* slot machine koluti — zožaj da gredo 3 v vrsto */
  .hod-reels{gap:6px;}
  .hod-reel{width:31vw;max-width:120px;height:92px;border-radius:11px;}
  .hod-reel-item{height:92px;}
  .hod-reel-year{font-size:26px;}
  .hod-reel-era{font-size:9px;letter-spacing:1px;}
  @keyframes hod-spin{from{transform:translateY(0)}to{transform:translateY(-92px)}}

  /* gumbi */
  .hod-btn{font-size:20px;padding:12px 28px;}
  .hod-btn.secondary{font-size:14px;padding:7px 16px;}

  /* način / dekade / št. igralcev chips */
  .hod-mode-chip{min-width:0;flex:1 1 40%;padding:8px 10px;}
  .hod-era-chip{min-width:0;flex:1 1 28%;padding:9px 8px;}
  .hod-era-name{font-size:22px;}

  /* igralske kartice */
  .hod-pcard{padding:10px 11px;gap:9px;}
  .hod-pos-badge{width:auto;min-width:40px;padding:0 6px;height:40px;font-size:14px;}
  .hod-pname{font-size:15px;}
  .hod-pseason{font-size:11px;}
  .hod-pstats{gap:9px;}
  .hod-pstats b{font-size:15px;}
  .hod-prating{font-size:25px;}
  .hod-price{font-size:13px;}
  .hod-chem-mini{font-size:10px;padding:2px 6px;}

  /* rezultat */
  .hod-grade{font-size:clamp(64px,20vw,110px);}
  .hod-final-roster{grid-template-columns:1fr;gap:6px;}
  .hod-chem-tag{font-size:12px;padding:3px 9px;}

  /* simulacija */
  .hod-conf-wrap{grid-template-columns:1fr;gap:10px;}
  .hod-sim-grid{grid-template-columns:repeat(2,1fr);}
  .hod-sim-stat b{font-size:24px;}
  .hod-team-chip{font-size:12px;padding:6px 9px;}

  /* multiplayer */
  .hod-order-tag{font-size:10px;padding:2px 7px;}
  .hod-mp-result-card{padding:10px 11px;gap:9px;}
  .hod-mp-rc-grade{font-size:28px;}
  .hod-mp-rc-name{font-size:15px;}
  .hod-pos-modal{padding:16px 16px;max-width:92vw;}

  /* action zone naj se prilagaja, ne fiksno previsoka */
  .hod-action-zone{min-height:200px;}
}
@media (max-width:380px){
  .hod-reel-year{font-size:22px;}
  .hod-pstats{gap:7px;}
  .hod-pname{font-size:14px;}
  .hod-mode-chip{flex:1 1 44%;}
}

// ===== SEEDED RNG (za dnevni izziv) =====
// mulberry32 — deterministični generator. Ko je dailyMode aktiven, rng() = seeded.
let _seed=0, dailyMode=false;
function setSeed(s){ _seed=s>>>0; }
function rng(){
  if(!dailyMode) return Math.random();
  _seed|=0; _seed=_seed+0x6D2B79F5|0;
  let t=Math.imul(_seed^_seed>>>15,1|_seed);
  t=t+Math.imul(t^t>>>7,61|t)^t;
  return ((t^t>>>14)>>>0)/4294967296;
}
function todaySeed(){
  const d=new Date();
  return parseInt(`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`);
}
function todayKey(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function storeSet(k,v){ try{localStorage.setItem(k,v);}catch(e){_memStore[k]=v;} }
function dailyRecord(){ try{return JSON.parse(storeGet("hod-daily")||"{}");}catch(e){return {};} }
function saveDailyRecord(r){ storeSet("hod-daily",JSON.stringify(r)); }

// ---- LOAD EXTERNAL DATASET (players.json) IF PRESENT ----
// Fetcha z absolutnega raw GitHub URL-ja -> deluje od koderkoli (Pages, lokalno prek serverja, vgneteno).
const DATA_URL="https://raw.githubusercontent.com/blazerculj-max/hall-of-draft/main/players.json";
let DATA_SOURCE="vgrajen (kuriran)";
let DATA_STATUS="builtin"; // builtin | loading | full | error
async function loadDataset(){
  try{
    const res=await fetch(DATA_URL,{cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const j=await res.json();
    if(j&&j.seasons&&j.seasons.length){
      POOL=j.seasons.map(s=>({
        year:s.year, era:s.era,
        players:s.players.map(p=>({
          pos:p.pos,name:p.name,season:p.season,
          pts:p.pts,reb:p.reb,ast:p.ast,rating:p.rating,
          era:s.era,gp:p.gp,team:p.team||"",pid:p.pid||0,
          positions:(p.positions&&p.positions.length)?p.positions:[p.pos]
        }))
      })).filter(s=>s.players.length>=5);
      DATA_SOURCE=`GitHub · ${POOL.length} sezon · ${
        POOL.reduce((a,s)=>a+s.players.length,0).toLocaleString('sl')} igralcev`;
      DATA_STATUS="full";
    }
  }catch(e){
    // players.json še ni objavljen ali ni dostopen -> ostani na vgrajenem POOL
    DATA_STATUS="builtin";
  }
}

const CONFERENCE={
  // East
  BOS:"E",BKN:"E",NYK:"E",PHI:"E",TOR:"E",CHI:"E",CLE:"E",DET:"E",IND:"E",MIL:"E",
  ATL:"E",CHA:"E",MIA:"E",ORL:"E",WAS:"E",
  // West

  DAL:"W",HOU:"W",MEM:"W",NOP:"W",SAS:"W"
};
const TEAM_NAME={
  BOS:"Boston",BKN:"Brooklyn",NYK:"New York",PHI:"Philadelphia",TOR:"Toronto",
  CHI:"Chicago",CLE:"Cleveland",DET:"Detroit",IND:"Indiana",MIL:"Milwaukee",
  ATL:"Atlanta",CHA:"Charlotte",MIA:"Miami",ORL:"Orlando",WAS:"Washington",
  DEN:"Denver",MIN:"Minnesota",OKC:"Oklahoma City",POR:"Portland",UTA:"Utah",
  GSW:"Golden State",LAC:"LA Clippers",LAL:"LA Lakers",PHX:"Phoenix",SAC:"Sacramento",

};
// najnovejša sezona v datasetu
function latestSeason(){
  let best=null;
  POOL.forEach(s=>{ if(!best||s.year>best) best=s.year; });
  return best;
}
// zgradi moč vsake NBA ekipe iz dejanskih igralcev zadnje sezone
function buildLeague(){
  const season=latestSeason();
  const sObj=POOL.find(s=>s.year===season);
  const teams={};
  if(sObj){
    sObj.players.forEach(p=>{
      const t=(p.team||"").toUpperCase();
      if(!CONFERENCE[t]) return; // preskoči TOT in neznane
      (teams[t]=teams[t]||[]).push(p);
    });
  }
  // za vsako ekipo: surova moč = uteženo povprečje top 8 ratingov
  const league=[];
  Object.keys(teams).forEach(t=>{
    const top=teams[t].sort((a,b)=>b.rating-a.rating).slice(0,8);
    if(top.length<3) return;
    const w=[0.22,0.18,0.15,0.12,0.1,0.09,0.08,0.06];
    let str=0,wsum=0;
    top.forEach((p,i)=>{const wi=w[i]||0.05;str+=p.rating*wi;wsum+=wi;});
    str=str/wsum;
    league.push({abbr:t,name:TEAM_NAME[t]||t,conf:CONFERENCE[t],rawStrength:str});
  });
  // RAZTEGNI razpon moči okoli povprečja (surove moči so prestisnjene -> realen
  // NBA razpon ~64..21 zmag). Shranimo leagueMean za kalibracijo uporabnika.
  const leagueMean=league.reduce((a,t)=>a+t.rawStrength,0)/(league.length||1);
  const K=1.5;
  league.forEach(t=>{ t.strength=leagueMean+(t.rawStrength-leagueMean)*K; });
  return {season, league, leagueMean, stretchK:K};
}

const ERA_ORDER=["80s","90s","2000s","2010s","2020s"];

// dejanska pozicija igralca v ekipi (dodeljena ob izbiri ali privzeta)
function effPos(p){return p.assignedPos||p.pos;}
function playerPositions(p){return (p.positions&&p.positions.length)?p.positions:[p.pos];}
function posCount(pos){return roster.filter(p=>effPos(p)===pos).length;}
// unikaten ključ igralca = ime + sezona (Jordan 95-96 != Jordan 90-91)
function playerKey(p){return p.name+"|"+p.season;}
// priimek z veliko začetnico (lastName vrne lowercase)
function lastNameCap(p){const l=lastName(p.name);return l?l[0].toUpperCase()+l.slice(1):p.name;}
// kratka sezona: "1995-96" -> "'96"
function shortSeason(p){const yr=(p.season||"").split('-');return yr.length>1?"'"+yr[1]:p.season;}
// je igralec že izbran? (solo: v roster; mp: v katerikoli ekipi)
function isDrafted(p){
  const k=playerKey(p);
  if(mp&&mp.teams) return mp.teams.some(t=>t.roster.some(x=>playerKey(x)===k));
  return roster.some(x=>playerKey(x)===k);
}
function teamFull(){return roster.length>=MAX_TEAM;}
function missingPositions(){return POSITIONS.filter(p=>posCount(p)<1);}
// positions we can still add to (under max per pos)
function openPositions(){return POSITIONS.filter(p=>posCount(p)<MAX_PER_POS);}
// when remaining slots == missing positions count, force only missing positions
function forcedPositions(){
  const slotsLeft=MAX_TEAM-roster.length;
  const miss=missingPositions();
  if(slotsLeft<=miss.length && miss.length>0) return miss;
  return openPositions();
}

function pickRandomSeasons(){
  const pool=filteredPool();
  const idx=[...Array(pool.length).keys()];
  for(let i=idx.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]];}
  const take=Math.min(3,pool.length);
  return idx.slice(0,take).map(i=>pool[i]);
}

function startSpin(){
  phase="spin";
  seasonChoices=pickRandomSeasons();
  const n=seasonChoices.length;             // 1..3
  const spinPool=filteredPool();
  const reelHtml=Array.from({length:n}).map((_,i)=>{
    let strip="";
    for(let k=0;k<10;k++){
      const s=spinPool[Math.floor(Math.random()*spinPool.length)];
      strip+=`<div class="hod-reel-item"><div class="hod-reel-year">${s.year.split('-')[0]}</div><div class="hod-reel-era">${s.era}</div></div>`;
    }
    return `<div class="hod-reel spinning" id="hod-reel-${i}"><div class="hod-reel-strip">${strip}</div></div>`;
  }).join('');
  updateRosterSlot();
  setAction(`
    <div class="hod-slot-stage hod-fade">
      <div class="hod-stage-label">${roster.length===0?'Zavrti za prvo sezono':'Zavrti za naslednjo sezono'}</div>
      <div class="hod-reels">${reelHtml}</div>
    </div>`);
  // stop reels staggered
  Array.from({length:n}).forEach((_,i)=>{
    setTimeout(()=>{
      const reel=document.getElementById('hod-reel-'+i);
      if(!reel) return;
      reel.classList.remove('spinning');reel.classList.add('locked');
      const s=seasonChoices[i];
      reel.querySelector('.hod-reel-strip').innerHTML=

function makeOffer(){
  phase="offer";
  const allowed=forcedPositions();
  const left=budgetLeft();
  currentOffer=[];
  allowed.forEach(pos=>{
    let cands=chosenSeason.players.filter(p=>p.pos===pos && !isDrafted(p));
    // budget: ponudi le igralce, ki si jih še lahko privoščiš
    if(budgetMode){
      const afford=cands.filter(p=>playerCost(p)<=left);
      if(afford.length) cands=afford;
      else {
        // če si na tej poziciji ne moreš nič privoščiti, vzemi najcenejšega (fallback)
        cands=[...cands].sort((a,b)=>playerCost(a)-playerCost(b)).slice(0,1);
      }
    }
    if(cands.length){
      const pick=cands[Math.floor(rng()*cands.length)];
      currentOffer.push(pick);
    }
  });
  if(currentOffer.length===0){
    chosenSeason.players.forEach(p=>{if(allowed.includes(p.pos)&&!isDrafted(p))currentOffer.push(p);});
    currentOffer=currentOffer.slice(0,5);
  }
  const forced = (MAX_TEAM-roster.length)<=missingPositions().length && missingPositions().length>0;
  const cards=currentOffer.map((p,i)=>{
    const allPos=playerPositions(p);
    const canTake=allPos.some(pos=>posCount(pos)<MAX_PER_POS);
    const cd=chemDelta(p);
    const sign=cd.level>0?'+'.repeat(cd.level):cd.level<0?'−'.repeat(-cd.level):'•';
    const cls=cd.level>0?'pos':cd.level<0?'neg':'neu';
    const chemBadge=roster.length>0
      ? `<div class="hod-chem-mini ${cls}" title="vpliv na kemijo">
           <span class="hod-chem-sign">${sign}</span>
           ${cd.reason?`<span class="hod-chem-why">${cd.reason}</span>`:''}
         </div>`
      : '';
    const cost=playerCost(p);
    const afterBuy=budgetLeft()-cost;
    const priceBadge=budgetMode
      ? `<div class="hod-price">${cost===0?'FREE':'$'+cost}</div>
         <div class="hod-after">→ $${afterBuy}</div>` : '';
    return `
    <div class="hod-pcard ${canTake?'':'disabled'} hod-pop" data-i="${i}" style="animation-delay:${i*0.07}s">
      <div class="hod-pos-badge hod-pos-${p.pos}">${allPos.join('/')}</div>
      <div class="hod-pinfo">
        <div class="hod-pname">${p.name}</div>
        <div class="hod-pseason">${p.season}${canTake?'':' · pozicije polne'}</div>
        <div class="hod-pstats">
          <div><b>${p.pts}</b><span>PPG</span></div>
          <div><b>${p.reb}</b><span>RPG</span></div>
          <div><b>${p.ast}</b><span>APG</span></div>
        </div>
        ${chemBadge}
      </div>
      <div class="hod-pright">
        <div class="hod-prating ${ratingClass(p.rating)}">${p.rating}</div>
        ${priceBadge}
      </div>
    </div>`;
  }).join('');
  // WILD kartica "??" — naključen igralec iz trenutne sezone za fiksno ceno
  const wildAfford=!budgetMode || WILD_COST<=budgetLeft();
  const wildAvail=chosenSeason.players.some(p=>!isDrafted(p)&&playerPositions(p).some(pos=>posCount(pos)<MAX_PER_POS));
  const wildOk=wildAfford&&wildAvail;
  const wildCard=`
    <div class="hod-pcard hod-wild ${wildOk?'':'disabled'} hod-pop" id="hod-wild-card">
      <div class="hod-pos-badge hod-wild-badge">??</div>
      <div class="hod-pinfo">
        <div class="hod-pname">Skrivnostni igralec</div>
        <div class="hod-pseason">naključen iz ${chosenSeason.year}${wildOk?'':' · ni na voljo'}</div>
        <div style="font-size:11px;color:var(--gold-deep);margin-top:4px">lahko zvezda ali polom — tvegaš?</div>
      </div>
      <div class="hod-pright">
        <div class="hod-prating" style="color:var(--gold)">?</div>
        ${budgetMode?`<div class="hod-price">$${WILD_COST}</div>
          <div class="hod-after">→ $${budgetLeft()-WILD_COST}</div>`:''}
      </div>
    </div>`;
  const budgetBar=budgetMode?`
    <div class="hod-budget-bar">
      <div class="hod-budget-row">
        <span>BUDGET</span>
        <span><b>$${budgetLeft()}</b> / $${budgetTotal}</span>
      </div>
      <div class="hod-budget-track"><div class="hod-budget-fill" style="width:${Math.max(0,budgetLeft()/budgetTotal*100)}%"></div></div>
    </div>`:'';
  setAction(`
    <div class="hod-fade">
      <div class="hod-stage-label" style="text-align:center">
        ${chosenSeason.year} · ${chosenSeason.era}${forced?' · <span style="color:var(--red)">zapolni manjkajoče pozicije</span>':''}
      </div>
      ${budgetBar}
      <div style="text-align:center;font-size:12px;color:var(--muted);margin-bottom:10px">Izberi enega igralca</div>
      <div class="hod-offer-grid">${cards}${wildCard}</div>
    </div>`);
  document.querySelectorAll('#hod-action .hod-pcard:not(.disabled):not(.hod-wild)').forEach(c=>{
    c.onclick=()=>choosePlayerPos(currentOffer[+c.dataset.i]);
  });
  const wc=document.getElementById('hod-wild-card');
  if(wc&&wildOk) wc.onclick=()=>takeWild();
}

// WILD: potegni naključnega še-ne-izbranega igralca iz trenutne sezone z dovoljeno pozicijo
function takeWild(){
  const allowed=forcedPositions();
  let cands=chosenSeason.players.filter(p=>!isDrafted(p)&&playerPositions(p).some(pos=>allowed.includes(pos)&&posCount(pos)<MAX_PER_POS));
  if(!cands.length){ cands=chosenSeason.players.filter(p=>!isDrafted(p)); }
  if(!cands.length) return;
  const pick=cands[Math.floor(rng()*cands.length)];
  // wild ima fiksno ceno (prepiše dejansko ceno igralca)
  const wildPick={...pick, wildCost:WILD_COST};
  revealWild(wildPick);
}

// če ima igralec več dovoljenih pozicij, vprašaj kam; sicer takoj dodaj
function choosePlayerPos(p){
  const allPos=playerPositions(p);
  // med draftom NE sprašujemo za pozicijo — dodamo s prvo dovoljeno (max 3/poz).
  // končno razporeditev igralec naredi na igrišču.
  const takable=allPos.filter(pos=>posCount(pos)<MAX_PER_POS);
  takePlayer(p, takable[0]||allPos[0]);
}

function takePlayer(p, assignedPos){
  const placed={...p, assignedPos: assignedPos||p.pos};
  if(budgetMode) budgetSpent += (p.wildCost!=null?p.wildCost:playerCost(placed));
  roster.push(placed);
  renderProgress();
  updateRosterSlot();
  if(teamFull()){ showRoleAssign(); return; }
  startSpin();
}

// ---- TEAM EVALUATION ----
function chemFor(arr){
  const posC=pos=>arr.filter(p=>effPos(p)===pos).length;
  // 1) ERA MATCH
  const eras={};
  arr.forEach(p=>{eras[p.era]=(eras[p.era]||0)+1;});
  const vals=Object.values(eras);
  const dominant=vals.length?Math.max(...vals):0;
  const eraSpread=Object.keys(eras).length;
  const eraScore=(dominant/MAX_TEAM)*6-(eraSpread-1)*1.2;

  // 2) POSITIONAL FIT + SOLO PRITISK
  const ideal={PG:2,SG:3,SF:2,PF:2,C:2};
  let fitPenalty=0, soloPress=0;
  POSITIONS.forEach(pos=>{
    const c=posC(pos);
    if(c===0){ fitPenalty+=4; }
    else{
      fitPenalty+=Math.abs(c-ideal[pos])*1.1;
      if(c===1) soloPress+=0.9;
    }
  });
  const fitScore=6-fitPenalty;
  const soloScore=-soloPress;

  // 3) SOIGRALCI + DUOJI
  let mateBonus=0, duoBonus=0, mateCount=0, duoList=[];
  for(let i=0;i<arr.length;i++){
    for(let j=i+1;j<arr.length;j++){
      const a=arr[i], b=arr[j];
      if(a.team&&b.team&&a.team===b.team&&a.season===b.season){
        mateBonus+=1.1; mateCount++;
      } else if(a.team&&b.team&&a.team===b.team){
        mateBonus+=0.4; mateCount++;
      }
      if(pairMatch(a.name,b.name,DUOS)){
        duoBonus+=1.6; duoList.push(`${lastName(a.name)}–${lastName(b.name)}`);
      }
    }
  }
  mateBonus=Math.min(mateBonus,5);
  duoBonus=Math.min(duoBonus,4);

  // 4) RIVALSTVA
  let rivalPenalty=0, rivalList=[];
  for(let i=0;i<arr.length;i++){
    for(let j=i+1;j<arr.length;j++){
      if(pairMatch(arr[i].name,arr[j].name,RIVALRIES)){
        rivalPenalty+=2.2; rivalList.push(`${lastName(arr[i].name)}–${lastName(arr[j].name)}`);
      }
    }
  }
  const rivalScore=-Math.min(rivalPenalty,6);

  let chem=eraScore+fitScore+soloScore+mateBonus+duoBonus+rivalScore;
  const chemRaw=chem;
  chem=Math.max(-12,Math.min(12,Math.round(chem)));
  return {chem, chemRaw,
          eraScore:Math.round(eraScore*10)/10,
          fitScore:Math.round(fitScore*10)/10,
          soloScore:Math.round(soloScore*10)/10,
          mateBonus:Math.round(mateBonus*10)/10,
          duoBonus:Math.round(duoBonus*10)/10,
          rivalScore:Math.round(rivalScore*10)/10,
          dominant,eraSpread,eras,mateCount,duoList,rivalList};
}
function computeChemistry(){ return chemFor(roster); }

// Δ-kemija: kako kandidat p vpliva na kemijo glede na trenutno ekipo.
// Temelji na ODNOSIH (soigralci, duoji, rivalstva) + solo-pritisku pozicije,
// NE na splošnem era/fit učinku (ta je zavajajoč dokler ekipa ni cela).
function relScore(arr){
  let s=0;
  for(let i=0;i<arr.length;i++){
    for(let j=i+1;j<arr.length;j++){
      const a=arr[i],b=arr[j];
      if(a.team&&b.team&&a.team===b.team&&a.season===b.season) s+=1.1;
      else if(a.team&&b.team&&a.team===b.team) s+=0.4;
      if(pairMatch(a.name,b.name,DUOS)) s+=1.6;
      if(pairMatch(a.name,b.name,RIVALRIES)) s-=2.2;
    }
  }
  // solo-pritisk: pozicije z natanko 1 igralcem
  POSITIONS.forEach(pos=>{ if(arr.filter(x=>effPos(x)===pos).length===1) s-=0.9; });
  return s;
}
function chemDelta(p){
  const d=relScore([...roster,p])-relScore(roster);
  let reason="";
  for(const m of roster){
    if(pairMatch(p.name,m.name,RIVALRIES)){reason="rival "+lastName(m.name);break;}
  }
  if(!reason) for(const m of roster){
    if(pairMatch(p.name,m.name,DUOS)){reason="duo z "+lastName(m.name);break;}
  }
  if(!reason) for(const m of roster){
    if(p.team&&m.team&&p.team===m.team&&p.season===m.season){reason="soigralec ("+p.team+")";break;}
  }
  if(!reason){
    const c=roster.filter(x=>x.pos===p.pos).length;
    if(c>=2) reason="pretrpana poz.";
  }
  let level=0;
  if(d>=2.5) level=3; else if(d>=1.3) level=2; else if(d>=0.3) level=1;
  else if(d<=-2.5) level=-3; else if(d<=-1.3) level=-2; else if(d<=-0.3) level=-1;
  // razlog "pretrpana poz." prikaži le ob dejansko negativnem učinku
  if(reason==="pretrpana poz." && level>=0) reason="";
  return {delta:Math.round(d*10)/10, level, reason};
}

// ===== VLOGE (starter/bench) + out-of-position kazen =====
const POS_LADDER=["PG","SG","SF","PF","C"];
// utež po vlogi: S=starter, 6=sixth man, R=role player, F=fringe
const ROLE_WEIGHT={S:1.0, "6":0.9, R:0.75, F:0.55};
const ROLE_SLOTS={S:5, "6":1, R:3, F:3};
const ROLE_LABEL={S:"Starter", "6":"6. mož", R:"Rotacija", F:"Globina"};
const ROLE_ORDER=["S","6","R","F"];

// kazen za igro izven primarne pozicije
function posPenalty(p){
  const positions=playerPositions(p);
  const ap=effPos(p);
  if(positions[0]===ap) return 0;
  const idx=positions.indexOf(ap);
  if(idx===1) return 3;
  if(idx===2) return 5;
  const a=POS_LADDER.indexOf(ap);
  const minDist=Math.min(...positions.map(x=>Math.abs(POS_LADDER.indexOf(x)-a)));
  return 6+minDist*5;
}
// kazen, ki bi jo igralec imel na DOLOČENI poziciji (brez spreminjanja igralca)
function penaltyAtPos(p, pos){
  const positions=playerPositions(p);
  if(positions[0]===pos) return 0;
  const idx=positions.indexOf(pos);
  if(idx===1) return 3;
  if(idx===2) return 5;
  const a=POS_LADDER.indexOf(pos);
  const minDist=Math.min(...positions.map(x=>Math.abs(POS_LADDER.indexOf(x)-a)));
  return 6+minDist*5;
}
// približni rating, ki bi ga igralec imel na DOLOČENI poziciji (kot starter)
function ratingAtPos(p, pos){
  return Math.round(p.rating - penaltyAtPos(p, pos));
}
// par-kemija med dvema igralcema: vrne {level:-1|0|1, str:jakost}
function pairChem(a,b){
  if(pairMatch(a.name,b.name,RIVALRIES)) return {level:-1, str:2.5};
  let pos=0;
  if(pairMatch(a.name,b.name,DUOS)) pos+=2.5;
  if(a.team&&b.team&&a.team===b.team&&a.season===b.season) pos+=2.0;
  else if(a.team&&b.team&&a.team===b.team) pos+=0.8;
  if(pos>0) return {level:1, str:pos};
  return {level:0, str:0};
}
// kemija prilagoditev igralca = vsota njegovih par-učinkov med starterji (±rating)
function playerChemAdj(p){
  if(p.role!=="S") return 0;
  const starters=roster.filter(x=>x.role==="S"&&x!==p);
  let adj=0;
  starters.forEach(o=>{ const c=pairChem(p,o); adj += c.level*c.str; });
  return Math.max(-8, Math.min(8, adj));   // omeji vpliv
}
// efektivni rating = (rating - pozicijska kazen + kemija) × utež vloge
function effRating(p){
  const base=p.rating - posPenalty(p) + playerChemAdj(p);
  const w=ROLE_WEIGHT[p.role||"S"]||1.0;
  return Math.max(20, base*w);
}
// avto-razporeditev vlog: najboljših 5 = starterji (pokrij pozicije), nato 6./R/F po ratingu
function autoAssignRoles(arr){
  // poskusi pokriti 5 pozicij z najboljšimi na vsaki, ostalo po ratingu
  const byRating=[...arr].sort((a,b)=>b.rating-a.rating);
  const starters=[]; const used=new Set();
  // 1) za vsako pozicijo vzemi najboljšega, ki jo lahko igra primarno
  POS_LADDER.forEach(pos=>{
    const cand=byRating.find(p=>!used.has(p)&&playerPositions(p)[0]===pos);
    if(cand){starters.push(cand);used.add(cand);}
  });
  // 2) dopolni do 5 z najboljšimi preostalimi
  for(const p of byRating){ if(starters.length>=5)break; if(!used.has(p)){starters.push(p);used.add(p);} }
  // preostali po ratingu -> 6., R, F
  const rest=byRating.filter(p=>!used.has(p));
  arr.forEach(p=>{ p.role="F"; });
  starters.forEach(p=>p.role="S");
  if(rest[0]) rest[0].role="6";
  rest.slice(1,4).forEach(p=>p.role="R");
  rest.slice(4).forEach(p=>p.role="F");
  return arr;
}

function evaluateTeam(){
  // če vloge niso dodeljene, jih avto-dodeli (za oceno)
  if(!roster.some(p=>p.role)) autoAssignRoles(roster);
  const eff=roster.map(p=>({p,er:effRating(p)})).sort((a,b)=>b.er-a.er);
  const starters=roster.filter(p=>p.role==="S");
  const starterEff=(starters.length?starters:eff.slice(0,5).map(x=>x.p))
    .map(p=>effRating(p));
  const starterAvg=starterEff.reduce((s,r)=>s+r,0)/(starterEff.length||1);
  // cela ekipa uteženo po vlogah
  const fullAvg=roster.reduce((s,p)=>s+effRating(p),0)/roster.length;
  const posSpread=POSITIONS.filter(p=>posCount(p)>=1).length;
  const stars=roster.filter(p=>p.rating>=92).length;
  const starBonus=Math.min(stars*1.3,5);
  const chemObj=computeChemistry();
  let overall = starterAvg*0.52 + fullAvg*0.28 + 60*0.15
              + starBonus + chemObj.chem*0.9;
  overall=Math.max(40,Math.min(99,Math.round(overall)));
  return {overall,starterAvg:Math.round(starterAvg*10)/10,
          fullAvg:Math.round(fullAvg*10)/10,stars,posSpread,
          top5:starters.length?starters:eff.slice(0,5).map(x=>x.p),chem:chemObj};
}

function gradeFor(o){
  if(o>=95)return{g:"S+",c:"#ffd60a",v:"Nesmrtna ekipa. To je all-time superteam — algoritem nima možnosti."};
  if(o>=90)return{g:"S",c:"#ffd60a",v:"Šampionska zasedba. Globina in zvezde se ujemajo skoraj popolno."};
  if(o>=86)return{g:"A",c:"#2ec4b6",v:"Resen kandidat za naslov. Močna prva peterka, spodobna klop."};
  if(o>=82)return{g:"B",c:"#4cc9f0",v:"Solidna playoff ekipa. Nekaj zvezd, a globina niha."};
  if(o>=77)return{g:"C",c:"#90a4ae",v:"Sredina lestvice. Igrljivo, a brez prave udarne moči."};
  if(o>=72)return{g:"D",c:"#ff8500",v:"Lottery ekipa. Sreča pri vlekih te ni ravno mazala."};
  return{g:"F",c:"#e63946",v:"Tank mode. Ampak hej — vsaj imaš zgodbo za pripovedovati."};
}

function mpTeamPosCount(team,pos){return team.roster.filter(p=>effPos(p)===pos).length;}
function mpAllFull(){return mp.teams.every(t=>t.roster.length>=MAX_TEAM);}
// pozicije, ki jih ekipa še sme dodati (z upoštevanjem min 1/poz proti koncu)
function mpAllowedPos(team){
  const slotsLeft=MAX_TEAM-team.roster.length;
  const missing=POSITIONS.filter(p=>mpTeamPosCount(team,p)<1);
  if(slotsLeft<=missing.length && missing.length>0) return missing;
  return POSITIONS.filter(p=>mpTeamPosCount(team,p)<MAX_PER_POS);
}

function mpStartRound(){
  phase="mp-spin";
  // izberi naključno sezono iz filtriranega bazena
  const pool=filteredPool();
  mp.spinSeason=pool[Math.floor(Math.random()*pool.length)];
  // slot machine animacija (en kolut), nato sestavi bazen 10 igralcev
  setMpFrame();
  mpRenderTeams();   // roster ostane viden med vrtenjem
  setMpAction(`
    <div class="hod-slot-stage hod-fade">
      <div class="hod-stage-label">Runda ${mp.round+1} · vrti se sezona…</div>
      <div class="hod-reels"><div class="hod-reel spinning" id="hod-mp-reel"><div class="hod-reel-strip">
        ${Array.from({length:8}).map(()=>{const s=pool[Math.floor(Math.random()*pool.length)];
          return `<div class="hod-reel-item"><div class="hod-reel-year">${s.year.split('-')[0]}</div><div class="hod-reel-era">${s.era}</div></div>`;}).join('')}
      </div></div></div>
    </div>`);
  setTimeout(()=>{
    const reel=document.getElementById('hod-mp-reel');
    if(reel){reel.classList.remove('spinning');reel.classList.add('locked');
      const s=mp.spinSeason;
      reel.querySelector('.hod-reel-strip').innerHTML=
        `<div class="hod-reel-item"><div class="hod-reel-year">${s.year.split('-')[0]}</div><div class="hod-reel-era">${s.era}</div></div>`;
      reel.querySelector('.hod-reel-strip').style.transform='translateY(0)';}
    mpBuildPool();
    setTimeout(mpShowPick,500);
  },1400);
}

// bazen 10 igralcev: po 2 na vsako pozicijo (uravnoteženo), naključno iz sezone
function mpBuildPool(){
  const s=mp.spinSeason; const pool=[];
  POSITIONS.forEach(pos=>{
    const cands=s.players.filter(p=>p.pos===pos && !isDrafted(p));
    // premešaj in vzemi do 2
    for(let k=cands.length-1;k>0;k--){const j=Math.floor(Math.random()*(k+1));[cands[k],cands[j]]=[cands[j],cands[k]];}
    pool.push(...cands.slice(0,2));
  });
  // če katera pozicija nima 2, dopolni z naključnimi iz sezone
  if(pool.length<10){
    const extra=s.players.filter(p=>!pool.includes(p) && !isDrafted(p));
    for(let k=extra.length-1;k>0;k--){const j=Math.floor(Math.random()*(k+1));[extra[k],extra[j]]=[extra[j],extra[k]];}
    pool.push(...extra.slice(0,10-pool.length));
  }
  mp.pool=pool;
  mp.pickIdx=0;
}

function mpShowPick(){
  phase="mp-pick";
  // če so vse ekipe polne -> rezultat
  if(mpAllFull()){ mpShowResults(); return; }
  // poišči naslednjo ekipo v tej rundi, ki še ni polna
  while(mp.pickIdx<mp.order.length){
    const t=mp.teams[mp.order[mp.pickIdx]];
    if(t.roster.length<MAX_TEAM) break;
    mp.pickIdx++;
  }
  if(mp.pickIdx>=mp.order.length){ mpNextRound(); return; }
  const teamI=mp.order[mp.pickIdx];
  const team=mp.teams[teamI];
  const allowed=mpAllowedPos(team);
  const forced = (MAX_TEAM-team.roster.length)<=POSITIONS.filter(p=>mpTeamPosCount(team,p)<1).length
                 && POSITIONS.filter(p=>mpTeamPosCount(team,p)<1).length>0;
  // kartice iz bazena; onemogočene tiste, ki jih ta ekipa ne sme/zmore
  const cards=mp.pool.map((p,i)=>{
    const allPos=playerPositions(p);
    const playable=allPos.filter(pos=>allowed.includes(pos));
    const posOk=playable.length>0;
    const cost=budgetMode?playerCost(p):0;
    const affordOk=!budgetMode || cost<=(budgetTotal-team.spent);
    const ok=posOk&&affordOk;
    const why=!posOk?'pozicije polne':(!affordOk?'predrag':'');
    return `
    <div class="hod-pcard ${ok?'':'disabled'} hod-pop" data-i="${i}" style="animation-delay:${i*0.04}s">
      <div class="hod-pos-badge hod-pos-${p.pos}">${allPos.join('/')}</div>
      <div class="hod-pinfo">
        <div class="hod-pname">${p.name}</div>
        <div class="hod-pseason">${p.season}${why?' · '+why:''}</div>
        <div class="hod-pstats">
          <div><b>${p.pts}</b><span>PPG</span></div>
          <div><b>${p.reb}</b><span>RPG</span></div>
          <div><b>${p.ast}</b><span>APG</span></div>
        </div>
      </div>
      <div class="hod-pright">
        <div class="hod-prating ${ratingClass(p.rating)}">${p.rating}</div>
        ${budgetMode?`<div class="hod-price">${cost===0?'FREE':'$'+cost}</div>
          <div class="hod-after">→ $${(budgetTotal-team.spent)-cost}</div>`:''}
      </div>
    </div>`;
  }).join('');
  // WILD kartica za multiplayer (skupaj numPlayers kart na voljo)
  const wildAfford=!budgetMode || WILD_COST<=(budgetTotal-team.spent);
  const wildPoolAvail=mp.spinSeason.players.some(p=>!isDrafted(p)&&playerPositions(p).some(pos=>allowed.includes(pos)&&mpTeamPosCount(team,pos)<MAX_PER_POS));
  const wildOk=mp.wildLeft>0 && wildAfford && wildPoolAvail;
  const wildCard=`
    <div class="hod-pcard hod-wild ${wildOk?'':'disabled'} hod-pop" id="hod-mp-wild">
      <div class="hod-pos-badge hod-wild-badge">??</div>
      <div class="hod-pinfo">
        <div class="hod-pname">Skrivnostni igralec</div>
        <div class="hod-pseason">naključen iz ${mp.spinSeason.year} · ${mp.wildLeft} ostalo${wildOk?'':' · ni na voljo'}</div>
        <div style="font-size:11px;color:var(--gold-deep);margin-top:4px">zvezda ali polom?</div>
      </div>
      <div class="hod-pright">
        <div class="hod-prating" style="color:var(--gold)">?</div>
        ${budgetMode?`<div class="hod-price">$${WILD_COST}</div>
          <div class="hod-after">→ $${(budgetTotal-team.spent)-WILD_COST}</div>`:''}
      </div>
    </div>`;
  // vrstni red runde (vizualno)
  const orderTags=mp.order.map((ti,idx)=>`<span class="hod-order-tag ${idx===mp.pickIdx?'active':''}" style="--tc:${MP_COLORS[ti]}">${mp.teams[ti].name}</span>`).join('');
  setMpFrame();
  setMpAction(`
    <div class="hod-fade">
      <div class="hod-stage-label" style="text-align:center">
        Runda ${mp.round+1} · ${mp.spinSeason.year}${forced?' · <span style="color:var(--red)">zapolni manjkajoče</span>':''}
      </div>
      <div class="hod-mp-turn" style="--tc:${MP_COLORS[teamI]}">
        Na potezi: <b>${team.name}</b> &nbsp;(${team.roster.length}/12)${budgetMode?` · $${budgetTotal-team.spent}`:''}
      </div>
      <div class="hod-order-strip">${orderTags}</div>
      <div class="hod-offer-grid hod-mp-grid">${cards}${wildCard}</div>
    </div>`);
  document.querySelectorAll('#hod-action .hod-pcard:not(.disabled):not(.hod-wild)').forEach(c=>{
    c.onclick=()=>mpPick(+c.dataset.i);
  });
  const wc=document.getElementById('hod-mp-wild');
  if(wc&&wildOk) wc.onclick=()=>mpWild();
  mpRenderTeams();
}

// MP WILD: naključen še-ne-izbran igralec iz trenutne sezone z dovoljeno pozicijo
function mpWild(){
  const teamI=mp.order[mp.pickIdx];
  const team=mp.teams[teamI];
  const allowed=mpAllowedPos(team);
  let cands=mp.spinSeason.players.filter(p=>!isDrafted(p)&&playerPositions(p).some(pos=>allowed.includes(pos)&&mpTeamPosCount(team,pos)<MAX_PER_POS));
  if(!cands.length) cands=mp.spinSeason.players.filter(p=>!isDrafted(p));
  if(!cands.length) return;
  const pick=cands[Math.floor(Math.random()*cands.length)];
  mp.wildLeft--;
  // reveal nato dodelitev pozicije
  const a=document.getElementById('hod-action');
  const ov=document.createElement('div');
  ov.className='hod-pos-overlay';
  ov.innerHTML=`<div class="hod-pos-modal hod-pop" style="text-align:center">
    <div class="hod-stage-label">${team.name} — skrivnostni igralec…</div>
    <div class="hod-prating ${ratingClass(pick.rating)}" style="font-size:48px;margin:8px 0">${pick.rating}</div>
    <div class="hod-pname" style="font-size:20px">${pick.name}</div>
    <div class="hod-pseason">${playerPositions(pick).join('/')} · ${pick.season} · ${pick.pts}/${pick.reb}/${pick.ast}</div>
    <button class="hod-btn" id="hod-mpwild-ok" style="margin-top:14px">${budgetMode?'Vzemi za $'+WILD_COST:'Dodaj'}</button>
  </div>`;
  a.appendChild(ov);
  ov.querySelector('#hod-mpwild-ok').onclick=()=>{
    ov.remove();
    mpWildPlace(pick);
  };
}
function mpWildPlace(pick){
  const teamI=mp.order[mp.pickIdx];
  const team=mp.teams[teamI];
  const allowed=mpAllowedPos(team);
  const playable=playerPositions(pick).filter(pos=>allowed.includes(pos));
  // če več pozicij, izbirnik; sicer takoj
  if(playable.length<=1){
    team.roster.push({...pick, assignedPos:playable[0]||pick.pos, wildCost:WILD_COST});
    if(budgetMode) team.spent+=WILD_COST;
    mp.pickIdx++; mpRenderTeams(); mpShowPick(); return;
  }
  const btns=playable.map(pos=>{
    const c=mpTeamPosCount(team,pos);
    return `<button class="hod-btn hod-pos-pick" data-pos="${pos}"><span style="font-family:'Anton';font-size:22px">${pos}</span><span style="display:block;font-size:10px;letter-spacing:1px;opacity:.8">${c}/3</span></button>`;
  }).join('');
  const a=document.getElementById('hod-action');
  const ov=document.createElement('div');
  ov.className='hod-pos-overlay';
  ov.innerHTML=`<div class="hod-pos-modal hod-pop">
    <div class="hod-stage-label" style="text-align:center">${pick.name}</div>
    <div style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:14px">${team.name} — kam ga postaviš?</div>
    <div class="hod-pos-pick-row">${btns}</div>
  </div>`;
  a.appendChild(ov);
  ov.querySelectorAll('.hod-pos-pick').forEach(b=>{
    b.onclick=()=>{
      ov.remove();
      team.roster.push({...pick, assignedPos:b.dataset.pos, wildCost:WILD_COST});
      if(budgetMode) team.spent+=WILD_COST;
      mp.pickIdx++; mpRenderTeams(); mpShowPick();
    };
  });
}

function mpPick(poolIdx){
  const teamI=mp.order[mp.pickIdx];
  const team=mp.teams[teamI];
  const p=mp.pool[poolIdx];
  const allowed=mpAllowedPos(team);
  const playable=playerPositions(p).filter(pos=>allowed.includes(pos));
  if(playable.length<=1){ mpPlace(poolIdx, playable[0]||p.pos); return; }
  // izbirnik
  const btns=playable.map(pos=>{
    const c=mpTeamPosCount(team,pos);
    return `<button class="hod-btn hod-pos-pick" data-pos="${pos}">
      <span style="font-family:'Anton';font-size:22px">${pos}</span>
      <span style="display:block;font-size:10px;letter-spacing:1px;opacity:.8">${c}/3</span>
    </button>`;
  }).join('');
  const a=document.getElementById('hod-action');
  const overlay=document.createElement('div');
  overlay.className='hod-pos-overlay';
  overlay.innerHTML=`<div class="hod-pos-modal hod-pop">
    <div class="hod-stage-label" style="text-align:center">${p.name}</div>
    <div style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:14px">${team.name} — kam ga postaviš?</div>
    <div class="hod-pos-pick-row">${btns}</div>
    <button class="hod-btn secondary" id="hod-pos-cancel" style="margin-top:12px">Prekliči</button>
  </div>`;
  a.appendChild(overlay);
  overlay.querySelectorAll('.hod-pos-pick').forEach(b=>{
    b.onclick=()=>{overlay.remove();mpPlace(poolIdx,b.dataset.pos);};
  });
  overlay.querySelector('#hod-pos-cancel').onclick=()=>overlay.remove();
}
function mpPlace(poolIdx, assignedPos){
  const teamI=mp.order[mp.pickIdx];
  const team=mp.teams[teamI];
  const p=mp.pool[poolIdx];
  team.roster.push({...p, assignedPos});
  if(budgetMode) team.spent+=playerCost(p);
  mp.pool.splice(poolIdx,1);
  mp.pickIdx++;
  mpRenderTeams();   // takoj osveži roster prikaz (da igralec ne "pade ven")
  mpShowPick();
}

function mpNextRound(){
  // rotacija reda za eno mesto: [a,b,c,d] -> [b,c,d,a]
  mp.order.push(mp.order.shift());
  mp.round++;
  mp.pickIdx=0;
  if(mpAllFull()){ mpShowResults(); return; }
  mpStartRound();
}

  slot.innerHTML=mp.teams.map((t,ti)=>{

// ---- SIMULACIJA ----
function userTeamStrength(){
  const ev=evaluateTeam();
  // uporabi EFEKTIVNE ratinge (vloga + pozicijska kazen), uteženo top 8
  const sorted=[...roster].map(p=>effRating(p)).sort((a,b)=>b-a).slice(0,8);
  const w=[0.22,0.18,0.15,0.12,0.1,0.09,0.08,0.06];
  let str=0,wsum=0;
  sorted.forEach((er,i)=>{const wi=w[i]||0.05;str+=er*wi;wsum+=wi;});
  str=str/wsum;
  str += ev.chem.chem*0.5;
  return str;
}
function winProb(a,b,home){
  const HCA=2.5;             // home court advantage (v točkah moči)
  const D=30;                // občutljivost (kalibrirano: +12 moči ≈ 70% zmage)
  const diff=(a-b)+(home?HCA:-HCA);
  return 1/(1+Math.pow(10,-diff/D));
}
function winProbPlayoff(a,b){
  // playoffi so bolj negotovi (best-of-7, oblika, poškodbe) -> višji D
  const D=55;
  return 1/(1+Math.pow(10,-(a-b)/D));
}
function simSeason(myStr, league){
  let wins=0; const games=82, n=league.length;
  for(let g=0;g<games;g++){
    const opp=league[g%n];
    const home=(g%2===0);
    if(Math.random()<winProb(myStr,opp.strength,home)) wins++;
  }
  return wins;
}
function monteCarlo(myStr, full, myConf, runs){
  const confTeams=full.league.filter(t=>t.conf===myConf);
  const confStr=confTeams.filter(t=>!t.mine).map(t=>t.strength).sort((a,b)=>a-b);
  const qStr=p=>confStr[Math.floor(confStr.length*p)]||confStr[confStr.length-1];
  let winsSum=0, winsArr=[], playoff=0, top1=0, finals=0, titles=0;
  const avgStr=full.league.reduce((s,t)=>s+t.strength,0)/full.league.length;
  for(let r=0;r<runs;r++){
    const myWins=simSeason(myStr, full.league);
    winsSum+=myWins; winsArr.push(myWins);
    const standings=confTeams.filter(t=>!t.mine).map(t=>{
      return {abbr:t.abbr, wins:41+(t.strength-avgStr)*1.6 + (Math.random()-0.5)*10};
    });
    standings.push({abbr:"__ME__", wins:myWins});
    standings.sort((a,b)=>b.wins-a.wins);
    const myRank=standings.findIndex(t=>t.abbr==="__ME__")+1;
    if(myRank<=8) playoff++;
    if(myRank===1) top1++;
    // playoff napredovanje: 4 best-of-7 serije proti vse močnejšim nasprotnikom
    if(myRank<=8){
      const opps=[qStr(0.5),qStr(0.7),qStr(0.88),qStr(0.97)+3];
      let rounds=0;
      for(let k=0;k<4;k++){
        const pg=winProbPlayoff(myStr,opps[k]);
        let pSeries=0;
        for(let w=4;w<=7;w++){const c=[1,4,10,20][w-4];pSeries+=c*Math.pow(pg,4)*Math.pow(1-pg,w-4);}
        pSeries=Math.min(pSeries,0.9);
        if(Math.random()<pSeries) rounds++; else break;
      }
      if(rounds>=3) finals++;
      if(rounds>=4) titles++;
    }
  }
  winsArr.sort((a,b)=>a-b);
  return {
    avgWins:Math.round(winsSum/runs),
    medWins:Math.round(winsArr[Math.floor(runs/2)]),
    lo:Math.round(winsArr[Math.floor(runs*0.1)]),
    hi:Math.round(winsArr[Math.floor(runs*0.9)]),
    playoffPct:Math.round(playoff/runs*100),
    top1Pct:Math.round(top1/runs*100),
    finalsPct:Math.round(finals/runs*100),
    titlePct:Math.round(titles/runs*100),
    confTeams
  };
}

  assignCourtSpots();
  renderCourt();
}
// vsak starter dobi 'spot' (PG/SG/SF/PF/C). Poskusi po njihovi assignedPos/primarni.
function assignCourtSpots(){
  const starters=roster.filter(p=>p.role==="S");
  const spots=["PG","SG","SF","PF","C"];
  const taken={};
  // 1) tisti, ki so že na svoji poziciji
  starters.forEach(p=>{p.spot=null;});
  starters.forEach(p=>{
    const want=effPos(p);
    if(spots.includes(want)&&!taken[want]){p.spot=want;taken[want]=p;}
  });
  // 2) preostali na prosta mesta
  starters.forEach(p=>{
    if(p.spot) return;
    const free=spots.find(s=>!taken[s]);
    if(free){p.spot=free;taken[free]=p;}
  });
  // starterjeva pozicija = njegovo mesto
  starters.forEach(p=>{ if(p.spot) p.assignedPos=p.spot; });
}

let _courtSel=null; // izbrani igralec (tap-to-place)

// koordinate mest na polovičnem igrišču (viewBox 0..300 x 0..300), koš zgoraj
const COURT_SPOTS={
  PG:{x:150,y:235}, SG:{x:55,y:175}, SF:{x:245,y:175}, PF:{x:90,y:95}, C:{x:150,y:70}
};

function renderCourt(){
  const starters=roster.filter(p=>p.role==="S");
  const bySpot={}; starters.forEach(p=>{if(p.spot)bySpot[p.spot]=p;});
  const bench=roster.filter(p=>p.role!=="S");

  // kemija-črte med vsemi pari starterjev na igrišču
  let chemLines="";
  const placed=POS_LADDER.filter(s=>bySpot[s]);
  for(let i=0;i<placed.length;i++){
    for(let j=i+1;j<placed.length;j++){
      const sa=placed[i], sb=placed[j];
      const a=COURT_SPOTS[sa], b=COURT_SPOTS[sb];
      const c=pairChem(bySpot[sa],bySpot[sb]);
      const col=c.level>0?'#2ec4b6':c.level<0?'#e63946':'#c9a23a';
      const op=c.level===0?0.22:0.85;
      const wdt=c.level===0?1:2.2;
      const dash=c.level<0?'4 3':'';
      chemLines+=`<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="${col}" stroke-width="${wdt}" stroke-opacity="${op}" ${dash?`stroke-dasharray="${dash}"`:''}/>`;
    }
  }

  // SVG mesta
  const spotNodes=POS_LADDER.map(spot=>{
    const c=COURT_SPOTS[spot];
    const p=bySpot[spot];
    const sel=p&&_courtSel===p?'sel':'';
    const pen=p?posPenalty(p):0;
    const er=p?Math.round(effRating(p)):0;
    const label=p?`${lastNameCap(p)}`:spot;
    // namig: če je nek igralec izbran (in ni ta na tem mestu), pokaži kakšen rating bi imel TU
    let hint="";
    if(_courtSel && _courtSel!==p){
      const hr=ratingAtPos(_courtSel, spot);
      const hp=penaltyAtPos(_courtSel, spot);
      const cls=hp===0?'good':hp<=5?'mid':'bad';
      hint=`<div class="hod-spot-hint ${cls}">${hr}${hp>0?` <span class="hod-pen">-${hp}</span>`:''}</div>`;
    }
    return `
      <div class="hod-spot ${p?'filled':'empty'} ${sel}" data-spot="${spot}"
           style="left:${c.x/300*100}%;top:${c.y/300*100}%">
        <div class="hod-spot-pos">${spot}</div>
        ${p?`<div class="hod-spot-name">${label}</div>
             <div class="hod-spot-rt">${er}${pen>0?`<span class="hod-pen">-${pen}</span>`:''}</div>`
            :`<div class="hod-spot-empty">prazno</div>`}
        ${hint}
      </div>`;
  }).join('');

  // klop: 6. mož / rotacija / globina
  const benchGroup=(r)=>{
    const list=bench.filter(p=>p.role===r).map(p=>{
      const sel=_courtSel===p?'sel':'';
      return `<div class="hod-bench-chip ${sel}" data-key="${playerKey(p)}" draggable="true">
        <span class="hod-role-pos hod-pos-${effPos(p)}">${playerPositions(p)[0]}</span>
        <span class="hod-role-nm">${lastNameCap(p)} <span style="color:var(--muted);font-size:10px">${shortSeason(p)}</span></span>
        <span class="hod-role-rt">${Math.round(effRating(p))}</span>
      </div>`;
    }).join('');
    return `<div class="hod-bench-row" data-bench="${r}">
      <span class="hod-bench-label">${ROLE_LABEL[r]} <span style="opacity:.6">×${ROLE_WEIGHT[r]}</span></span>
      <div class="hod-bench-chips">${list||'<span class="hod-chip empty">—</span>'}</div>
    </div>`;
  };

  const allStartersPlaced=POS_LADDER.every(s=>bySpot[s]);
  screen.innerHTML=`
    <div class="hod-result hod-fade">
      <div class="hod-stage-label">Postavi peterko na igrišče</div>
      ${dailyMode?`<div class="hod-daily-goalbar" style="max-width:340px;margin:0 auto 10px">🏆 ${dailyGoal().label}</div>`:''}
      <div style="font-size:12px;color:var(--muted);max-width:420px;margin:0 auto 10px">
        ${isMobileView()?'Tapni igralca, nato mesto.':'Povleci igralca na mesto (ali tapni → mesto).'} Mesto določa pozicijo — igralec izven svoje pozicije dobi kazen.
      </div>
      ${_courtSel?`<div style="font-size:12px;color:var(--gold);margin-bottom:6px">Izbran: ${lastNameCap(_courtSel)} — izberi mesto ali klop</div>`:''}
      <div class="hod-court-wrap">
        <svg class="hod-court-bg" viewBox="0 0 300 300" preserveAspectRatio="none">
          <defs><linearGradient id="hod-floor" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#3a2a1a"/><stop offset="1" stop-color="#2a1e12"/></linearGradient></defs>
          <rect x="0" y="0" width="300" height="300" fill="url(#hod-floor)"/>
          <!-- raketa -->
          <rect x="105" y="0" width="90" height="110" fill="none" stroke="#c98a3a" stroke-width="2"/>
          <!-- linija prostih metov / krog -->
          <circle cx="150" cy="110" r="38" fill="none" stroke="#c98a3a" stroke-width="2"/>
          <!-- koš -->
          <line x1="130" y1="18" x2="170" y2="18" stroke="#e8e8e8" stroke-width="3"/>
          <circle cx="150" cy="26" r="7" fill="none" stroke="#ff8500" stroke-width="2.5"/>
          <!-- tri točka lok -->
          <path d="M 30 0 L 30 60 Q 150 200 270 60 L 270 0" fill="none" stroke="#c98a3a" stroke-width="2"/>
        </svg>
        <svg class="hod-court-lines" viewBox="0 0 300 300" preserveAspectRatio="none">${chemLines}</svg>
        <div class="hod-court-spots">${spotNodes}</div>
      </div>
      <div class="hod-chem-legend">
        <span><i style="background:#2ec4b6"></i> dobra kemija</span>
        <span><i style="background:#c9a23a"></i> nevtralno</span>
        <span><i style="background:#e63946"></i> trenje</span>
      </div>
      <div class="hod-bench">${["6","R","F"].map(benchGroup).join('')}</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px">
        <button class="hod-btn ${allStartersPlaced?'':'disabled'}" id="hod-court-done">Potrdi ekipo</button>
        <button class="hod-btn secondary" id="hod-court-auto">Auto</button>
      </div>
      ${allStartersPlaced?'':'<div style="font-size:11px;color:var(--red);margin-top:8px">Zapolni vseh 5 mest na igrišču</div>'}
    </div>`;
  wireCourt();
}

function isMobileView(){ return window.matchMedia&&window.matchMedia('(max-width:560px)').matches; }

function wireCourt(){
  // izbira igralca (klop ali mesto)
  function selectPlayer(p){ _courtSel=(_courtSel===p)?null:p; renderCourt(); }
  // postavi izbranega na mesto (spot) — zamenja če zasedeno
  function placeOnSpot(spot){
    if(!_courtSel) return;
    const sel=_courtSel;
    const occ=roster.find(p=>p.role==="S"&&p.spot===spot);
    if(sel.role==="S"){
      // starter <-> starter: zamenjaj mesti
      const from=sel.spot;
      if(occ){ occ.spot=from; occ.assignedPos=from; }
      sel.spot=spot; sel.assignedPos=spot;
    } else {
      // klop -> starter: izbrani postane starter na mestu, prejšnji gre na klop v vlogo izbranega
      const benchRole=sel.role;
      if(occ){ occ.role=benchRole; occ.spot=null; occ.assignedPos=playerPositions(occ)[0]; }
      sel.role="S"; sel.spot=spot; sel.assignedPos=spot;
    }
    _courtSel=null; renderCourt();
  }
  // postavi izbranega na klop (v določeno vlogo)
  function placeOnBench(role){
    if(!_courtSel) return;
    const sel=_courtSel;
    // koliko mest ima ta vloga
    const cap=ROLE_SLOTS[role];
    const inRole=roster.filter(p=>p.role===role&&p!==sel);
    if(sel.role==="S"){
      // starter -> klop: njegovo mesto ostane prazno, mora ga zapolniti nekdo. Da peterka ostane polna,
      // zahtevamo da je to swap (klik na klop igralca), ne prosto. Če je vloga polna, zamenjaj z zadnjim.
      if(inRole.length>=cap){
        const victim=inRole[inRole.length-1];
        victim.role="S"; victim.spot=sel.spot; victim.assignedPos=sel.spot;
      } else {
        // vloga ima prostor, a peterka bo nepopolna -> ne dovoli (mora ostati 5)
        _courtSel=null; renderCourt(); return;
      }
      sel.role=role; sel.spot=null; sel.assignedPos=playerPositions(sel)[0];
    } else {
      // klop -> klop (druga vloga)
      if(inRole.length>=cap){
        const victim=inRole[inRole.length-1];
        victim.role=sel.role;
      }
      sel.role=role;
    }
    _courtSel=null; renderCourt();
  }

  screen.querySelectorAll('.hod-spot').forEach(el=>{
    const spot=el.dataset.spot;
    const p=roster.find(x=>x.role==="S"&&x.spot===spot);
    el.onclick=()=>{ if(_courtSel) placeOnSpot(spot); else if(p) selectPlayer(p); };
    // drag desktop
    if(p){ el.setAttribute('draggable','true');
      el.ondragstart=e=>{_courtSel=p; e.dataTransfer.setData('text','x');}; }
    el.ondragover=e=>e.preventDefault();
    el.ondrop=e=>{e.preventDefault(); placeOnSpot(spot);};
  });
  screen.querySelectorAll('.hod-bench-chip').forEach(c=>{
    const p=roster.find(x=>playerKey(x)===c.dataset.key);
    c.onclick=()=>selectPlayer(p);
    c.ondragstart=e=>{_courtSel=p; e.dataTransfer.setData('text','x');};
  });
  screen.querySelectorAll('.hod-bench-row').forEach(b=>{
    b.ondragover=e=>e.preventDefault();
    b.ondrop=e=>{e.preventDefault(); placeOnBench(b.dataset.bench);};
    b.onclick=(e)=>{ if(_courtSel && !e.target.closest('.hod-bench-chip')) placeOnBench(b.dataset.bench); };
  });
  const done=document.getElementById('hod-court-done');
  if(done && !done.classList.contains('disabled')) done.onclick=()=>{ _courtSel=null; showResult(); };
  document.getElementById('hod-court-auto').onclick=()=>{ autoAssignRoles(roster); assignCourtSpots(); _courtSel=null; renderCourt(); };
}

// dnevni cilj banner v rezultatu
function dailyResultBanner(ev, sim){
  const g=dailyGoal();
  const done=g.test(ev, sim);
  const val=g.fmt(ev, sim);
  return `<div class="hod-daily-banner ${done?'done':'pending'}">
    <div style="font-family:'Bebas Neue';font-size:16px;letter-spacing:1px">DNEVNI CILJ</div>
    <div style="font-size:13px;margin:3px 0">${g.label}</div>
    <div style="font-size:18px;font-weight:600;color:${done?'var(--green)':'var(--gold-deep)'}">
      ${val} ${done?'✓ DOSEŽENO':(g.type==='sim'?'· simuliraj za preverbo':'· ni dovolj')}
    </div>
  </div>`;
}

function saveDailyResult(ev, sim){
  const g=dailyGoal();
  const done=g.test(ev, sim);
  const score=ev.overall;
  const rec=dailyRecord();
  const key=todayKey();
  const prev=rec[key];
  // shrani najboljši dosežek dneva
  if(!prev || score>prev.score || (done&&!prev.done)){
    rec[key]={score, done:done||(prev&&prev.done)||false, goal:g.id};
  }
  // streak: če je cilj dosežen danes in ni že štet
  if(done && (!prev || !prev.done)){
    const y=new Date(Date.now()-86400000);
    const ykey=`${y.getFullYear()}-${String(y.getMonth()+1).padStart(2,'0')}-${String(y.getDate()).padStart(2,'0')}`;
    rec._streak = (rec._lastWin===ykey || rec._lastWin===key) ? (rec._streak||0)+(rec._lastWin===key?0:1) : 1;
    rec._lastWin=key;
  }
  saveDailyRecord(rec);
}

function shareDaily(ev, sim){
  const g=dailyGoal();
  const done=g.test(ev, sim);
  const top=[...roster].sort((a,b)=>effRating(b)-effRating(a)).slice(0,3)
    .map(p=>lastNameCap(p)).join(', ');
  const txt=`🏀 Hall of Draft — dnevni izziv ${todayKey()}\n`
    +`Cilj: ${g.label}\n`
    +`${done?'✅ DOSEŽENO':'❌ ni doseženo'} — OVERALL ${ev.overall}, kemija ${ev.chem.chem>0?'+':''}${ev.chem.chem}\n`
    +`Zvezde: ${top}\n`
    +`Igraj: blazerculj-max.github.io/hall-of-draft/`;
  if(navigator.share){
    navigator.share({text:txt}).catch(()=>copyShare(txt));
  } else copyShare(txt);
}
function copyShare(txt){
  try{ navigator.clipboard.writeText(txt); alert("Rezultat kopiran! Prilepi ga kamorkoli."); }
  catch(e){ alert(txt); }
}

function runSimulation(abbr, conf, full){
  phase="simulating";
  const replaced=full.league.find(t=>t.abbr===abbr);
  // uporabnikova surova moč -> raztegni na isto lestvico kot ligaške moči
  const rawMy=userTeamStrength();
  const myStr=full.leagueMean+(rawMy-full.leagueMean)*(full.stretchK||1.5);
  const simLeague={season:full.season, leagueMean:full.leagueMean, stretchK:full.stretchK,
    league:full.league.map(t=>t.abbr===abbr?{...t,strength:myStr,name:"TVOJA EKIPA",mine:true}:t)};
  screen.innerHTML=`<div class="hod-slot-stage hod-fade">
    <div class="hod-stage-label">Simuliram sezono ×1000…</div>
    <div class="hod-reels"><div class="hod-reel spinning"><div class="hod-reel-strip">
      ${Array.from({length:6}).map(()=>`<div class="hod-reel-item"><div class="hod-reel-year">🏀</div></div>`).join('')}
    </div></div></div></div>`;
  setTimeout(()=>{
    const res=monteCarlo(myStr, simLeague, conf, 1000);
    showSimResult(res, replaced, conf, myStr, full);
  }, 600);
}

function showSimResult(res, replaced, conf, myStr, full){
  phase="simresult";
  const confName=conf==="E"?"Vzhodni":"Zahodni";
  const losses=82-res.avgWins;
  let verdict;
  if(res.titlePct>=40) verdict="Dinastija. Liga nima odgovora.";
  else if(res.titlePct>=20) verdict="Resen prvak — naslov je realen cilj.";
  else if(res.finalsPct>=30) verdict="Kontender. Finale na dosegu.";
  else if(res.playoffPct>=70) verdict="Trdna playoff ekipa.";
  else if(res.playoffPct>=35) verdict="Boj za play-in.";
  else verdict="Lottery. Sezona za pozabit.";
  // konferenčna lestvica (povprečje) — tvoja ekipa je že v confTeams (mine:true)
  const avgStr=full.league.reduce((s,t)=>s+t.strength,0)/full.league.length;
  const table=res.confTeams.map(t=>({
      name:t.mine?"TVOJA EKIPA":t.name,
      wins:t.mine?res.avgWins:Math.round(41+(t.strength-avgStr)*1.6),
      mine:!!t.mine
    }))
    .sort((a,b)=>b.wins-a.wins);
  const rows=table.map((t,i)=>`<div class="hod-stand-row ${t.mine?'mine':''}">
    <span>${i+1}. ${t.name}</span><span>${t.wins}-${82-t.wins}</span></div>`).join('');
  screen.innerHTML=`
    <div class="hod-result hod-fade">
      <div class="hod-stage-label">Simulacija: ${full.season} · ${confName} konf.</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">nadomestil: ${replaced.name}</div>
      <div class="hod-grade hod-pop" style="font-size:64px;color:var(--gold)">${res.avgWins}-${losses}</div>
      <div class="hod-overall">pričakovan rekord (razpon ${res.lo}–${res.hi} zmag)</div>
      <div class="hod-verdict">${verdict}</div>
      <div class="hod-sim-grid">
        <div class="hod-sim-stat"><b>${res.playoffPct}%</b><span>PLAYOFF</span></div>
        <div class="hod-sim-stat"><b>${res.top1Pct}%</b><span>1. MESTO</span></div>
        <div class="hod-sim-stat"><b>${res.finalsPct}%</b><span>FINALE</span></div>
        <div class="hod-sim-stat hod-sim-title"><b>${res.titlePct}%</b><span>NASLOV</span></div>
      </div>
      <div class="hod-stand-title">${confName} konferenca (povprečje)</div>
      <div class="hod-standings">${rows}</div>
      ${dailyMode?dailyResultBanner(evaluateTeam(), res):''}
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px">
        <button class="hod-btn secondary" id="hod-sim-again">Druga ekipa</button>
        ${dailyMode?'<button class="hod-btn" id="hod-share2" style="background:linear-gradient(180deg,#4cc9f0,#3a9fc4);box-shadow:0 5px 0 #2a7a99">Deli rezultat</button>':''}
        <button class="hod-btn secondary" id="hod-replay2">${dailyMode?'Znova (dnevni)':'Nova ekipa'}</button>
      </div>
    </div>`;
  document.getElementById('hod-sim-again').onclick=showTeamPicker;
  if(dailyMode){
    const ev=evaluateTeam();
    saveDailyResult(ev, res);   // shrani s simulacijskim rezultatom
    const sh=document.getElementById('hod-share2');
    if(sh) sh.onclick=()=>shareDaily(ev, res);
  }
  document.getElementById('hod-replay2').onclick=()=>{
    if(dailyMode){ startDaily(); return; }
    roster=[];chosenSeason=null;currentOffer=[];_cachedLeague=null;budgetSpent=0;renderProgress();showIntro();
  };
}

// init
function showLoading(){
  screen.innerHTML=`
    <div class="hod-slot-stage hod-fade">
      <div class="hod-stage-label">Nalagam igralce z GitHuba…</div>
      <div class="hod-reels">
        <div class="hod-reel spinning"><div class="hod-reel-strip">
          ${Array.from({length:6}).map(()=>`<div class="hod-reel-item"><div class="hod-reel-year">···</div></div>`).join('')}
        </div></div>
      </div>
      <div style="font-size:12px;color:var(--muted)">prvič lahko traja nekaj sekund</div>
    </div>`;
}
(async function(){
  // zagotovi mobilni viewport (artifact morda nima meta tag-a)
  try{
    if(!document.querySelector('meta[name="viewport"]')){
      const mv=document.createElement('meta');
      mv.name='viewport';
      mv.content='width=device-width, initial-scale=1, maximum-scale=1';
      document.head&&document.head.appendChild(mv);
    }
  }catch(e){}
  showLoading();
  await loadDataset();
  showIntro();
})();
})();
</script>
