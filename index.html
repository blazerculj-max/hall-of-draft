}

function makeOffer(){
  phase="offer";
  const allowed=forcedPositions();
  const left=budgetLeft();
  currentOffer=[];
  allowed.forEach(pos=>{
    let cands=chosenSeason.players.filter(p=>p.pos===pos && !isDrafted(p));
    // budget: ponudi le igralce, ki si jih še lahko privoščiš
    if(budgetMode){
      const afford=cands.filter(p=>playerCost(p)<=left);
      if(afford.length) cands=afford;
      else {
        // če si na tej poziciji ne moreš nič privoščiti, vzemi najcenejšega (fallback)
        cands=[...cands].sort((a,b)=>playerCost(a)-playerCost(b)).slice(0,1);
      }
    }
    if(cands.length){
      const pick=cands[Math.floor(rng()*cands.length)];
      currentOffer.push(pick);
    }
  });
  if(currentOffer.length===0){
    chosenSeason.players.forEach(p=>{if(allowed.includes(p.pos)&&!isDrafted(p))currentOffer.push(p);});
    currentOffer=currentOffer.slice(0,5);
  }
  const forced = (teamSize()-roster.length)<=missingPositions().length && missingPositions().length>0;
  const cards=currentOffer.map((p,i)=>{
    const allPos=playerPositions(p);
    const canTake=allPos.some(pos=>posCount(pos)<MAX_PER_POS);
    const cd=chemDelta(p);
    const sign=cd.level>0?'+'.repeat(cd.level):cd.level<0?'−'.repeat(-cd.level):'•';
    const cls=cd.level>0?'pos':cd.level<0?'neg':'neu';
    const chemBadge=roster.length>0
      ? `<div class="hod-chem-mini ${cls}" title="vpliv na kemijo">
           <span class="hod-chem-sign">${sign}</span>
           ${cd.reason?`<span class="hod-chem-why">${cd.reason}</span>`:''}
         </div>`
      : '';
    const cost=playerCost(p);
    const afterBuy=budgetLeft()-cost;
    const priceBadge=budgetMode
      ? `<div class="hod-price">${cost===0?'FREE':'$'+cost}</div>
         <div class="hod-after">→ $${afterBuy}</div>` : '';
    return `
    <div class="hod-pcard ${p.rating>=92?'elite':p.rating>=85?'good':''} ${canTake?'':'disabled'} hod-pop" data-i="${i}" style="animation-delay:${i*0.07}s">
      <div class="hod-pos-badge hod-pos-${p.pos}">${allPos.join('/')}</div>
      <div class="hod-pcard-photo">${avatarImg(p.pid,'hod-pcard-img')}</div>
      <div class="hod-pinfo">
        <div class="hod-pname">${p.name}</div>
        <div class="hod-pseason">${p.season}${canTake?'':' · pozicije polne'}</div>
        <div class="hod-pstats">
          <div><b>${p.pts}</b><span>PPG</span></div>
          <div><b>${p.reb}</b><span>RPG</span></div>
          <div><b>${p.ast}</b><span>APG</span></div>
        </div>
        ${chemBadge}
      </div>
      <div class="hod-pright">
        <div class="hod-prating ${ratingClass(p.rating)}">${p.rating}</div>
        ${priceBadge}
      </div>
    </div>`;
  }).join('');
  // WILD kartica "??" — naključen igralec iz trenutne sezone za fiksno ceno
  const wildAfford=!budgetMode || WILD_COST<=budgetLeft();
  const wildAvail=chosenSeason.players.some(p=>!isDrafted(p)&&playerPositions(p).some(pos=>posCount(pos)<MAX_PER_POS));
  const wildOk=wildAfford&&wildAvail;
  const wildCard=`
    <div class="hod-pcard hod-wild ${wildOk?'':'disabled'} hod-pop" id="hod-wild-card">
      <div class="hod-pos-badge hod-wild-badge">??</div>
      <div class="hod-pcard-photo hod-pcard-photo-wild"><span>?</span></div>
      <div class="hod-pinfo">
        <div class="hod-pname">Skrivnostni igralec</div>
        <div class="hod-pseason">naključen iz ${chosenSeason.year}${wildOk?'':' · ni na voljo'}</div>
        <div style="font-size:11px;color:var(--gold-deep);margin-top:4px">lahko zvezda ali polom — tvegaš?</div>
      </div>
      <div class="hod-pright">
        <div class="hod-prating" style="color:var(--gold)">?</div>
        ${budgetMode?`<div class="hod-price">$${WILD_COST}</div>
          <div class="hod-after">→ $${budgetLeft()-WILD_COST}</div>`:''}
      </div>
    </div>`;
  const budgetBar=budgetMode?`
    <div class="hod-budget-bar">
      <div class="hod-budget-row">
        <span>BUDGET</span>
        <span><b>$${budgetLeft()}</b> / $${budgetTotal}</span>
      </div>
      <div class="hod-budget-track"><div class="hod-budget-fill" style="width:${Math.max(0,budgetLeft()/budgetTotal*100)}%"></div></div>
    </div>`:'';
  setAction(`
    <div class="hod-fade">
      <div class="hod-stage-label" style="text-align:center">
        ${chosenSeason.year} · ${chosenSeason.era}${forced?' · <span style="color:var(--red)">zapolni manjkajoče pozicije</span>':''}
      </div>
      ${budgetBar}
      <div style="text-align:center;font-size:12px;color:var(--muted);margin-bottom:10px">Izberi enega igralca</div>
      <div class="hod-offer-grid">${cards}${wildCard}</div>
    </div>`);
  document.querySelectorAll('#hod-action .hod-pcard:not(.disabled):not(.hod-wild)').forEach(c=>{
    c.onclick=()=>choosePlayerPos(currentOffer[+c.dataset.i]);
  });
  const wc=document.getElementById('hod-wild-card');
  if(wc&&wildOk) wc.onclick=()=>takeWild();
}

// WILD: potegni naključnega še-ne-izbranega igralca iz trenutne sezone z dovoljeno pozicijo
function takeWild(){
  const allowed=forcedPositions();
  let cands=chosenSeason.players.filter(p=>!isDrafted(p)&&playerPositions(p).some(pos=>allowed.includes(pos)&&posCount(pos)<MAX_PER_POS));
  if(!cands.length){ cands=chosenSeason.players.filter(p=>!isDrafted(p)); }
  if(!cands.length) return;
  const pick=cands[Math.floor(rng()*cands.length)];
  // wild ima fiksno ceno (prepiše dejansko ceno igralca)
  const wildPick={...pick, wildCost:WILD_COST};
  revealWild(wildPick);
}

// če ima igralec več dovoljenih pozicij, vprašaj kam; sicer takoj dodaj
// isWild=true (skrivnostni igralec) -> brez preklica, ker je zaveza
function choosePlayerPos(p, isWild){
  const allPos=playerPositions(p);
  const takable=allPos.filter(pos=>posCount(pos)<MAX_PER_POS);
  if(takable.length<=1){ takePlayer(p, takable[0]||allPos[0]); return; }
  // izbirnik z rating-namigom na vsaki poziciji
  const btns=takable.map(pos=>{
    const c=posCount(pos);
    const r=ratingAtPos(p,pos);
    const pen=penaltyAtPos(p,pos);
    const cls=pen===0?'good':pen<=5?'mid':'bad';
    return `<button class="hod-btn hod-pos-pick" data-pos="${pos}">
      <span style="font-family:'Anton';font-size:22px">${pos}</span>
      <span class="hod-pick-rt ${cls}">${r}${pen>0?` <span class="hod-pen">-${pen}</span>`:''}</span>
      <span style="display:block;font-size:10px;letter-spacing:1px;opacity:.8">${c}/3</span>
    </button>`;
  }).join('');
  const a=document.getElementById('hod-action');
  const overlay=document.createElement('div');
  overlay.className='hod-pos-overlay';
  overlay.innerHTML=`
    <div class="hod-pos-modal hod-pop">
      <div class="hod-stage-label" style="text-align:center">${p.name}</div>
      <div style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:14px">Kam ga postaviš? <span style="color:var(--gold-deep)">(lahko spremeniš na koncu)</span></div>
      <div class="hod-pos-pick-row">${btns}</div>
      ${isWild?'':'<button class="hod-btn secondary" id="hod-pos-cancel" style="margin-top:12px">Prekliči</button>'}
    </div>`;
  a.appendChild(overlay);
  overlay.querySelectorAll('.hod-pos-pick').forEach(b=>{
    b.onclick=()=>{overlay.remove();takePlayer(p,b.dataset.pos);};
  });
  const cancel=overlay.querySelector('#hod-pos-cancel');
  if(cancel) cancel.onclick=()=>overlay.remove();
}

function takePlayer(p, assignedPos){
  const placed={...p, assignedPos: assignedPos||p.pos};
  if(budgetMode) budgetSpent += (p.wildCost!=null?p.wildCost:playerCost(placed));
  roster.push(placed);
  renderProgress();
  updateRosterSlot();
  if(teamFull()){ showRoleAssign(); return; }
  startSpin();
}

// ---- TEAM EVALUATION ----
function chemFor(arr){
  const posC=pos=>arr.filter(p=>effPos(p)===pos).length;
  // 1) ERA MATCH
  const eras={};
  arr.forEach(p=>{eras[p.era]=(eras[p.era]||0)+1;});
  const vals=Object.values(eras);
  const dominant=vals.length?Math.max(...vals):0;
  const eraSpread=Object.keys(eras).length;
  const eraScore=(dominant/MAX_TEAM)*6-(eraSpread-1)*1.2;

  // 2) POSITIONAL FIT + SOLO PRITISK
  const ideal={PG:2,SG:3,SF:2,PF:2,C:2};
  let fitPenalty=0, soloPress=0;
  POSITIONS.forEach(pos=>{
    const c=posC(pos);
    if(c===0){ fitPenalty+=4; }
    else{
      fitPenalty+=Math.abs(c-ideal[pos])*1.1;
      if(c===1) soloPress+=0.9;
    }
  });
  const fitScore=6-fitPenalty;
  const soloScore=-soloPress;

  // 3) SOIGRALCI + DUOJI + STILSKE VEZI
  let mateBonus=0, duoBonus=0, mateCount=0, duoList=[], bondList=[], styleScore=0;
  for(let i=0;i<arr.length;i++){
    for(let j=i+1;j<arr.length;j++){
      const a=arr[i], b=arr[j];
      const pc=pairChem(a,b);
      if(a.team&&b.team&&a.team===b.team&&a.season===b.season){
        mateBonus+=1.1; mateCount++;
      } else if(a.team&&b.team&&a.team===b.team){
        mateBonus+=0.4; mateCount++;
      }
      const duo=duoInfo(a.name,b.name);
      if(duo){ duoBonus+=1.6; duoList.push(duo.name); }
      if(pc.level>0 && pc.label){ bondList.push({label:pc.label, level:pc.level, a:lastName(a.name), b:lastName(b.name)}); }
      const sc=styleChem(a,b);
      if(sc){ styleScore+=sc.str; bondList.push({label:sc.label, level:sc.level, style:true, a:lastName(a.name), b:lastName(b.name)}); }
    }
  }
  mateBonus=Math.min(mateBonus,5);
  duoBonus=Math.min(duoBonus,4);
  styleScore=Math.max(-5,Math.min(6,styleScore));

  // 4) RIVALSTVA
  let rivalPenalty=0, rivalList=[];
  for(let i=0;i<arr.length;i++){
    for(let j=i+1;j<arr.length;j++){
      if(pairMatch(arr[i].name,arr[j].name,RIVALRIES)){
        rivalPenalty+=2.2; rivalList.push(`${lastName(arr[i].name)}–${lastName(arr[j].name)}`);
      }
    }
  }
  const rivalScore=-Math.min(rivalPenalty,6);

  let chem=eraScore+fitScore+soloScore+mateBonus+duoBonus+rivalScore+styleScore;
  const chemRaw=chem;
  chem=Math.max(-12,Math.min(12,Math.round(chem)));
  return {chem, chemRaw,
          eraScore:Math.round(eraScore*10)/10,
          fitScore:Math.round(fitScore*10)/10,
          soloScore:Math.round(soloScore*10)/10,
          mateBonus:Math.round(mateBonus*10)/10,
          duoBonus:Math.round(duoBonus*10)/10,
          rivalScore:Math.round(rivalScore*10)/10,
          dominant,eraSpread,eras,mateCount,duoList,rivalList,bondList};
}
function computeChemistry(){
  if(quickMode) return chemFor(roster.filter(p=>p.role==="U1"));
  return chemFor(roster);
}

// Δ-kemija: kako kandidat p vpliva na kemijo glede na trenutno ekipo.
// Temelji na ODNOSIH (soigralci, duoji, rivalstva) + solo-pritisku pozicije,
// NE na splošnem era/fit učinku (ta je zavajajoč dokler ekipa ni cela).
function relScore(arr){
  let s=0;
  for(let i=0;i<arr.length;i++){
    for(let j=i+1;j<arr.length;j++){
      const a=arr[i],b=arr[j];
      if(a.team&&b.team&&a.team===b.team&&a.season===b.season) s+=1.1;
      else if(a.team&&b.team&&a.team===b.team) s+=0.4;
      if(pairMatch(a.name,b.name,DUOS)) s+=1.6;
      if(pairMatch(a.name,b.name,RIVALRIES)) s-=2.2;
    }
  }
  // solo-pritisk: pozicije z natanko 1 igralcem
  POSITIONS.forEach(pos=>{ if(arr.filter(x=>effPos(x)===pos).length===1) s-=0.9; });
  return s;
}
function chemDelta(p){
  const d=relScore([...roster,p])-relScore(roster);
  let reason="";
  for(const m of roster){
    if(pairMatch(p.name,m.name,RIVALRIES)){reason="rival "+lastName(m.name);break;}
  }
  if(!reason) for(const m of roster){
    if(pairMatch(p.name,m.name,DUOS)){reason="duo z "+lastName(m.name);break;}
  }
  if(!reason) for(const m of roster){
    if(p.team&&m.team&&p.team===m.team&&p.season===m.season){reason="soigralec ("+p.team+")";break;}
  }
  if(!reason){
    const c=roster.filter(x=>x.pos===p.pos).length;
    if(c>=2) reason="pretrpana poz.";
  }
  let level=0;
  if(d>=2.5) level=3; else if(d>=1.3) level=2; else if(d>=0.3) level=1;
  else if(d<=-2.5) level=-3; else if(d<=-1.3) level=-2; else if(d<=-0.3) level=-1;
  // razlog "pretrpana poz." prikaži le ob dejansko negativnem učinku
  if(reason==="pretrpana poz." && level>=0) reason="";
  return {delta:Math.round(d*10)/10, level, reason};
}

// ===== VLOGE (starter/bench) + out-of-position kazen =====
const POS_LADDER=["PG","SG","SF","PF","C"];
// utež po vlogi: S=starter, 6=sixth man, R=role player, F=fringe
const ROLE_WEIGHT={U1:1.0, B:0.5};
const ROLE_SLOTS={U1:5, B:7};
const ROLE_LABEL={U1:"Peterka", B:"Klop"};
const ROLE_ORDER=["U1","B"];

// kazen za igro izven primarne pozicije
function posPenalty(p){
  const positions=playerPositions(p);
  const ap=effPos(p);
  if(positions[0]===ap) return 0;
  const idx=positions.indexOf(ap);
  if(idx===1) return 3;
  if(idx===2) return 5;
  const a=POS_LADDER.indexOf(ap);
  const minDist=Math.min(...positions.map(x=>Math.abs(POS_LADDER.indexOf(x)-a)));
  return 6+minDist*5;
}
// kazen, ki bi jo igralec imel na DOLOČENI poziciji (brez spreminjanja igralca)
function penaltyAtPos(p, pos){
  const positions=playerPositions(p);
  if(positions[0]===pos) return 0;
  const idx=positions.indexOf(pos);
  if(idx===1) return 3;
  if(idx===2) return 5;
  const a=POS_LADDER.indexOf(pos);
  const minDist=Math.min(...positions.map(x=>Math.abs(POS_LADDER.indexOf(x)-a)));
  return 6+minDist*5;
}
// približni rating, ki bi ga igralec imel na DOLOČENI poziciji (kot starter)
function ratingAtPos(p, pos){
  return Math.round(p.rating - penaltyAtPos(p, pos));
}
// stopnjevana par-kemija: vrne {level, str, label}
function pairChem(a,b){
  if(pairMatch(a.name,b.name,RIVALRIES)) return {level:-1, str:3, label:"Rivalstvo"};
  const duo=duoInfo(a.name,b.name);
  if(duo) return {level:3, str:4, label:duo.name};
  if(a.team&&b.team&&a.team===b.team&&a.season===b.season) return {level:3, str:3.5, label:`${a.team} ${shortSeason(a)}`};
  if(a.team&&b.team&&a.team===b.team) return {level:2, str:1.8, label:`${a.team} legenda`};
  if(a.era&&b.era&&a.era===b.era) return {level:1, str:0.7, label:"Ista doba"};
  return {level:0, str:0};
}
// kemija igralca = par-učinki ZNOTRAJ peterke + stilska kemija. Klop nevtralen.
function playerChemAdj(p){
  if(p.role!=="U1") return 0;
  const mates=roster.filter(x=>x.role==="U1"&&x!==p);
  let adj=0;
  mates.forEach(o=>{
    const c=pairChem(p,o); adj += (c.level<0?-1:1)*c.str;
    const sc=styleChem(p,o); if(sc) adj += sc.str;
  });
  return Math.max(-8, Math.min(8, adj));
}
function effRating(p){
  const base=p.rating - posPenalty(p) + playerChemAdj(p);
  const w=ROLE_WEIGHT[p.role||"U1"]||1.0;
  return Math.max(20, base*w);
}
function benchRating(p){ return Math.max(20, p.rating - posPenalty(p)); }
// pokritost klopi: vsaka pozicija naj ima rezervo; stopnjevana kazen po razdalji
function benchCoverage(){
  const bench=roster.filter(p=>p.role==="B");
  let penalty=0; const holes=[];
  POS_LADDER.forEach((pos,pi)=>{
    let best=99;
    bench.forEach(p=>{ playerPositions(p).forEach(pp=>{ const d=Math.abs(POS_LADDER.indexOf(pp)-pi); if(d<best)best=d; }); });
    if(best===0) return;
    if(best===99){ penalty+=2.2; holes.push(pos); return; }
    penalty += best*0.9;
  });
  return {penalty:Math.min(penalty,7), holes};
}
// avto: peterka = najboljših 5 (pokrij pozicije), ostalih 7 klop. quickfire = samo peterka, ostalo "X"
function autoAssignRoles(arr){
  const byRating=[...arr].sort((a,b)=>b.rating-a.rating);
  const used=new Set();
  function pickFive(){
    const five=[];
    POS_LADDER.forEach(pos=>{ const c=byRating.find(p=>!used.has(p)&&playerPositions(p)[0]===pos); if(c){five.push(c);used.add(c);} });
    for(const p of byRating){ if(five.length>=5)break; if(!used.has(p)){five.push(p);used.add(p);} }
    return five;
  }
  if(quickMode){
    arr.forEach(p=>{p.role="X"; p.spot=null; p.assignedPos=playerPositions(p)[0];});
    const u1=pickFive(); u1.forEach(p=>{p.role="U1"; p.spot=playerPositions(p)[0]; p.assignedPos=p.spot;});
    fixUnitSpots("U1");
    return arr;
  }
  arr.forEach(p=>{p.role="B"; p.spot=null;});
  const u1=pickFive(); u1.forEach(p=>{p.role="U1"; p.spot=playerPositions(p)[0]; p.assignedPos=p.spot;});
  arr.filter(p=>p.role==="B").forEach(p=>{p.assignedPos=playerPositions(p)[0];});
  fixUnitSpots("U1");
  return arr;
}
function fixUnitSpots(role){
  const unit=roster.filter(p=>p.role===role);
  const taken={};
  unit.forEach(p=>{ if(p.spot&&!taken[p.spot]) taken[p.spot]=p; else p.spot=null; });
  unit.forEach(p=>{ if(!p.spot){ const free=POS_LADDER.find(s=>!taken[s]); if(free){p.spot=free;taken[free]=p;p.assignedPos=free;} } });
}

function evaluateTeam(){
  if(!roster.some(p=>p.role)) autoAssignRoles(roster);
  if(quickMode){
    const u1=roster.filter(p=>p.role==="U1");
    const u1Avg=u1.length?u1.reduce((s,p)=>s+effRating(p),0)/u1.length:0;
    const posSpread=POS_LADDER.filter(s=>u1.some(p=>p.spot===s)).length;
    const stars=u1.filter(p=>p.rating>=92).length;
    const starBonus=Math.min(stars*1.5,6);
    const chemObj=computeChemistry();
    let overall=u1Avg*0.78 + 60*0.15 + starBonus + chemObj.chem*0.9;
    overall=Math.max(40,Math.min(99,Math.round(overall)));
    return {overall, starterAvg:Math.round(u1Avg*10)/10, fullAvg:Math.round(u1Avg*10)/10,
            depth:0, benchHoles:[], stars, posSpread, top5:u1, chem:chemObj};
  }
  const u1=roster.filter(p=>p.role==="U1");
  const bench=roster.filter(p=>p.role==="B");
  const avg=(a,fn)=>a.length?a.reduce((s,p)=>s+fn(p),0)/a.length:0;
  const u1Avg=avg(u1,effRating);
  const benchAvg=avg(bench,benchRating);
  const depth=bench.length?(benchAvg-60)*0.12:0;
  const cov=benchCoverage();
  const posSpread=POSITIONS.filter(p=>posCount(p)>=1).length;
  const stars=roster.filter(p=>p.rating>=92).length;
  const starBonus=Math.min(stars*1.3,5);
  const chemObj=computeChemistry();
  let overall=u1Avg*0.74 + 60*0.15 + depth + starBonus + chemObj.chem*0.9 - cov.penalty;
  overall=Math.max(40,Math.min(99,Math.round(overall)));
  const fullAvg=Math.round((u1Avg*0.78+benchAvg*0.22)*10)/10;
  return {overall, starterAvg:Math.round(u1Avg*10)/10, fullAvg,
          depth:Math.round(depth*10)/10, benchHoles:cov.holes,
          stars, posSpread, top5:u1.length?u1:roster.slice(0,5), chem:chemObj};
}
function _oldEvaluateTeam(){
  let overall = starterAvg*0.52 + fullAvg*0.28 + 60*0.15
              + starBonus + chemObj.chem*0.9;
  overall=Math.max(40,Math.min(99,Math.round(overall)));
  return {overall,starterAvg:Math.round(starterAvg*10)/10,
          fullAvg:Math.round(fullAvg*10)/10,stars,posSpread,
          top5:starters.length?starters:eff.slice(0,5).map(x=>x.p),chem:chemObj};
}

function gradeFor(o){
  if(o>=95)return{g:"S+",c:"#ffd60a",v:"Nesmrtna ekipa. To je all-time superteam — algoritem nima možnosti."};
  if(o>=90)return{g:"S",c:"#ffd60a",v:"Šampionska zasedba. Globina in zvezde se ujemajo skoraj popolno."};
  if(o>=86)return{g:"A",c:"#2ec4b6",v:"Resen kandidat za naslov. Močna prva peterka, spodobna klop."};
  if(o>=82)return{g:"B",c:"#4cc9f0",v:"Solidna playoff ekipa. Nekaj zvezd, a globina niha."};
  if(o>=77)return{g:"C",c:"#90a4ae",v:"Sredina lestvice. Igrljivo, a brez prave udarne moči."};
  if(o>=72)return{g:"D",c:"#ff8500",v:"Lottery ekipa. Sreča pri vlekih te ni ravno mazala."};
  return{g:"F",c:"#e63946",v:"Tank mode. Ampak hej — vsaj imaš zgodbo za pripovedovati."};
}

function mpTeamPosCount(team,pos){return team.roster.filter(p=>effPos(p)===pos).length;}
function mpAllFull(){return mp.teams.every(t=>t.roster.length>=MAX_TEAM);}
// pozicije, ki jih ekipa še sme dodati (z upoštevanjem min 1/poz proti koncu)
function mpAllowedPos(team){
  const slotsLeft=MAX_TEAM-team.roster.length;
  const missing=POSITIONS.filter(p=>mpTeamPosCount(team,p)<1);
  if(slotsLeft<=missing.length && missing.length>0) return missing;
  return POSITIONS.filter(p=>mpTeamPosCount(team,p)<MAX_PER_POS);
}

function mpStartRound(){
  phase="mp-spin";
  // izberi naključno sezono iz filtriranega bazena
  const pool=filteredPool();
  mp.spinSeason=pool[Math.floor(Math.random()*pool.length)];
  // slot machine animacija (en kolut), nato sestavi bazen 10 igralcev
  setMpFrame();
  mpRenderTeams();   // roster ostane viden med vrtenjem
  setMpAction(`
    <div class="hod-slot-stage hod-fade">

        `<div class="hod-reel-item"><div class="hod-reel-year">${s.year.split('-')[0]}</div><div class="hod-reel-era">${s.era}</div></div>`;
      reel.querySelector('.hod-reel-strip').style.transform='translateY(0)';}
    mpBuildPool();
    setTimeout(mpShowPick,500);
  },1400);
}

// bazen 10 igralcev: po 2 na vsako pozicijo (uravnoteženo), naključno iz sezone
function mpBuildPool(){
  const s=mp.spinSeason; const pool=[];
  POSITIONS.forEach(pos=>{
    const cands=s.players.filter(p=>p.pos===pos && !isDrafted(p));
    // premešaj in vzemi do 2
    for(let k=cands.length-1;k>0;k--){const j=Math.floor(Math.random()*(k+1));[cands[k],cands[j]]=[cands[j],cands[k]];}
    pool.push(...cands.slice(0,2));
  });
  // če katera pozicija nima 2, dopolni z naključnimi iz sezone
  if(pool.length<10){
    const extra=s.players.filter(p=>!pool.includes(p) && !isDrafted(p));
    for(let k=extra.length-1;k>0;k--){const j=Math.floor(Math.random()*(k+1));[extra[k],extra[j]]=[extra[j],extra[k]];}
    pool.push(...extra.slice(0,10-pool.length));
  }
  mp.pool=pool;
  mp.pickIdx=0;
}

function mpShowPick(){
  phase="mp-pick";
  // če so vse ekipe polne -> rezultat
  if(mpAllFull()){ mpShowResults(); return; }
  // poišči naslednjo ekipo v tej rundi, ki še ni polna
  while(mp.pickIdx<mp.order.length){
    const t=mp.teams[mp.order[mp.pickIdx]];
    if(t.roster.length<MAX_TEAM) break;
    mp.pickIdx++;
  }
  if(mp.pickIdx>=mp.order.length){ mpNextRound(); return; }
  const teamI=mp.order[mp.pickIdx];
  const team=mp.teams[teamI];
  const allowed=mpAllowedPos(team);
  const forced = (MAX_TEAM-team.roster.length)<=POSITIONS.filter(p=>mpTeamPosCount(team,p)<1).length
                 && POSITIONS.filter(p=>mpTeamPosCount(team,p)<1).length>0;
  // kartice iz bazena; onemogočene tiste, ki jih ta ekipa ne sme/zmore
  const cards=mp.pool.map((p,i)=>{
    const allPos=playerPositions(p);
    const playable=allPos.filter(pos=>allowed.includes(pos));
    const posOk=playable.length>0;
    const cost=budgetMode?playerCost(p):0;
    const affordOk=!budgetMode || cost<=(budgetTotal-team.spent);
    const ok=posOk&&affordOk;
    const why=!posOk?'pozicije polne':(!affordOk?'predrag':'');
    return `
    <div class="hod-pcard ${p.rating>=92?'elite':p.rating>=85?'good':''} ${ok?'':'disabled'} hod-pop" data-i="${i}" style="animation-delay:${i*0.04}s">
      <div class="hod-pos-badge hod-pos-${p.pos}">${allPos.join('/')}</div>
      <div class="hod-pcard-photo">${avatarImg(p.pid,'hod-pcard-img')}</div>
      <div class="hod-pinfo">
        <div class="hod-pname">${p.name}</div>
        <div class="hod-pseason">${p.season}${why?' · '+why:''}</div>
        <div class="hod-pstats">
          <div><b>${p.pts}</b><span>PPG</span></div>
          <div><b>${p.reb}</b><span>RPG</span></div>
          <div><b>${p.ast}</b><span>APG</span></div>
        </div>
      </div>
      <div class="hod-pright">
        <div class="hod-prating ${ratingClass(p.rating)}">${p.rating}</div>
        ${budgetMode?`<div class="hod-price">${cost===0?'FREE':'$'+cost}</div>
          <div class="hod-after">→ $${(budgetTotal-team.spent)-cost}</div>`:''}
      </div>
    </div>`;
  }).join('');
  // WILD kartica za multiplayer (skupaj numPlayers kart na voljo)
  const wildAfford=!budgetMode || WILD_COST<=(budgetTotal-team.spent);
  const wildPoolAvail=mp.spinSeason.players.some(p=>!isDrafted(p)&&playerPositions(p).some(pos=>allowed.includes(pos)&&mpTeamPosCount(team,pos)<MAX_PER_POS));
  const wildOk=mp.wildLeft>0 && wildAfford && wildPoolAvail;
  const wildCard=`
    <div class="hod-pcard hod-wild ${wildOk?'':'disabled'} hod-pop" id="hod-mp-wild">
      <div class="hod-pos-badge hod-wild-badge">??</div>
      <div class="hod-pcard-photo hod-pcard-photo-wild"><span>?</span></div>
      <div class="hod-pinfo">
        <div class="hod-pname">Skrivnostni igralec</div>
        <div class="hod-pseason">naključen iz ${mp.spinSeason.year} · ${mp.wildLeft} ostalo${wildOk?'':' · ni na voljo'}</div>
        <div style="font-size:11px;color:var(--gold-deep);margin-top:4px">zvezda ali polom?</div>
      </div>
      <div class="hod-pright">
        <div class="hod-prating" style="color:var(--gold)">?</div>
        ${budgetMode?`<div class="hod-price">$${WILD_COST}</div>
          <div class="hod-after">→ $${(budgetTotal-team.spent)-WILD_COST}</div>`:''}
      </div>
    </div>`;
  // vrstni red runde (vizualno)
  const orderTags=mp.order.map((ti,idx)=>`<span class="hod-order-tag ${idx===mp.pickIdx?'active':''}" style="--tc:${MP_COLORS[ti]}">${mp.teams[ti].name}</span>`).join('');
  setMpFrame();
  setMpAction(`
    <div class="hod-fade">
      <div class="hod-stage-label" style="text-align:center">
        Runda ${mp.round+1} · ${mp.spinSeason.year}${forced?' · <span style="color:var(--red)">zapolni manjkajoče</span>':''}
      </div>
      <div class="hod-mp-turn" style="--tc:${MP_COLORS[teamI]}">
        Na potezi: <b>${team.name}</b> &nbsp;(${team.roster.length}/12)${budgetMode?` · $${budgetTotal-team.spent}`:''}
      </div>
      <div class="hod-order-strip">${orderTags}</div>
      <div class="hod-offer-grid hod-mp-grid">${cards}${wildCard}</div>
    </div>`);
  document.querySelectorAll('#hod-action .hod-pcard:not(.disabled):not(.hod-wild)').forEach(c=>{
    c.onclick=()=>mpPick(+c.dataset.i);
  });
  const wc=document.getElementById('hod-mp-wild');
  if(wc&&wildOk) wc.onclick=()=>mpWild();
  mpRenderTeams();
}

// MP WILD: naključen še-ne-izbran igralec iz trenutne sezone z dovoljeno pozicijo
function mpWild(){
  const teamI=mp.order[mp.pickIdx];
  const team=mp.teams[teamI];
  const allowed=mpAllowedPos(team);
  let cands=mp.spinSeason.players.filter(p=>!isDrafted(p)&&playerPositions(p).some(pos=>allowed.includes(pos)&&mpTeamPosCount(team,pos)<MAX_PER_POS));
  if(!cands.length) cands=mp.spinSeason.players.filter(p=>!isDrafted(p));
  if(!cands.length) return;
  const pick=cands[Math.floor(Math.random()*cands.length)];
  mp.wildLeft--;
  // reveal nato dodelitev pozicije
  const a=document.getElementById('hod-action');
  const ov=document.createElement('div');
  ov.className='hod-pos-overlay';
  ov.innerHTML=`<div class="hod-pos-modal hod-pop" style="text-align:center">
    <div class="hod-stage-label">${team.name} — skrivnostni igralec…</div>
    <div class="hod-prating ${ratingClass(pick.rating)}" style="font-size:48px;margin:8px 0">${pick.rating}</div>
    <div class="hod-pname" style="font-size:20px">${pick.name}</div>
    <div class="hod-pseason">${playerPositions(pick).join('/')} · ${pick.season} · ${pick.pts}/${pick.reb}/${pick.ast}</div>
    <button class="hod-btn" id="hod-mpwild-ok" style="margin-top:14px">${budgetMode?'Vzemi za $'+WILD_COST:'Dodaj'}</button>
  </div>`;
  a.appendChild(ov);
  ov.querySelector('#hod-mpwild-ok').onclick=()=>{
    ov.remove();
    mpWildPlace(pick);
  };
}
function mpWildPlace(pick){
  const teamI=mp.order[mp.pickIdx];
  const team=mp.teams[teamI];
  const allowed=mpAllowedPos(team);
  const playable=playerPositions(pick).filter(pos=>allowed.includes(pos));
  // če več pozicij, izbirnik; sicer takoj
  if(playable.length<=1){
    team.roster.push({...pick, assignedPos:playable[0]||pick.pos, wildCost:WILD_COST});
    if(budgetMode) team.spent+=WILD_COST;
    mp.pickIdx++; mpRenderTeams(); mpShowPick(); return;
  }
  const btns=playable.map(pos=>{
    const c=mpTeamPosCount(team,pos);
    return `<button class="hod-btn hod-pos-pick" data-pos="${pos}"><span style="font-family:'Anton';font-size:22px">${pos}</span><span style="display:block;font-size:10px;letter-spacing:1px;opacity:.8">${c}/3</span></button>`;
  }).join('');
  const a=document.getElementById('hod-action');
  const ov=document.createElement('div');
  ov.className='hod-pos-overlay';
  ov.innerHTML=`<div class="hod-pos-modal hod-pop">
    <div class="hod-stage-label" style="text-align:center">${pick.name}</div>
    <div style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:14px">${team.name} — kam ga postaviš?</div>
    <div class="hod-pos-pick-row">${btns}</div>
  </div>`;
  a.appendChild(ov);
  ov.querySelectorAll('.hod-pos-pick').forEach(b=>{
    b.onclick=()=>{
      ov.remove();
      team.roster.push({...pick, assignedPos:b.dataset.pos, wildCost:WILD_COST});
      if(budgetMode) team.spent+=WILD_COST;
      mp.pickIdx++; mpRenderTeams(); mpShowPick();
    };
  });
}

function mpPick(poolIdx){
  const teamI=mp.order[mp.pickIdx];
  const team=mp.teams[teamI];
  const p=mp.pool[poolIdx];
  const allowed=mpAllowedPos(team);
  const playable=playerPositions(p).filter(pos=>allowed.includes(pos));
  if(playable.length<=1){ mpPlace(poolIdx, playable[0]||p.pos); return; }
  // izbirnik
  const btns=playable.map(pos=>{
    const c=mpTeamPosCount(team,pos);
    return `<button class="hod-btn hod-pos-pick" data-pos="${pos}">
      <span style="font-family:'Anton';font-size:22px">${pos}</span>
      <span style="display:block;font-size:10px;letter-spacing:1px;opacity:.8">${c}/3</span>
    </button>`;
  }).join('');
  const a=document.getElementById('hod-action');
  const overlay=document.createElement('div');
  overlay.className='hod-pos-overlay';
  overlay.innerHTML=`<div class="hod-pos-modal hod-pop">
    <div class="hod-stage-label" style="text-align:center">${p.name}</div>
    <div style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:14px">${team.name} — kam ga postaviš?</div>
    <div class="hod-pos-pick-row">${btns}</div>
    <button class="hod-btn secondary" id="hod-pos-cancel" style="margin-top:12px">Prekliči</button>
  </div>`;
  a.appendChild(overlay);
  overlay.querySelectorAll('.hod-pos-pick').forEach(b=>{
    b.onclick=()=>{overlay.remove();mpPlace(poolIdx,b.dataset.pos);};
  });
  overlay.querySelector('#hod-pos-cancel').onclick=()=>overlay.remove();
}
function mpPlace(poolIdx, assignedPos){
  const teamI=mp.order[mp.pickIdx];
  const team=mp.teams[teamI];
  const p=mp.pool[poolIdx];
  team.roster.push({...p, assignedPos});
  if(budgetMode) team.spent+=playerCost(p);
  mp.pool.splice(poolIdx,1);
  mp.pickIdx++;
  mpRenderTeams();   // takoj osveži roster prikaz (da igralec ne "pade ven")
  mpShowPick();
}

function mpNextRound(){
  // rotacija reda za eno mesto: [a,b,c,d] -> [b,c,d,a]
  mp.order.push(mp.order.shift());
  mp.round++;
  mp.pickIdx=0;
  if(mpAllFull()){ mpShowResults(); return; }
  mpStartRound();
}

function mpRenderTeams(){
  const slot=document.getElementById('hod-roster-slot');
  if(!slot) return;
  slot.innerHTML=mp.teams.map((t,ti)=>{
    const chips=POSITIONS.map(pos=>{
      const ps=t.roster.filter(p=>effPos(p)===pos);
      return ps.map(p=>`<span class="hod-chip">${lastNameCap(p)} <span style="color:var(--muted);font-size:10px">${shortSeason(p)}</span> <b style="color:var(--gold)">${p.rating}</b></span>`).join('');
    }).join('');
    // pregled zasedenosti pozicij PG/SG/SF/PF/C
    const posBar=POSITIONS.map(pos=>{
      const n=mpTeamPosCount(t,pos);
      const cls = n>=MAX_PER_POS ? 'full' : n>0 ? 'has' : 'empty';
      return `<span class="hod-mp-pos ${cls}">${pos}<b>${n}</b></span>`;
    }).join('');
    return `<div class="hod-mp-team" style="--tc:${MP_COLORS[ti]}">
      <div class="hod-mp-team-head"><span>${t.name}</span><span>${t.roster.length}/12</span></div>
      <div class="hod-mp-posbar">${posBar}</div>
      <div class="hod-mp-team-chips">${chips||'<span class="hod-chip empty">prazno</span>'}</div>
    </div>`;
  }).join('');
}

function mpShowResults(){
  phase="mp-result";
  // oceni vsako ekipo prek obstoječe evaluateTeam (zacasno nastavi global roster)
  const savedRoster=roster, savedBudget=[budgetSpent];
  const ranked=mp.teams.map((t,ti)=>{
    roster=t.roster;
    const ev=evaluateTeam();
    return {ti,name:t.name,ev,overall:ev.overall,spent:t.spent};
  }).sort((a,b)=>b.overall-a.overall);
  roster=savedRoster; budgetSpent=savedBudget[0];

  const cards=ranked.map((r,idx)=>{
    const gr=gradeFor(r.overall);

// ---- SIMULACIJA ----
function userTeamStrength(){
  const ev=evaluateTeam();
  const pool=quickMode?roster.filter(p=>p.role==="U1"):roster;
  const sorted=[...pool].map(p=>effRating(p)).sort((a,b)=>b-a).slice(0,8);
  const w=[0.22,0.18,0.15,0.12,0.1,0.09,0.08,0.06];
  let str=0,wsum=0;
  sorted.forEach((er,i)=>{const wi=w[i]||0.05;str+=er*wi;wsum+=wi;});
  str=str/wsum;
  str += ev.chem.chem*0.5;
  return str;
}
function winProb(a,b,home){
  const HCA=2.5;             // home court advantage (v točkah moči)
  const D=30;                // občutljivost (kalibrirano: +12 moči ≈ 70% zmage)
  const diff=(a-b)+(home?HCA:-HCA);
  return 1/(1+Math.pow(10,-diff/D));
}
function winProbPlayoff(a,b){
  // playoffi so bolj negotovi (best-of-7, oblika, poškodbe) -> višji D
  const D=55;
  return 1/(1+Math.pow(10,-(a-b)/D));
}
function simSeason(myStr, league){
  let wins=0; const games=82, n=league.length;
  for(let g=0;g<games;g++){
    const opp=league[g%n];
    const home=(g%2===0);
    if(Math.random()<winProb(myStr,opp.strength,home)) wins++;
  }
  return wins;
}
function monteCarlo(myStr, full, myConf, runs){
  const confTeams=full.league.filter(t=>t.conf===myConf);
  const confStr=confTeams.filter(t=>!t.mine).map(t=>t.strength).sort((a,b)=>a-b);
  const qStr=p=>confStr[Math.floor(confStr.length*p)]||confStr[confStr.length-1];
  let winsSum=0, winsArr=[], playoff=0, top1=0, finals=0, titles=0;
  const avgStr=full.league.reduce((s,t)=>s+t.strength,0)/full.league.length;
  for(let r=0;r<runs;r++){
    const myWins=simSeason(myStr, full.league);
    winsSum+=myWins; winsArr.push(myWins);
    const standings=confTeams.filter(t=>!t.mine).map(t=>{
      return {abbr:t.abbr, wins:41+(t.strength-avgStr)*1.6 + (Math.random()-0.5)*10};
    });
    standings.push({abbr:"__ME__", wins:myWins});
    standings.sort((a,b)=>b.wins-a.wins);
    const myRank=standings.findIndex(t=>t.abbr==="__ME__")+1;
    if(myRank<=8) playoff++;
    if(myRank===1) top1++;
    // playoff napredovanje: 4 best-of-7 serije proti vse močnejšim nasprotnikom
    if(myRank<=8){
      const opps=[qStr(0.5),qStr(0.7),qStr(0.88),qStr(0.97)+3];
      let rounds=0;
      for(let k=0;k<4;k++){
        const pg=winProbPlayoff(myStr,opps[k]);
        let pSeries=0;
        for(let w=4;w<=7;w++){const c=[1,4,10,20][w-4];pSeries+=c*Math.pow(pg,4)*Math.pow(1-pg,w-4);}
        pSeries=Math.min(pSeries,0.9);
        if(Math.random()<pSeries) rounds++; else break;
      }
      if(rounds>=3) finals++;
      if(rounds>=4) titles++;
    }
  }
  winsArr.sort((a,b)=>a-b);
  return {
    avgWins:Math.round(winsSum/runs),
    medWins:Math.round(winsArr[Math.floor(runs/2)]),
    lo:Math.round(winsArr[Math.floor(runs*0.1)]),
    hi:Math.round(winsArr[Math.floor(runs*0.9)]),
    playoffPct:Math.round(playoff/runs*100),
    top1Pct:Math.round(top1/runs*100),
    finalsPct:Math.round(finals/runs*100),
    titlePct:Math.round(titles/runs*100),
    confTeams
  };
}

// vsak starter dobi 'spot' (PG/SG/SF/PF/C). Poskusi po njihovi assignedPos/primarni.
function assignCourtSpots(){
  const starters=roster.filter(p=>p.role==="S");
  const spots=["PG","SG","SF","PF","C"];
  const taken={};
  // 1) tisti, ki so že na svoji poziciji
  starters.forEach(p=>{p.spot=null;});
  starters.forEach(p=>{
    const want=effPos(p);
    if(spots.includes(want)&&!taken[want]){p.spot=want;taken[want]=p;}
  });
  // 2) preostali na prosta mesta
  starters.forEach(p=>{
    if(p.spot) return;
    const free=spots.find(s=>!taken[s]);
    if(free){p.spot=free;taken[free]=p;}
  });
  // starterjeva pozicija = njegovo mesto
  starters.forEach(p=>{ if(p.spot) p.assignedPos=p.spot; });
}

function wireCourt(){
  function selectPlayer(p){ _courtSel=(_courtSel===p)?null:p; renderCourt(); }
  function placeOnSpot(unit, spot){
    if(!_courtSel) return;
    const sel=_courtSel;
    const occ=roster.find(p=>p.role===unit&&p.spot===spot&&p!==sel);
    if(sel.role==="U1"){
      const fromSpot=sel.spot;
      if(occ){ occ.role="U1"; occ.spot=fromSpot; occ.assignedPos=fromSpot; }
      sel.role=unit; sel.spot=spot; sel.assignedPos=spot;
    } else {
      const prevRole=sel.role;
      if(occ){ occ.role=prevRole||(quickMode?null:null); occ.spot=null; occ.assignedPos=playerPositions(occ)[0]; }
      sel.role=unit; sel.spot=spot; sel.assignedPos=spot;
    }
    _courtSel=null; renderCourt();
  }
  function placeOnBench(role){
    if(!_courtSel) return;
    const sel=_courtSel;
    if(role==="pool"){ sel.role=null; sel.spot=null; sel.assignedPos=playerPositions(sel)[0]; _courtSel=null; renderCourt(); return; }
    const cap=ROLE_SLOTS.B;
    const inRole=roster.filter(p=>p.role==="B"&&p!==sel);
    if(inRole.length>=cap){ const v=inRole[inRole.length-1]; v.role=null; v.spot=null; }
    sel.role="B"; sel.spot=null; sel.assignedPos=playerPositions(sel)[0];
    _courtSel=null; renderCourt();
  }
  screen.querySelectorAll('.hod-spot').forEach(el=>{
    const spot=el.dataset.spot, unit=el.dataset.unit;
    const p=roster.find(x=>x.role===unit&&x.spot===spot);
    el.onclick=()=>{ if(_courtSel) placeOnSpot(unit,spot); else if(p) selectPlayer(p); };
    if(p){ el.setAttribute('draggable','true'); el.ondragstart=e=>{_courtSel=p; e.dataTransfer.setData('text','x');}; }
    el.ondragover=e=>e.preventDefault();
    el.ondrop=e=>{e.preventDefault(); placeOnSpot(unit,spot);};
  });
  screen.querySelectorAll('.hod-bench-chip').forEach(c=>{
    const p=roster.find(x=>playerKey(x)===c.dataset.key);
    c.onclick=(e)=>{ e.stopPropagation(); selectPlayer(p); };
    c.ondragstart=e=>{_courtSel=p; e.dataTransfer.setData('text','x');};
  });
  screen.querySelectorAll('.hod-uacard').forEach(c=>{
    const p=roster.find(x=>playerKey(x)===c.dataset.key);
    c.onclick=(e)=>{ e.stopPropagation(); selectPlayer(p); };
    c.ondragstart=e=>{_courtSel=p; e.dataTransfer.setData('text','x');};
  });
  screen.querySelectorAll('.hod-unassigned-box').forEach(b=>{
    b.ondragover=e=>e.preventDefault();
    b.ondrop=e=>{e.preventDefault(); placeOnBench('pool');};
  });
  screen.querySelectorAll('.hod-bench-row').forEach(b=>{
    b.ondragover=e=>e.preventDefault();
    b.ondrop=e=>{e.preventDefault(); placeOnBench(b.dataset.bench);};
    b.onclick=(e)=>{ if(_courtSel && !e.target.closest('.hod-bench-chip')) placeOnBench(b.dataset.bench); };
  });
  const done=document.getElementById('hod-court-done');

}

function dailyResultBanner(ev, sim){

  return `<div class="hod-daily-banner ${done?'done':'pending'}">

    <div style="font-size:18px;font-weight:600;color:${done?'var(--green)':'var(--gold-deep)'}">
      ${val} ${done?'✓ DOSEŽENO':(g.type==='sim'?'· simuliraj za preverbo':'· ni dovolj')}
    </div>
  </div>`;
}

function saveDailyResult(ev, sim){
  const g=dailyGoal();
  const done=g.test(ev, sim);
  const score=ev.overall;
  const rec=dailyRecord();
  const key=todayKey();
  const prev=rec[key];
  const firstWinToday = done && (!prev || !prev.done);
  const firstPlayToday = !prev;  // danes prvič odigran daily challenge
  // shrani najboljši dosežek dneva
  if(!prev || score>prev.score || (done&&!prev.done)){
    rec[key]={score, done:done||(prev&&prev.done)||false, goal:g.id};
  }
  // streak: če je cilj dosežen danes in ni že štet
  if(done && (!prev || !prev.done)){
    const y=new Date(Date.now()-86400000);
    const ykey=`${y.getFullYear()}-${String(y.getMonth()+1).padStart(2,'0')}-${String(y.getDate()).padStart(2,'0')}`;
    rec._streak = (rec._lastWin===ykey || rec._lastWin===key) ? (rec._streak||0)+(rec._lastWin===key?0:1) : 1;
    rec._lastWin=key;
  }
  saveDailyRecord(rec);
  return {done, firstWinToday, firstPlayToday};
}

function shareDaily(ev, sim){
  const g=dailyGoal();

  const top=[...roster].sort((a,b)=>effRating(b)-effRating(a)).slice(0,3)
    .map(p=>lastNameCap(p)).join(', ');
  const txt=`🏀 Hall of Draft — dnevni izziv ${todayKey()}\n`
    +`Cilj: ${g.label}\n`
    +`${done?'✅ DOSEŽENO':'❌ ni doseženo'} — OVERALL ${ev.overall}, kemija ${ev.chem.chem>0?'+':''}${ev.chem.chem}\n`
    +`Zvezde: ${top}\n`
    +`Igraj: blazerculj-max.github.io/hall-of-draft/`;
  if(navigator.share){
    navigator.share({text:txt}).catch(()=>copyShare(txt));
  } else copyShare(txt);
}

  try{ navigator.clipboard.writeText(txt); alert("Rezultat kopiran! Prilepi ga kamorkoli."); }

}

async function postToLeaderboard(ev, sim, btn){
  const nick=resolveNick();
  if(!nick) return;
  if(btn){ btn.disabled=true; btn.textContent="Objavljam…"; }
  const mode=currentMode();
  const g=dailyMode?dailyGoal():null;
  const goalDone=g?!!g.test(ev,sim):false;
  // dnevni rezultat za lestvico = overall + 30 (če opravljen izziv)
  const lbScore = Math.round(dailyMode ? (ev.overall + (goalDone?30:0)) : ev.overall);
  const row={
    mode, challenge_day:todayKey(), nickname:nick,
    goal_id:g?g.id:null, goal_done:goalDone,
    overall:lbScore, chem:ev.chem.chem,
    sim_wins: sim?sim.avgWins:null, sim_title: sim?sim.titlePct:null,
    daily_budget: dailyMode?(dailyBudget()||"neomejen"):null,
    roster: rosterForSave()||[]
  };
  try{
    await supaSubmit(row);
    if(btn){ btn.textContent="✓ Objavljeno"; }
    _myLastPost={nick, overall:lbScore, mode};   // za označitev v lestvici
    showLeaderboard();
  }catch(e){
    if(btn){ btn.disabled=false; btn.textContent="📊 Objavi rezultat"; }
    console.error('OBJAVA PADLA:', e.message);
    alert("Objava ni uspela.\n\nRazlog: "+e.message);
  }
}

  let myIdx=-1;

  const myRankLine = myIdx>=0
    ? `<div class="hod-lb-myrank">Tvoja uvrstitev: <b>${ranks[myIdx]}.</b> od ${rows.length}</div>` : '';

  box.innerHTML=`<div class="hod-lb-title">${title}</div>

}

// samodejna simulacija: tvoja ekipa zamenja NAJŠIBKEJŠO ligaško ekipo (brez izbire)
function autoSimulate(){
  if(!_cachedLeague) _cachedLeague=buildLeague();
  const full=_cachedLeague;
  if(full.league.length<10) return null;   // ni dovolj za simulacijo (vgrajeni dataset)
  // najšibkejša ekipa
  const weakest=[...full.league].sort((a,b)=>a.strength-b.strength)[0];
  const conf=weakest.conf;
  const rawMy=userTeamStrength();
  const myStr=full.leagueMean+(rawMy-full.leagueMean)*(full.stretchK||1.5);
  const simLeague={season:full.season, leagueMean:full.leagueMean, stretchK:full.stretchK,
    league:full.league.map(t=>t.abbr===weakest.abbr?{...t,strength:myStr,name:"TVOJA EKIPA",mine:true}:t)};
  const res=monteCarlo(myStr, simLeague, conf, 1000);
  return {res, conf, myStr, full, replaced:weakest};
}

function runSimulation(abbr, conf, full){
  phase="simulating";
  const replaced=full.league.find(t=>t.abbr===abbr);
  // uporabnikova surova moč -> raztegni na isto lestvico kot ligaške moči
  const rawMy=userTeamStrength();
  const myStr=full.leagueMean+(rawMy-full.leagueMean)*(full.stretchK||1.5);
  const simLeague={season:full.season, leagueMean:full.leagueMean, stretchK:full.stretchK,
    league:full.league.map(t=>t.abbr===abbr?{...t,strength:myStr,name:"TVOJA EKIPA",mine:true}:t)};
  screen.innerHTML=`<div class="hod-slot-stage hod-fade">
    <div class="hod-stage-label">Simuliram sezono ×1000…</div>
    <div class="hod-reels"><div class="hod-reel spinning"><div class="hod-reel-strip">
      ${Array.from({length:6}).map(()=>`<div class="hod-reel-item"><div class="hod-reel-year">🏀</div></div>`).join('')}
    </div></div></div></div>`;
  setTimeout(()=>{
    const res=monteCarlo(myStr, simLeague, conf, 1000);
    showSimResult(res, replaced, conf, myStr, full);
  }, 600);
}

function showSimResult(res, replaced, conf, myStr, full){
  phase="simresult";
  const confName=conf==="E"?"Vzhodni":"Zahodni";
  const losses=82-res.avgWins;
  let verdict;
  if(res.titlePct>=40) verdict="Dinastija. Liga nima odgovora.";
  else if(res.titlePct>=20) verdict="Resen prvak — naslov je realen cilj.";
  else if(res.finalsPct>=30) verdict="Kontender. Finale na dosegu.";
  else if(res.playoffPct>=70) verdict="Trdna playoff ekipa.";
  else if(res.playoffPct>=35) verdict="Boj za play-in.";
  else verdict="Lottery. Sezona za pozabit.";
  // konferenčna lestvica (povprečje) — tvoja ekipa je že v confTeams (mine:true)
  const avgStr=full.league.reduce((s,t)=>s+t.strength,0)/full.league.length;
  const table=res.confTeams.map(t=>({
      name:t.mine?"TVOJA EKIPA":t.name,
      wins:t.mine?res.avgWins:Math.round(41+(t.strength-avgStr)*1.6),
      mine:!!t.mine
    }))
    .sort((a,b)=>b.wins-a.wins);
  const rows=table.map((t,i)=>`<div class="hod-stand-row ${t.mine?'mine':''}">
    <span>${i+1}. ${t.name}</span><span>${t.wins}-${82-t.wins}</span></div>`).join('');
  screen.innerHTML=`
    <div class="hod-result hod-fade">
      <div class="hod-stage-label">Simulacija: ${full.season} · ${confName} konf.</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">nadomestil: ${replaced.name}</div>
      <div class="hod-grade hod-pop" style="font-size:64px;color:var(--gold)">${res.avgWins}-${losses}</div>
      <div class="hod-overall">pričakovan rekord (razpon ${res.lo}–${res.hi} zmag)</div>
      <div class="hod-verdict">${verdict}</div>
      <div class="hod-sim-grid">
        <div class="hod-sim-stat"><b>${res.playoffPct}%</b><span>PLAYOFF</span></div>
        <div class="hod-sim-stat"><b>${res.top1Pct}%</b><span>1. MESTO</span></div>
        <div class="hod-sim-stat"><b>${res.finalsPct}%</b><span>FINALE</span></div>
        <div class="hod-sim-stat hod-sim-title"><b>${res.titlePct}%</b><span>NASLOV</span></div>
      </div>
      <div class="hod-stand-title">${confName} konferenca (povprečje)</div>
      <div class="hod-standings">${rows}</div>
      ${dailyMode?dailyResultBanner(evaluateTeam(), res):''}
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px">
        <button class="hod-btn secondary" id="hod-sim-again">Druga ekipa</button>
        ${dailyMode?'<button class="hod-btn" id="hod-post2" style="background:linear-gradient(180deg,#2ec4b6,#23998d);box-shadow:0 5px 0 #1a7268">📊 Objavi na lestvico</button>':''}
        ${dailyMode?'<button class="hod-btn" id="hod-share2" style="background:linear-gradient(180deg,#4cc9f0,#3a9fc4);box-shadow:0 5px 0 #2a7a99">Deli</button>':''}
        <button class="hod-btn secondary" id="hod-replay2">${dailyMode?'Znova (dnevni)':'Nova ekipa'}</button>
      </div>
      ${dailyMode?'<div id="hod-leaderboard"></div>':''}
    </div>`;
  document.getElementById('hod-sim-again').onclick=showTeamPicker;
  if(dailyMode){
    const ev=evaluateTeam();
    saveDailyResult(ev, res);   // shrani s simulacijskim rezultatom
    const sh=document.getElementById('hod-share2');
    if(sh) sh.onclick=()=>shareDaily(ev, res);
    const po=document.getElementById('hod-post2');
    if(po) po.onclick=()=>postToLeaderboard(ev, res, po);
    showLeaderboard();
  }
  document.getElementById('hod-replay2').onclick=()=>{
    if(dailyMode){ startDaily(); return; }
    roster=[];chosenSeason=null;currentOffer=[];_cachedLeague=null;budgetSpent=0;renderProgress();showIntro();
  };
}

// init
function showLoading(){
  screen.innerHTML=`
    <div class="hod-slot-stage hod-fade">
      <div class="hod-stage-label">Nalagam igralce z GitHuba…</div>
      <div class="hod-reels">
        <div class="hod-reel spinning"><div class="hod-reel-strip">
          ${Array.from({length:6}).map(()=>`<div class="hod-reel-item"><div class="hod-reel-year">···</div></div>`).join('')}
        </div></div>
      </div>
      <div style="font-size:12px;color:var(--muted)">prvič lahko traja nekaj sekund</div>
    </div>`;
}
(async function(){
  // zagotovi mobilni viewport (artifact morda nima meta tag-a)
  try{
    if(!document.querySelector('meta[name="viewport"]')){
      const mv=document.createElement('meta');
      mv.name='viewport';
      mv.content='width=device-width, initial-scale=1, maximum-scale=1';
      document.head&&document.head.appendChild(mv);
    }
  }catch(e){}
  showLoading();
  await loadDataset();
  await restoreSession();
  showLanding();
  updateSfxBtn();
  updateMusicBtn();
  document.addEventListener('touchstart', unlockAudio, {once:false, passive:true, capture:true});
  // klik zvok na vse gumbe (delegacija)
  document.addEventListener('click', (e)=>{
    unlockAudio();
    const b=e.target.closest('.hod-btn, .hod-landing-card, .hod-alb-tab, .hod-alb-tabm, .hod-pcard, .hod-menu-card, .hod-mode-card, .hod-unst-sel, .hod-szn-tab');
    if(b && !b.classList.contains('disabled') && !b.disabled) playSfx('click', 0.3);
  }, true);
  const hdr=document.getElementById('hod-header-home');
  if(hdr) hdr.onclick=()=>goHome();
  // izpostavi funkcije za inline onclick (skripta je v IIFE, onclick išče global)
  try{
    window.toggleSfx=toggleSfx;
    window.toggleMusic=toggleMusic;
  }catch(e){}
})();
})();
</script>
