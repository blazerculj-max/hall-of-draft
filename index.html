<!-- HALL OF DRAFT -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@300;400;500;600;700&family=Bebas+Neue&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

#hod-root {
  --bg:#1a120a;
  --panel:#171d2c;
  --gold:#ffb627;
  --gold-deep:#e89200;
  --red:#e63946;
  --green:#2ec4b6;
  --ink:#f4f4f8;
  --muted:#b89a78;
  --line:#3a2e20;
  --cream:#f4ead2;
  --orange:#e8541e;
  --orange-l:#ff7038;
  --navy:#1a2236;
  --gold-warm:#d4b483;
  --gold-d:#b05a28;
  --amber:#ffc98a;
  --court:url('assets/court.jpg');
  --card-tex:url('assets/card.jpg');
  font-family:'Oswald',sans-serif;
  background:var(--court);
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  color:var(--ink);
  min-height:100vh;
  padding:24px 16px 60px;
  position:relative;
  overflow-x:hidden;
}
#hod-sfx-btn{position:fixed;top:12px;right:12px;z-index:400;width:42px;height:42px;border-radius:50%;
  border:2px solid var(--gold-warm);background:rgba(20,26,42,.9);color:#fff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.5);transition:transform .12s;}
#hod-sfx-btn:hover{transform:scale(1.08);border-color:var(--orange);}
#hod-music-btn{position:fixed;top:12px;right:62px;z-index:400;width:42px;height:42px;border-radius:50%;
  border:2px solid var(--gold-warm);background:rgba(20,26,42,.9);color:#fff;font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.5);transition:transform .12s;}
#hod-music-btn:hover{transform:scale(1.08);border-color:var(--orange);}
#hod-music-btn.off{opacity:.5;}
#hod-root::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 62% 52% at 50% 36%, transparent 26%, rgba(12,8,4,0.78) 100%);
}
.hod-wrap{max-width:760px;margin:0 auto;position:relative;z-index:1;}

.hod-header{text-align:center;margin-bottom:18px;}
.hod-crest{width:120px;height:120px;margin:0 auto -6px;position:relative;display:grid;place-items:center;}
.hod-crest-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 3px 8px rgba(0,0,0,.6));}
.hod-crest-in{position:relative;z-index:2;font-family:'Anton';font-size:30px;color:var(--amber);line-height:1;text-shadow:0 2px 8px rgba(0,0,0,.85);}
.hod-title{
  font-family:'Anton',sans-serif;font-size:clamp(38px,9vw,64px);line-height:0.9;
  letter-spacing:1px;text-transform:uppercase;color:#fff;
  text-shadow:0 4px 16px rgba(0,0,0,0.75);
}
.hod-title .hod-title-o{color:var(--orange-l);}
.hod-sub{font-family:'Bebas Neue';font-size:14px;letter-spacing:5px;text-transform:uppercase;color:var(--amber);margin-top:8px;text-shadow:0 2px 6px rgba(0,0,0,0.8);}

.hod-progress{display:flex;align-items:center;justify-content:center;gap:6px;margin:16px 0 8px;flex-wrap:wrap;}
.hod-dot{width:9px;height:9px;border-radius:50%;background:var(--line);transition:.3s;}
.hod-dot.filled{background:var(--gold);box-shadow:0 0 8px var(--gold);}
.hod-counter{font-family:'Bebas Neue';font-size:20px;letter-spacing:1px;color:var(--gold);margin-left:6px;}

/* Slot machine */
.hod-slot-stage{text-align:center;padding:10px 0 4px;}
.hod-stage-label{font-size:14px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.hod-reels{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
.hod-reel{
  width:130px;height:110px;background:linear-gradient(180deg,#1f2433,#12161f);
  border:2px solid var(--gold-warm);border-radius:14px;overflow:hidden;position:relative;
  box-shadow:inset 0 0 30px rgba(0,0,0,0.6), 0 6px 20px rgba(0,0,0,0.5);
}
.hod-reel::before,.hod-reel::after{content:"";position:absolute;left:0;right:0;height:30px;z-index:3;pointer-events:none;}
.hod-reel::before{top:0;background:linear-gradient(180deg,#12161f,transparent);}
.hod-reel::after{bottom:0;background:linear-gradient(0deg,#12161f,transparent);}
.hod-reel-strip{position:absolute;left:0;right:0;top:0;display:flex;flex-direction:column;}
.hod-reel-item{height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.hod-reel-year{font-family:'Anton';font-size:34px;color:var(--amber);line-height:1;}
.hod-reel-era{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:4px;}
.hod-reel.spinning .hod-reel-strip{animation:hod-spin .3s linear infinite;}
@keyframes hod-spin{from{transform:translateY(0)}to{transform:translateY(-110px)}}
.hod-reel.locked{border-color:var(--orange);box-shadow:0 0 18px rgba(232,84,30,.5),inset 0 0 30px rgba(0,0,0,0.6);}

.hod-btn{
  font-family:'Bebas Neue';font-size:24px;letter-spacing:2px;
  background:linear-gradient(180deg,var(--gold),var(--gold-deep));
  color:#1a1200;border:none;padding:14px 40px;border-radius:50px;cursor:pointer;
  box-shadow:0 5px 0 #9c6400, 0 8px 20px rgba(0,0,0,.4);transition:.1s;text-transform:uppercase;
}
.hod-btn:active{transform:translateY(4px) scale(.97);box-shadow:0 1px 0 #9c6400,0 4px 12px rgba(0,0,0,.4);}
.hod-btn:disabled{opacity:.4;cursor:not-allowed;}
.hod-btn.secondary{background:transparent;color:var(--muted);border:1px solid var(--line);box-shadow:none;font-size:16px;padding:8px 22px;}
.hod-btn.secondary:active{transform:scale(.95);}

.hod-season-choices{display:flex;flex-direction:column;gap:10px;margin:8px 0 20px;}
.hod-season-card{
  background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:.15s;
}
.hod-season-card:hover{border-color:var(--gold);transform:translateX(4px);}
.hod-season-yr{font-family:'Anton';font-size:30px;color:var(--ink);}
.hod-season-fact{font-size:11.5px;color:var(--gold-deep);line-height:1.35;margin-top:4px;font-style:italic;}
.hod-season-meta{text-align:right;font-size:12px;color:var(--muted);letter-spacing:1px;flex:none;margin-left:10px;}

/* Player offer cards */
.hod-offer-grid{display:grid;grid-template-columns:1fr;gap:10px;margin:6px 0 16px;}
.hod-pcard{
  background:linear-gradient(135deg,#1a2030,#13182550);border:1px solid var(--gold-warm);border-radius:14px;
  padding:14px 16px;cursor:pointer;transition:.18s cubic-bezier(.3,.1,.2,1);position:relative;overflow:hidden;
  display:flex;align-items:center;gap:14px;box-shadow:0 6px 18px rgba(0,0,0,.5);
}
.hod-pcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--gold-warm);opacity:.8;}
.hod-pcard:hover{border-color:var(--orange);transform:translateY(-2px) scale(1.015);box-shadow:0 12px 30px rgba(0,0,0,.6);}
.hod-pcard:active{transform:scale(.99);}
.hod-pcard.disabled{opacity:.3;pointer-events:none;filter:grayscale(1);}
/* elite kartica (92+) dobi zlat sijaj */
.hod-pcard.elite{border-color:#ffd60a;box-shadow:0 6px 22px rgba(0,0,0,.5),0 0 20px rgba(255,214,10,.22);}
.hod-pcard.elite::before{background:#ffd60a;opacity:1;box-shadow:0 0 12px rgba(255,214,10,.6);}
.hod-pcard.elite::after{content:'★';position:absolute;top:6px;right:10px;font-size:13px;color:#ffd60a;opacity:.55;}
.hod-pcard.good{border-color:var(--amber);}
.hod-pcard.good::before{background:var(--amber);}
.hod-pos-badge{
  font-family:'Bebas Neue';font-size:16px;letter-spacing:.5px;
  min-width:46px;width:auto;padding:0 8px;height:46px;flex:none;border-radius:10px;
  display:flex;align-items:center;justify-content:center;color:#0a0a0f;white-space:nowrap;
}
.hod-pos-PG{background:#4cc9f0;} .hod-pos-SG{background:#4895ef;}
.hod-pos-SF{background:#b5179e;} .hod-pos-PF{background:#f72585;} .hod-pos-C{background:#ff8500;}
.hod-pcard-photo{width:54px;height:54px;flex:none;border-radius:50%;overflow:hidden;position:relative;border:2px solid var(--gold-warm);background:#0d1119;box-shadow:0 2px 8px rgba(0,0,0,.4);}
.hod-pcard.elite .hod-pcard-photo{border-color:#ffd60a;box-shadow:0 0 12px rgba(255,214,10,.4);}
.hod-pcard-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;}
.hod-pcard-photo-wild{display:flex;align-items:center;justify-content:center;}
.hod-pcard-photo-wild span{font-family:'Anton';font-size:26px;color:var(--gold);}
.hod-pinfo{flex:1;min-width:0;}
.hod-pname{font-family:'Oswald';font-size:18px;font-weight:600;line-height:1.1;color:var(--ink);}
.hod-pseason{font-size:12px;color:var(--muted);letter-spacing:.5px;}
.hod-pstats{display:flex;gap:12px;margin-top:5px;font-size:12px;}
.hod-pstats b{font-family:'Bebas Neue';font-size:17px;color:var(--amber);display:block;line-height:1;}
.hod-pstats span{color:var(--muted);font-size:10px;letter-spacing:1px;}
.hod-prating{font-family:'Anton';font-size:30px;flex:none;}
.hod-r-elite{color:#ffd60a;text-shadow:0 0 12px rgba(255,214,10,.5);}
.hod-r-good{color:var(--amber);} .hod-r-mid{color:#c9a87a;} .hod-r-low{color:#a08862;}

/* Roster */
.hod-roster{background:#161b2a;border:1px solid var(--gold-warm);border-radius:14px;padding:12px;margin-top:8px;box-shadow:0 6px 18px rgba(0,0,0,.5);}
.hod-roster-title{font-family:'Bebas Neue';font-size:18px;letter-spacing:2px;color:var(--amber);margin-bottom:8px;display:flex;justify-content:space-between;}
.hod-live-prog{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;background:rgba(255,209,102,.08);border:1px solid rgba(255,209,102,.25);border-radius:8px;padding:6px 10px;margin-bottom:9px;font-family:'Oswald';font-size:12px;}
.hod-live-prog.daily{background:rgba(0,115,230,.1);border-color:rgba(0,115,230,.3);}
.hod-live-prog b{font-weight:700;}
.hod-pos-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap;}
.hod-pos-tag{font-family:'Bebas Neue';font-size:13px;width:34px;color:var(--gold);}
.hod-chip{font-size:12px;background:#1f2233;border:1px solid var(--gold-d);border-radius:20px;padding:3px 10px;}
.hod-chip.empty{color:var(--muted);font-style:italic;border-style:dashed;border-color:var(--line);}

/* Result */
.hod-result{text-align:center;padding:10px 0;}
.hod-grade{font-family:'Anton';font-size:clamp(80px,22vw,150px);line-height:0.8;margin:6px 0;}
.hod-overall{font-family:'Bebas Neue';font-size:24px;letter-spacing:2px;color:var(--muted);}
.hod-verdict{font-size:15px;color:var(--ink);margin:12px auto;max-width:440px;line-height:1.5;}
.hod-land-intro{background:rgba(16,10,6,.6);border:1px solid var(--gold-warm);border-radius:12px;padding:12px 18px;backdrop-filter:blur(2px);}
.hod-land-intro b{color:var(--amber);}
.hod-final-roster{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:18px 0;text-align:left;}
.hod-final-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px;}
.hod-fc-top{display:flex;justify-content:space-between;align-items:baseline;}
.hod-fc-name{font-size:14px;font-weight:600;}
.hod-fc-rating{font-family:'Anton';font-size:20px;color:var(--gold);}
.hod-fc-meta{font-size:11px;color:var(--muted);}
.hod-bar{height:5px;background:var(--line);border-radius:3px;margin-top:6px;overflow:hidden;}
.hod-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold-deep),var(--gold));border-radius:3px;}

.hod-fade{animation:hod-fade .4s ease;}
.hod-chem-tag{font-family:'Bebas Neue';font-size:14px;letter-spacing:1px;
  border:1px solid var(--cc);color:var(--cc);border-radius:20px;padding:4px 12px;}
.hod-era-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:440px;margin:0 auto;}
.hod-era-chip{background:var(--panel);border:2px solid var(--line);border-radius:14px;
  padding:12px 18px;cursor:pointer;transition:.15s;min-width:96px;display:flex;
  flex-direction:column;align-items:center;gap:2px;}
.hod-era-chip:hover{border-color:var(--gold);transform:translateY(-2px);}
.hod-era-chip.on{border-color:var(--gold);background:linear-gradient(180deg,rgba(255,182,39,.18),rgba(255,182,39,.05));
  box-shadow:0 0 14px rgba(255,182,39,.25);}
.hod-era-name{font-family:'Anton';font-size:26px;color:var(--ink);line-height:1;}
.hod-era-chip.on .hod-era-name{color:var(--gold);}
.hod-era-count{font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
#hod-draft-frame{display:flex;flex-direction:column;}
.hod-mode-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:460px;margin:0 auto;}
.hod-mode-chip{background:var(--panel);border:2px solid var(--line);border-radius:12px;
  padding:9px 14px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:92px;}
.hod-mode-chip:hover{border-color:var(--gold);transform:translateY(-2px);}
.hod-mode-chip.on{border-color:var(--gold);background:linear-gradient(180deg,rgba(255,182,39,.18),rgba(255,182,39,.05));}
.hod-mode-name{font-family:'Bebas Neue';font-size:17px;letter-spacing:.5px;}
.hod-mode-chip.on .hod-mode-name{color:var(--gold);}
.hod-mode-sub{font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
/* landing / izbirne kartice */
.hod-landing-row{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:8px;}
.hod-landing-card{background:var(--card-tex);background-size:cover;background-position:center;
  border:2px solid var(--gold-warm);border-radius:16px;
  padding:0;cursor:pointer;transition:.18s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  min-width:170px;flex:0 1 200px;min-height:108px;color:inherit;font-family:inherit;position:relative;overflow:hidden;
  box-shadow:0 10px 26px rgba(0,0,0,.55);}
.hod-landing-card::before{content:'';position:absolute;inset:0;background:rgba(244,234,210,.2);}
.hod-landing-card:hover{border-color:var(--orange);transform:translateY(-4px);box-shadow:0 14px 32px rgba(0,0,0,.6);}
.hod-landing-emoji{display:none;}
.hod-landing-name{font-family:'Anton';font-size:30px;letter-spacing:.5px;color:var(--navy);position:relative;text-shadow:0 1px 0 rgba(255,255,255,.35);}
.hod-landing-sub{font-size:11px;letter-spacing:1.5px;color:var(--gold-d);text-transform:uppercase;font-weight:600;position:relative;}
.hod-landing-quiz .hod-landing-name,.hod-landing-mil .hod-landing-name,.hod-landing-climb .hod-landing-name,.hod-landing-hol .hod-landing-name,.hod-landing-mp .hod-landing-name,.hod-landing-daily .hod-landing-name,.hod-landing-quick .hod-landing-name,.hod-landing-poker .hod-landing-name{color:var(--navy);}
/* AI piramida */
.hod-pk-ai-grid{display:flex;flex-direction:column;gap:8px;max-width:380px;margin:14px auto 0;}
.hod-pk-ai-card{display:flex;align-items:center;gap:12px;background:var(--panel);border:2px solid var(--line);
  border-radius:14px;padding:10px 14px;cursor:pointer;transition:.15s;text-align:left;color:inherit;font-family:inherit;}
.hod-pk-ai-card:hover:not(:disabled){border-color:var(--gold);transform:translateX(3px);}
.hod-pk-ai-card.beaten{border-color:var(--green);background:rgba(46,196,182,.08);}
.hod-pk-ai-card.locked{opacity:.45;cursor:not-allowed;}
.hod-pk-ai-step{font-family:'Anton';font-size:18px;color:var(--muted);width:22px;text-align:center;flex:none;}
.hod-pk-ai-avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:24px;flex:none;border:2px solid rgba(255,255,255,.2);}
.hod-pk-ai-name{font-family:'Bebas Neue';font-size:19px;letter-spacing:.5px;color:#fff;line-height:1.1;}
.hod-pk-ai-title{font-family:'Oswald';font-size:11px;color:var(--muted);}
.hod-pk-ai-card.beaten .hod-pk-ai-title{color:var(--green);}
/* Vs AI dvoboj */
.hod-vs-side{max-width:520px;margin:0 auto;padding:10px 12px;border-radius:14px;background:#161b2a;border:1px solid var(--gold-warm);box-shadow:0 8px 22px rgba(0,0,0,.55);}
.hod-vs-side.you{border-color:var(--gold);}
.hod-vs-head{font-family:'Bebas Neue';font-size:16px;letter-spacing:.5px;color:var(--ink);display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.hod-vs-emoji{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:15px;}
.hod-vs-total{margin-left:auto;font-family:'Anton';font-size:22px;color:#fff;}
.hod-vs-total.gold{color:var(--gold);}
.hod-vs-mid{font-family:'Bebas Neue';letter-spacing:2px;color:var(--muted);font-size:13px;margin:8px 0;}
.hod-pkm-row{display:flex;gap:5px;justify-content:center;}
.hod-pkm-card-wrap{position:relative;flex:1 1 0;max-width:96px;cursor:pointer;}
.hod-pkm-card-wrap.held{cursor:default;}
.hod-pkm-card-wrap.spinning .hod-pkm-card{animation:pkspin .34s ease;}
.hod-pkm-tap{font-family:'Bebas Neue';font-size:9px;letter-spacing:1px;color:var(--muted);margin-top:2px;}
.hod-pkm-card{position:relative;background:#1a1a28;border:1.5px solid var(--line);border-radius:9px;padding:7px 3px 6px;}
.hod-pkm-card.held{border-color:var(--gold);background:rgba(255,182,39,.1);}
.hod-pkm-lock{position:absolute;top:2px;right:3px;font-size:9px;}
.hod-pkm-av{position:relative;width:34px;height:34px;border-radius:50%;margin:0 auto 3px;display:flex;align-items:center;
  justify-content:center;font-family:'Anton';font-size:12px;color:#fff;overflow:hidden;border:1.5px solid rgba(255,255,255,.2);}
.hod-pkm-av span{position:absolute;z-index:1;}
.hod-pkm-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 8%;z-index:2;}
.hod-pkm-name{font-family:'Oswald';font-size:9px;color:var(--ink);line-height:1.15;min-height:22px;display:flex;align-items:center;justify-content:center;text-align:center;}
.hod-pkm-pos{font-family:'Bebas Neue';font-size:10px;letter-spacing:.5px;color:#c4a8ff;line-height:1;margin:1px 0;}
.hod-pkm-card.ai-lock{animation:ailock .48s ease;border-color:var(--gold)!important;}
@keyframes ailock{0%{transform:scale(1);box-shadow:0 0 0 rgba(255,182,39,0);}40%{transform:scale(1.12);box-shadow:0 0 18px rgba(255,182,39,.7);}100%{transform:scale(1);box-shadow:0 0 8px rgba(255,182,39,.3);}}
.hod-pkm-rating{font-family:'Anton';font-size:17px;color:var(--gold);line-height:1;}
@media(max-width:560px){
  .hod-pkm-rating{font-size:14px;}
  .hod-pkm-av{width:28px;height:28px;font-size:10px;}
  .hod-pkm-name{font-size:8px;}
  .hod-pkm-pos{font-size:9px;}
}
/* power-up bar */
.hod-pu-bar{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap;}
.hod-pu-btn{display:flex;flex-direction:column;align-items:center;gap:1px;background:rgba(168,130,255,.14);
  border:1.5px solid #a882ff;border-radius:12px;padding:7px 13px;cursor:pointer;transition:.15s;color:#fff;font-family:inherit;min-width:64px;}
.hod-pu-btn:hover:not(.dis){background:rgba(168,130,255,.3);transform:translateY(-2px);}
.hod-pu-btn.dis{opacity:.32;cursor:not-allowed;border-color:var(--line);background:rgba(255,255,255,.04);}
.hod-pu-emoji{font-size:20px;}
.hod-pu-name{font-family:'Bebas Neue';font-size:13px;letter-spacing:.5px;}
.hod-pu-count{font-family:'Oswald';font-size:10px;color:#c4a8ff;}
/* peek */
.hod-peek-wrap{max-width:420px;margin:12px auto 0;padding:10px;border:1.5px dashed #a882ff;border-radius:12px;background:rgba(168,130,255,.06);}
.hod-peek-label{font-family:'Oswald';font-size:12px;color:#c4a8ff;margin-bottom:7px;}
/* nagradni slot */
.hod-slot-card{background:linear-gradient(180deg,#2e3340,#23262f);border:2px solid var(--gold);border-radius:18px;
  padding:28px 26px;max-width:320px;width:90%;text-align:center;box-shadow:0 14px 50px rgba(0,0,0,.7),0 0 30px rgba(255,182,39,.3);}
.hod-slot-h{font-family:'Anton';font-size:22px;letter-spacing:1px;color:var(--gold);margin-bottom:16px;}
.hod-slot-reel{width:100px;height:100px;margin:0 auto 14px;border-radius:16px;background:#0e0f15;border:3px solid var(--gold);
  display:flex;align-items:center;justify-content:center;overflow:hidden;}
.hod-slot-sym{font-size:54px;line-height:1;}
.hod-slot-sym.win{animation:holpop .5s ease;}
.hod-slot-msg{font-family:'Oswald';font-size:16px;color:#fff;min-height:42px;margin-bottom:14px;line-height:1.4;}
/* poker razčlenitev rezultata */
.hod-pk-score{max-width:360px;margin:16px auto 0;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 16px;}
.hod-pk-score-row{display:flex;justify-content:space-between;align-items:center;font-family:'Oswald';font-size:13px;color:var(--ink);padding:4px 0;}
.hod-pk-score-row b{font-family:'Anton';}
.hod-pk-score-row.plus b{color:var(--green);}
.hod-pk-score-row.minus b{color:var(--red);}
.hod-pk-score-total{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);
  margin-top:6px;padding-top:8px;font-family:'Bebas Neue';font-size:16px;letter-spacing:1px;color:#fff;}
.hod-pk-score-total b{font-family:'Anton';font-size:24px;color:var(--gold);}
.hod-pk-bar .pos-full{color:var(--green);}
.hod-vs-bd{font-family:'Oswald';font-size:11px;color:var(--muted);margin-left:auto;margin-right:6px;}
.hod-vs-bd .plus{color:var(--green);}
.hod-vs-bd .minus{color:var(--red);}
/* megla toggle */
.hod-fog-toggle{display:flex;align-items:center;gap:12px;max-width:380px;margin:0 auto;background:var(--panel);
  border:2px solid var(--line);border-radius:14px;padding:11px 16px;cursor:pointer;transition:.18s;color:inherit;font-family:inherit;width:90%;}
.hod-fog-toggle.on{border-color:#a882ff;background:rgba(168,130,255,.1);}
.hod-fog-icon{font-size:26px;flex:none;}
.hod-fog-txt{flex:1;text-align:left;font-family:'Oswald';font-size:13px;color:var(--ink);line-height:1.3;}
.hod-fog-txt b{font-family:'Bebas Neue';font-size:16px;letter-spacing:.5px;color:#fff;}
.hod-fog-txt span{font-size:11px;color:var(--muted);}
.hod-fog-sw{flex:none;width:42px;height:24px;border-radius:12px;background:var(--line);position:relative;transition:.18s;}
.hod-fog-toggle.on .hod-fog-sw{background:#a882ff;}
.hod-fog-knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.18s;}
.hod-fog-toggle.on .hod-fog-knob{left:20px;}
.hod-pk-rating.fog{color:#6a6a82;}
.hod-pkm-rating.fog{color:#6a6a82;}
.hod-pkm-fogstats{font-family:'Oswald';font-size:13px;color:#c4a8ff;font-weight:600;line-height:1.1;}
/* big reveal */
.hod-reveal-card{background:linear-gradient(180deg,#2e3340,#23262f);border:2px solid var(--gold);border-radius:18px;
  padding:24px 26px;max-width:340px;width:90%;text-align:center;box-shadow:0 14px 50px rgba(0,0,0,.7),0 0 30px rgba(255,182,39,.25);color:#fff;}
.hod-reveal-card.wide{max-width:440px;}
.hod-reveal-h{font-family:'Anton';font-size:22px;letter-spacing:2px;color:var(--gold);margin-bottom:18px;}
.hod-reveal-tube{position:relative;width:88px;height:200px;margin:0 auto;border-radius:14px;background:#0e0f15;
  border:3px solid var(--line);overflow:hidden;display:flex;align-items:flex-end;}
.hod-reveal-fill{width:100%;height:0%;transition:height .04s linear;border-radius:0 0 10px 10px;}
.hod-reveal-fill.winner{box-shadow:0 0 24px currentColor;animation:revwin .5s ease infinite alternate;}
@keyframes revwin{from{filter:brightness(1);}to{filter:brightness(1.3);}}
.hod-reveal-num{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);font-family:'Anton';font-size:34px;
  color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.8);}
.hod-reveal-duo{display:flex;align-items:flex-end;justify-content:center;gap:14px;}
.hod-reveal-col{display:flex;flex-direction:column;align-items:center;gap:8px;}
.hod-reveal-vs{font-family:'Anton';font-size:18px;color:var(--muted);padding-bottom:80px;}
.hod-reveal-lbl{font-family:'Bebas Neue';font-size:15px;letter-spacing:.5px;color:#fff;}
.hod-reveal-lbl.gold{color:var(--gold);}
/* NBA Poker */
.hod-pk-bar{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;max-width:560px;margin:0 auto 6px;
  font-family:'Bebas Neue';font-size:15px;letter-spacing:1px;color:var(--ink);}
.hod-pk-bar b{color:var(--gold);font-family:'Anton';font-size:18px;}
.hod-pk-hint{font-family:'Oswald';font-weight:300;font-size:12px;color:var(--muted);margin-bottom:14px;}
.hod-pk-grid{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;max-width:600px;margin:0 auto;}
.hod-pk-card{position:relative;flex:1 1 100px;max-width:118px;min-width:96px;
  background:var(--card-tex);background-size:cover;background-position:center;
  border:2px solid var(--gold-warm);border-radius:14px;padding:0 0 10px;cursor:pointer;transition:.15s;overflow:hidden;
  box-shadow:0 8px 22px rgba(0,0,0,.6);}
.hod-pk-card::after{content:'';position:absolute;inset:0;background:rgba(244,234,210,.18);pointer-events:none;}
.hod-pk-card:hover{border-color:var(--orange);transform:translateY(-3px);}
.hod-pk-card.held{border-color:var(--orange);box-shadow:0 0 16px rgba(232,84,30,.5);cursor:default;}
.hod-pk-card.held:hover{transform:none;}
.hod-pk-card.spinning{animation:pkSpinCine .55s cubic-bezier(.45,.05,.55,.95);}
@keyframes pkSpinCine{
  0%{transform:rotateY(0) scale(1);opacity:1;}
  35%{transform:rotateY(90deg) scale(.88);opacity:.35;}
  50%{transform:rotateY(90deg) scale(.88);opacity:.2;}
  65%{transform:rotateY(0deg) scale(.92);opacity:.6;}
  100%{transform:rotateY(0) scale(1);opacity:1;}
}
.hod-pk-card.swap-in{animation:pkSwapIn .4s ease;}
@keyframes pkSwapIn{0%{filter:brightness(2);}100%{filter:brightness(1);}}
.hod-pk-rays{height:12px;background:repeating-linear-gradient(125deg,var(--orange) 0,var(--orange) 10px,#d8481a 10px,#d8481a 20px);position:relative;z-index:1;}
.hod-pk-head{position:relative;z-index:2;display:flex;justify-content:space-between;align-items:center;padding:9px 9px 0;}
.hod-pk-lock{flex:1;text-align:center;font-size:15px;filter:grayscale(1) brightness(0);line-height:1;}
.hod-pk-pos{font-family:'Anton';font-size:11px;color:#fff;background:var(--orange);border-radius:4px;padding:1px 6px;letter-spacing:.5px;}
.hod-pk-ovr{font-family:'Anton';font-size:30px;color:var(--orange);line-height:.8;text-shadow:0 1px 0 rgba(255,255,255,.4);}
.hod-pk-ovr.fog{color:#b89a78;}
@keyframes pkspin{0%{transform:rotateY(0) scale(1);opacity:1;}50%{transform:rotateY(90deg) scale(.9);opacity:.3;}100%{transform:rotateY(0) scale(1);opacity:1;}}
.hod-pk-enter{animation:pkEnter .4s ease backwards;}
@keyframes pkEnter{0%{opacity:0;transform:translateY(18px) scale(.92);}100%{opacity:1;transform:translateY(0) scale(1);}}
.hod-pk-card.just-locked{animation:pkStamp .35s cubic-bezier(.3,1.4,.5,1);}
@keyframes pkStamp{0%{transform:scale(1);}30%{transform:scale(1.12) rotate(-2deg);}60%{transform:scale(.96) rotate(1deg);}100%{transform:scale(1) rotate(0);}}
.hod-pk-lock-stamp{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-14deg) scale(0);
  z-index:6;font-family:'Anton';font-size:22px;color:var(--orange);border:3px solid var(--orange);
  padding:2px 10px;border-radius:8px;letter-spacing:1px;pointer-events:none;text-shadow:0 1px 0 rgba(255,255,255,.4);
  background:rgba(244,234,210,.85);animation:stampIn .4s cubic-bezier(.3,1.5,.5,1) forwards;}
@keyframes stampIn{0%{transform:translate(-50%,-50%) rotate(-14deg) scale(2.2);opacity:0;}
  60%{opacity:1;}100%{transform:translate(-50%,-50%) rotate(-14deg) scale(1);opacity:1;}}
.hod-pk-avatar{position:relative;z-index:2;width:62px;height:62px;border-radius:50%;margin:2px auto 7px;display:flex;align-items:center;
  justify-content:center;font-family:'Anton';font-size:20px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4);
  border:3px solid var(--orange);overflow:hidden;}
.hod-av-ini{position:absolute;z-index:1;}
.hod-av-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 8%;z-index:2;background:transparent;}
.hod-pk-name{position:relative;z-index:2;font-family:'Anton';font-size:14px;letter-spacing:.2px;color:var(--navy);line-height:1.0;margin-bottom:2px;min-height:28px;display:flex;align-items:center;justify-content:center;padding:0 4px;text-align:center;}
.hod-pk-meta{position:relative;z-index:2;font-family:'Oswald';font-weight:600;font-size:8.5px;color:var(--gold-d);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;line-height:1.3;}
.hod-pk-stats{position:relative;z-index:2;font-family:'Oswald';font-weight:600;font-size:9px;color:var(--navy);margin-top:5px;line-height:1.3;}
.hod-pk-stats span{color:var(--gold-d);font-size:7px;}
.hod-pk-hold{position:relative;z-index:2;font-family:'Bebas Neue';font-size:10px;letter-spacing:1px;margin:7px 8px 0;padding-top:6px;
  border-top:2px solid var(--orange);color:var(--gold-d);}
.hod-pk-card.held .hod-pk-hold{color:var(--orange);}
@media(max-width:560px){
  .hod-pk-card{flex:1 1 28%;max-width:none;min-width:0;}
  .hod-pk-avatar{width:52px;height:52px;font-size:16px;}
  .hod-pk-ovr{font-size:24px;}
  .hod-pk-name{font-size:12px;}
}
.hod-draft-modes{max-width:520px;margin-left:auto;margin-right:auto;}
/* Higher or Lower */
.hod-hol-bar{display:flex;justify-content:space-between;max-width:460px;margin:0 auto 6px;
  font-family:'Bebas Neue';font-size:16px;letter-spacing:1px;color:var(--ink);}
.hod-hol-bar b{color:var(--gold);font-family:'Anton';}
.hod-hol-sub{font-family:'Oswald';font-size:14px;color:var(--muted);margin-bottom:16px;}
.hod-hol-sub b{color:#ffa75c;}
.hod-hol-cards{display:flex;align-items:center;justify-content:center;gap:14px;max-width:520px;margin:0 auto;}
.hod-hol-card{flex:1 1 0;background:var(--card-tex);background-size:cover;background-position:center;
  border:2px solid var(--gold-warm);border-radius:16px;
  padding:18px 14px;min-width:0;transition:.25s;position:relative;overflow:hidden;box-shadow:0 8px 22px rgba(0,0,0,.55);}
.hod-hol-card::after{content:'';position:absolute;inset:0;background:rgba(244,234,210,.16);pointer-events:none;}
.hod-hol-card>*{position:relative;z-index:2;}
.hod-hol-card.ok{border-color:var(--green);box-shadow:0 0 22px rgba(46,196,182,.5);}
.hod-hol-card.bad{border-color:var(--red);box-shadow:0 0 22px rgba(230,57,70,.5);}
.hod-hol-name{font-family:'Anton';font-size:19px;letter-spacing:.2px;color:var(--navy);line-height:1.05;margin-bottom:4px;}
.hod-hol-avatar{position:relative;width:80px;height:80px;border-radius:50%;margin:0 auto 10px;display:flex;
  align-items:center;justify-content:center;font-family:'Anton';font-size:26px;color:#fff;
  text-shadow:0 1px 2px rgba(0,0,0,.4);border:3px solid var(--orange);overflow:hidden;}
.hod-hol-team{font-family:'Oswald';font-weight:600;font-size:11px;color:var(--gold-d);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;}
.hod-hol-stat{font-family:'Anton';font-size:42px;color:var(--orange);line-height:1;}
.hod-hol-stat.hidden{color:var(--gold-warm);}
.hod-hol-stat.reveal{animation:holpop .4s ease;}
@keyframes holpop{0%{transform:scale(.5);opacity:0;}100%{transform:scale(1);opacity:1;}}
.hod-hol-statlabel{font-family:'Oswald';font-weight:600;font-size:10px;color:var(--gold-d);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
.hod-hol-vs{font-family:'Anton';font-size:20px;color:var(--amber);flex:none;}
.hod-hol-buttons{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.hod-hol-btn{font-family:'Bebas Neue';font-size:18px;letter-spacing:1px;padding:9px 12px;border-radius:10px;
  cursor:pointer;border:2px solid;transition:.13s;}
.hod-hol-btn.higher{background:var(--green);border-color:#1a7268;color:#06302b;}
.hod-hol-btn.higher:hover{background:#3ad8c9;}
.hod-hol-btn.lower{background:var(--red);border-color:#a02631;color:#fff;}
.hod-hol-btn.lower:hover{background:#f04a57;}
@media(max-width:520px){
  .hod-hol-cards{gap:8px;}
  .hod-hol-card{padding:14px 8px;}
  .hod-hol-name{font-size:17px;}
  .hod-hol-avatar{width:62px;height:62px;font-size:20px;}
  .hod-hol-stat{font-size:32px;}
  .hod-hol-vs{font-size:15px;}
}
.hod-pright{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex:none;}
.hod-price{font-family:'Bebas Neue';font-size:15px;letter-spacing:.5px;color:var(--gold);
  background:rgba(255,182,39,.12);border:1px solid rgba(255,182,39,.4);border-radius:8px;padding:1px 8px;}
.hod-after{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.3px;}
.hod-wild{border-color:var(--gold);background:linear-gradient(135deg,rgba(255,182,39,.12),rgba(255,182,39,.03));}
.hod-wild-badge{background:linear-gradient(135deg,#ffb627,#e63946,#b5179e);color:#fff;font-size:20px;
  animation:hod-wildpulse 1.5s ease-in-out infinite;}
@keyframes hod-wildpulse{0%,100%{box-shadow:0 0 0 rgba(255,182,39,.5)}50%{box-shadow:0 0 14px rgba(255,182,39,.7)}}
.hod-roles-wrap{display:flex;flex-direction:column;gap:8px;max-width:460px;margin:0 auto;text-align:left;}
.hod-role-block{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 10px;cursor:pointer;transition:.12s;}
.hod-role-block:hover{border-color:var(--gold);}
.hod-role-head{font-family:'Bebas Neue';font-size:15px;letter-spacing:1px;margin-bottom:6px;display:flex;justify-content:space-between;}
.hod-role-head span{color:var(--muted);font-size:12px;}
.hod-role-head.ok{color:var(--green);} .hod-role-head.warn{color:var(--gold-deep);}
.hod-role-list{display:flex;flex-wrap:wrap;gap:5px;}
.hod-role-chip{display:flex;align-items:center;gap:6px;background:#1f1f2e;border:1px solid var(--line);
  border-radius:8px;padding:4px 8px;cursor:pointer;transition:.12s;}
.hod-role-chip:hover{border-color:var(--gold);}
.hod-role-chip.sel{border-color:var(--gold);background:rgba(255,182,39,.15);box-shadow:0 0 8px rgba(255,182,39,.3);}
.hod-role-pos{font-family:'Bebas Neue';font-size:11px;color:#0a0a0f;border-radius:5px;padding:1px 5px;}
.hod-role-nm{font-size:13px;}
.hod-role-rt{font-family:'Bebas Neue';font-size:15px;color:var(--gold);}
.hod-pen{color:var(--red);font-size:10px;margin-left:2px;}
/* košarkarsko igrišče */
.hod-court-wrap{position:relative;max-width:340px;margin:0 auto;aspect-ratio:1/1;}
.hod-court-bg{position:absolute;inset:0;width:100%;height:100%;border-radius:14px;
  border:1px solid var(--line);box-shadow:inset 0 0 30px rgba(0,0,0,.5);}
.hod-court-spots{position:absolute;inset:0;}
.hod-court-lines{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.hod-chem-legend{display:flex;gap:14px;justify-content:center;font-size:11px;color:var(--muted);margin-top:8px;flex-wrap:wrap;}
.hod-chem-legend span{display:flex;align-items:center;gap:5px;}
.hod-chem-legend i{width:16px;height:3px;border-radius:2px;display:inline-block;}
.hod-daily-banner{max-width:420px;margin:12px auto;padding:12px 16px;border-radius:14px;text-align:center;}
.hod-daily-banner.done{background:linear-gradient(135deg,rgba(46,196,182,.18),rgba(46,196,182,.05));border:1px solid var(--green);}
.hod-daily-banner.pending{background:rgba(255,182,39,.08);border:1px solid var(--gold-deep);}
.hod-daily-goalbar{background:linear-gradient(90deg,rgba(76,201,240,.15),rgba(76,201,240,.04));
  border:1px solid rgba(76,201,240,.4);border-radius:10px;padding:7px 12px;margin-bottom:10px;
  font-size:13px;color:#4cc9f0;text-align:center;}
.hod-daily-goalbar b{color:#fff;}
.hod-spot{position:absolute;transform:translate(-50%,-50%);width:74px;
  display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:.12s;}
.hod-spot-pos{font-family:'Bebas Neue';font-size:12px;letter-spacing:1px;color:var(--gold);}
.hod-spot.filled{background:rgba(15,15,25,.85);border:2px solid var(--gold);border-radius:10px;padding:4px 2px;}
.hod-spot.empty{background:rgba(15,15,25,.5);border:2px dashed var(--muted);border-radius:10px;padding:4px 2px;}
.hod-spot.sel{box-shadow:0 0 14px var(--gold);border-color:#fff;}
.hod-spot.filled:hover{transform:translate(-50%,-50%) scale(1.05);}
.hod-spot-name{font-size:12px;font-weight:600;line-height:1.1;text-align:center;}
.hod-spot-rt{font-family:'Bebas Neue';font-size:15px;color:var(--gold);}
.hod-spot-empty{font-size:10px;color:var(--muted);font-style:italic;}
.hod-spot-hint{font-family:'Bebas Neue';font-size:14px;margin-top:2px;padding:0 5px;border-radius:5px;}
.hod-spot-hint.good{color:#0a0a0f;background:var(--green);}
.hod-spot-hint.mid{color:#0a0a0f;background:var(--gold);}
.hod-spot-hint.bad{color:#fff;background:var(--red);}
.hod-spot-view{z-index:5;}
.hod-spot-view.filled{background:rgba(10,10,18,.92)!important;border:2px solid var(--gold)!important;}
.hod-spot-view .hod-spot-name{color:#fff!important;font-weight:700;}
.hod-spot-view .hod-spot-pos{color:var(--gold);}

/* enote (peterka) */
.hod-units-wrap{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.hod-unit-block{flex:1;min-width:240px;max-width:320px;}
.hod-unit-title{font-family:'Bebas Neue';font-size:16px;letter-spacing:1px;color:var(--uc);margin-bottom:6px;text-align:center;}
.hod-unit-title span{color:var(--muted);font-size:12px;}
.hod-court-mini{max-width:300px;margin:0 auto;}

/* poimenovane vezi */
.hod-bonds{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:460px;margin:8px auto;}
.hod-bond{font-family:'Oswald';font-size:12px;font-weight:600;border-radius:14px;padding:4px 11px;
  background:rgba(46,196,182,.12);border:1px solid #2ec4b6;color:#2ec4b6;white-space:nowrap;}
.hod-bond.lvl3{background:rgba(255,182,39,.15);border-color:var(--gold);color:var(--gold);box-shadow:0 0 10px rgba(255,182,39,.25);}
.hod-bond.lvl2{background:rgba(76,201,240,.12);border-color:#4cc9f0;color:#4cc9f0;}
.hod-bond.style{background:rgba(168,130,255,.13);border-color:#a882ff;color:#c4adff;}
.hod-bond.lvl-1{background:rgba(230,57,70,.13);border-color:#e63946;color:#ff8a93;}

/* live overall */
.hod-live-ovr{font-family:'Bebas Neue';font-size:16px;letter-spacing:1px;color:var(--ink);margin:4px auto 8px;}
.hod-live-ovr b{font-family:'Anton';font-size:22px;color:var(--gold);}

/* kako igrati */
.hod-howto-overlay{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;
  padding:16px;background:rgba(6,6,12,.88);backdrop-filter:blur(4px);overflow-y:auto;}
.hod-howto-overlay>*{max-height:none;}
.hod-toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-20px);z-index:500;
  background:linear-gradient(180deg,#2e3340,#23262f);border:2px solid var(--orange);border-radius:12px;
  padding:11px 20px;font-family:'Oswald';font-size:14px;color:#fff;box-shadow:0 10px 30px rgba(0,0,0,.6);
  opacity:0;transition:.3s;max-width:90vw;text-align:center;pointer-events:none;}
.hod-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.hod-toast b{color:var(--amber);}
/* ===== ALBUM ===== */
.hod-pack-badge{background:var(--orange);color:#fff;border-radius:20px;padding:0 7px;font-size:13px;margin-left:4px;}
.hod-alb-summary{font-family:'Oswald';font-size:15px;color:#fff;margin:4px 0 8px;background:rgba(13,17,25,.82);border:1px solid var(--gold-warm);border-radius:8px;padding:5px 12px;display:inline-block;}
.hod-alb-summary b{color:var(--gold);font-family:'Anton';font-size:20px;}
.hod-alb-hint{font-size:12px;color:var(--muted);max-width:420px;margin:4px auto 8px;line-height:1.4;font-style:italic;}
.hod-alb-tabs{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:10px 0;}
.hod-alb-tab{font-family:'Bebas Neue';font-size:15px;letter-spacing:1px;background:#161b2a;border:1px solid var(--gold-warm);
  color:var(--amber);border-radius:9px;padding:5px 11px;cursor:pointer;line-height:1;display:flex;flex-direction:column;gap:2px;align-items:center;}
.hod-alb-tab span{font-size:9px;color:var(--muted);font-family:'Oswald';}
.hod-alb-tab.on{background:var(--orange);color:#fff;border-color:var(--orange);}
.hod-alb-tab.on span{color:rgba(255,255,255,.85);}
.hod-alb-grid{display:flex;flex-direction:column;gap:14px;}
.hod-alb-team{background:#161b2a;border:1px solid var(--gold-warm);border-radius:12px;padding:10px;box-shadow:0 6px 18px rgba(0,0,0,.5);}
.hod-alb-team-h{font-family:'Bebas Neue';font-size:15px;letter-spacing:1px;color:var(--amber);margin-bottom:8px;display:flex;justify-content:space-between;}
.hod-alb-team-h span{color:var(--muted);}
.hod-alb-cells{display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:8px;}
.hod-alb-cell{background:var(--card-tex);background-size:cover;border-radius:8px;border:2px solid var(--gold-warm);
  padding:6px 3px 5px;text-align:center;position:relative;overflow:hidden;aspect-ratio:3/4;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.hod-alb-cell::after{content:'';position:absolute;inset:0;background:rgba(244,234,210,.16);pointer-events:none;}
.hod-alb-cell.empty{background:#10141e;border-style:dashed;border-color:#3a2e20;}
.hod-alb-cell.empty::after{display:none;}
.hod-alb-q{font-family:'Anton';font-size:24px;color:#3a4356;position:relative;z-index:1;}
.hod-alb-cell.rar-rare{border-color:#9ec5e8;}
.hod-alb-cell.rar-legendary{border-color:#ffd166;box-shadow:0 0 12px rgba(255,209,102,.5);}
.hod-alb-photo{width:42px;height:42px;border-radius:50%;overflow:hidden;border:2px solid var(--orange);position:relative;z-index:1;margin-bottom:3px;}
.hod-alb-nm{font-family:'Anton';font-size:9px;color:var(--navy);position:relative;z-index:1;line-height:1;}
.hod-alb-fullnm{font-family:'Anton';font-size:9px;color:var(--navy);position:relative;z-index:1;line-height:1.02;padding:0 2px;}
.hod-alb-szn{font-family:'Oswald';font-weight:600;font-size:7px;color:var(--gold-d);position:relative;z-index:1;line-height:1;margin-top:1px;}
.hod-unst-filters{display:flex;gap:8px;justify-content:center;margin:10px 0;flex-wrap:wrap;}
.hod-unst-sel{background:#161b2a;border:1px solid var(--gold-warm);color:var(--amber);border-radius:8px;
  padding:7px 12px;font-family:'Oswald';font-size:13px;cursor:pointer;}
.hod-landing-action{font-size:18px;padding:11px 26px;}
/* indikatorji čakajočih + lepljenje */
.hod-alb-tab{position:relative;}
.hod-wait-dot{position:absolute;top:-6px;right:-6px;background:#ff2d4d;color:#fff;font-family:'Anton';font-size:10px;
  font-style:normal;min-width:16px;height:16px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  padding:0 4px;box-shadow:0 0 8px rgba(255,45,77,.8);animation:waitPulse 1.2s ease-in-out infinite;}
.hod-wait-dot.sm{position:static;display:inline-flex;margin-left:6px;vertical-align:middle;}
@keyframes waitPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.18);}}
.hod-alb-cell.waiting{border-color:#ff2d4d;}
.hod-alb-waitmark{position:absolute;top:3px;right:4px;color:#ff2d4d;font-size:11px;z-index:3;animation:waitPulse 1.2s infinite;}
.hod-alb-cell.target{border-color:#ffd166 !important;box-shadow:0 0 0 3px rgba(255,209,102,.5),0 0 22px rgba(255,209,102,.8) !important;
  animation:targetPulse .9s ease-in-out infinite;cursor:pointer;}
@keyframes targetPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
.hod-alb-here{position:absolute;bottom:4px;left:0;right:0;font-family:'Bebas Neue';font-size:10px;letter-spacing:1px;color:#ffd166;z-index:3;}
.hod-alb-cell.stick-anim{animation:stickDrop .5s cubic-bezier(.2,1.3,.4,1);position:relative;overflow:hidden;}
@keyframes stickDrop{0%{transform:scale(1.5) rotate(-8deg);opacity:.3;}55%{transform:scale(.92) rotate(2deg);}100%{transform:scale(1) rotate(0);opacity:1;}}
/* lepljenje od zgoraj navzdol (wipe) */
.hod-alb-cell.stick-wipe{position:relative;overflow:hidden;}
.hod-stick-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6px 3px 5px;animation:wipeReveal .7s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes wipeReveal{0%{clip-path:inset(0 0 100% 0);}100%{clip-path:inset(0 0 0 0);}}
.hod-stick-hand{position:absolute;left:0;right:0;top:0;height:8px;background:linear-gradient(180deg,rgba(255,255,255,.9),transparent);
  z-index:7;pointer-events:none;animation:handSwipe .7s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes handSwipe{0%{top:0;opacity:1;}90%{opacity:1;}100%{top:100%;opacity:0;}}
.hod-stick-flash{position:absolute;inset:0;background:radial-gradient(circle,rgba(255,255,255,.95),transparent 70%);z-index:5;pointer-events:none;animation:stickFlash .55s ease-out forwards;}
@keyframes stickFlash{0%{opacity:0;transform:scale(.3);}30%{opacity:1;}100%{opacity:0;transform:scale(1.6);}}
.hod-stick-stamp{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-14deg);z-index:6;
  font-family:'Anton';font-size:13px;letter-spacing:1px;color:#e8541e;border:2px solid #e8541e;border-radius:6px;
  padding:2px 6px;background:rgba(255,240,225,.9);pointer-events:none;animation:stickStamp 1s ease-out forwards;white-space:nowrap;}
@keyframes stickStamp{0%{opacity:0;transform:translate(-50%,-50%) rotate(-14deg) scale(2.2);}25%{opacity:1;transform:translate(-50%,-50%) rotate(-14deg) scale(1);}75%{opacity:1;}100%{opacity:0;}}
.hod-alb-stickbar{background:rgba(255,209,102,.14);border:1px solid var(--gold);border-radius:10px;padding:8px 12px;
  font-size:13px;color:var(--amber);margin:8px auto;max-width:380px;}
.hod-alb-stickbar b{color:#fff;}
.hod-alb-stickbar button{background:none;border:none;color:var(--muted);text-decoration:underline;cursor:pointer;font-size:12px;margin-left:6px;}
.hod-alb-search-wrap{margin:8px auto;max-width:360px;}
.hod-alb-search{width:100%;box-sizing:border-box;background:#fff;border:2px solid var(--gold-warm);border-radius:10px;
  padding:9px 14px;font-family:'Oswald';font-size:14px;color:#1a1a1a;}
.hod-alb-search:focus{outline:none;border-color:var(--orange);}
.hod-alb-num{position:absolute;top:3px;left:4px;z-index:3;font-family:'Anton';font-size:9px;color:var(--gold-d);
  background:rgba(255,240,220,.7);border-radius:4px;padding:0 3px;line-height:1.3;}
.hod-alb-cell.empty .hod-alb-num{color:var(--gold-warm);background:rgba(0,0,0,.25);}
.hod-alb-numinfo{max-width:380px;margin:6px auto;background:rgba(255,209,102,.12);border:1px solid var(--gold-warm);
  border-radius:8px;padding:7px 12px;font-size:13px;color:var(--amber);}
.hod-alb-numinfo b{color:#fff;}
/* ekipni barvni trak na kartici */
.hod-alb-ribbon{position:absolute;top:0;right:0;width:6px;height:100%;z-index:2;opacity:.9;}
.hod-alb-cell.empty .hod-alb-ribbon{opacity:.5;}
.hod-alb-teamtag{position:relative;z-index:1;font-family:'Bebas Neue';font-size:9px;letter-spacing:1px;
  color:var(--gold-d);line-height:1;margin-top:1px;}
.hod-alb-cell.empty .hod-alb-teamtag{color:rgba(180,170,150,.5);}
.hod-alb-team-h{padding-left:8px;}
.hod-alb-team-nm{font-family:'Bebas Neue';letter-spacing:1px;}
.hod-alb-cell.filled{cursor:pointer;}
/* povečana kartica z obračanjem */
.hod-cd-overlay{align-items:center;}
/* NAGRADE */
.hod-rew-dot{position:absolute;top:-4px;right:-4px;width:14px;height:14px;border-radius:50%;background:var(--red);border:2px solid #fff;}
.hod-earn-info{max-width:480px;margin:0 auto 18px;background:rgba(12,16,26,.88);border:1px solid var(--gold-warm);
  border-radius:10px;padding:11px 15px;font-family:'Oswald';font-size:12.5px;line-height:1.55;color:#f0e6d2;text-align:left;
  box-shadow:0 4px 14px rgba(0,0,0,.4);}
.hod-earn-info b{color:var(--gold);}
.hod-rew-card{display:flex;align-items:center;gap:12px;background:#13192a;border:1px solid var(--gold-warm);
  border-radius:12px;padding:12px 14px;margin:0 auto 10px;max-width:460px;}
.hod-rew-medal{font-size:28px;flex:none;}
.hod-rew-info{flex:1;text-align:left;min-width:0;}
.hod-rew-lbl{font-family:'Anton';font-size:15px;color:#fff;}
.hod-rew-sub{font-family:'Oswald';font-size:11px;color:var(--muted);}
.hod-rew-amt{font-family:'Anton';font-size:14px;color:var(--gold);flex:none;}
.hod-rew-claim{font-size:13px;padding:7px 14px;flex:none;}
.hod-wins-card{background:#13192a;border:1px solid var(--gold-warm);border-radius:12px;padding:14px;max-width:460px;margin:0 auto;}
.hod-wins-title{font-family:'Anton';font-size:16px;color:var(--amber);margin-bottom:10px;}
.hod-wins-row{display:flex;gap:16px;justify-content:center;}
.hod-wins-stat b{font-family:'Anton';font-size:22px;color:#fff;display:block;}
.hod-wins-stat span{font-family:'Oswald';font-size:11px;color:var(--muted);}
/* sekcijski naslov */
.hod-rew-secth{font-family:'Anton';font-size:16px;color:var(--amber);max-width:480px;margin:18px auto 8px;text-align:left;
  border-bottom:1px solid var(--gold-warm);padding-bottom:4px;}
/* kapica */
.hod-cap-card{background:rgba(12,16,26,.9);border:1px solid var(--gold-warm);border-radius:12px;padding:14px;max-width:480px;margin:0 auto 6px;}
.hod-cap-h{font-family:'Anton';font-size:15px;color:var(--gold);margin-bottom:8px;}
.hod-cap-lbl{font-family:'Oswald';font-size:13px;color:#f0e6d2;margin-bottom:4px;}
.hod-cap-lbl b{color:#fff;}
.hod-cap-bar{height:9px;background:rgba(255,255,255,.1);border-radius:5px;overflow:hidden;}
.hod-cap-fill{height:100%;background:linear-gradient(90deg,var(--gold-deep),var(--gold));border-radius:5px;transition:width .4s;}
.hod-cap-fill.alt{background:linear-gradient(90deg,#2a7a99,#4cc9f0);}
.hod-cap-hint{font-family:'Oswald';font-size:11px;color:var(--muted);margin-top:8px;line-height:1.4;}
/* naloge */
.hod-tasks-list{max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:8px;}
.hod-task-row{display:flex;align-items:center;gap:11px;background:rgba(12,16,26,.85);border:1px solid var(--line);
  border-radius:10px;padding:9px 12px;}
.hod-task-row.done{border-color:var(--green);}
.hod-task-ico{font-size:20px;flex:none;}
.hod-task-info{flex:1;min-width:0;text-align:left;}
.hod-task-lbl{font-family:'Oswald';font-weight:600;font-size:13px;color:#f0e6d2;}
.hod-task-bar{height:6px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;margin-top:4px;}
.hod-task-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--gold));border-radius:4px;transition:width .4s;}
.hod-task-amt{flex:none;}
.hod-task-prog{font-family:'Anton';font-size:13px;color:var(--muted);}
.hod-task-done{font-family:'Oswald';font-size:12px;color:var(--green);font-weight:600;}
.hod-task-claim{font-size:12px;padding:6px 11px;}
/* MARKET */
.hod-mkt-tabs{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:8px 0 12px;}
.hod-mkt-tab{font-family:'Oswald';font-weight:600;font-size:13px;background:#13192a;border:1px solid var(--gold-warm);
  color:var(--amber);border-radius:8px;padding:7px 12px;cursor:pointer;}
.hod-mkt-tab.on{background:var(--orange);color:#fff;border-color:var(--orange);}
.hod-mkt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.hod-mkt-card{position:relative;background:#fff;border:2px solid var(--gold-warm);border-radius:10px;
  padding:10px 8px;text-align:center;overflow:hidden;display:flex;flex-direction:column;align-items:center;gap:3px;}
.hod-mkt-card.rar-legendary{border-color:#ffd166;}
.hod-mkt-card.rar-moment{border-color:#ff4d6d;}
.hod-mkt-card.rar-lowlight{border-color:#6b7280;}
.hod-mkt-card.rar-slovenski{border-color:#0073e6;}
.hod-mkt-card.rar-rare{border-color:#9ec5e8;}
.hod-mkt-photo{width:60px;height:60px;border-radius:50%;border:2px solid var(--orange);overflow:hidden;position:relative;margin-top:2px;}
.hod-mkt-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 8%;}
.hod-mkt-nm{font-family:'Anton';font-size:12px;color:var(--navy);line-height:1.05;}
.hod-mkt-meta{font-family:'Oswald';font-size:10px;color:var(--gold-d);}
.hod-mkt-seller{font-size:9px;color:#888;}
.hod-mkt-want{font-size:9px;color:#4a7fa5;font-style:italic;line-height:1.1;}
.hod-mkt-price{font-family:'Anton';font-size:15px;color:var(--gold-deep);margin:2px 0;}
/* album header z gumbom nazaj */
.hod-alb-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.hod-alb-backtop{font-family:'Oswald';font-weight:600;font-size:13px;background:linear-gradient(180deg,#3a4660,#28324a);
  color:#fff;border:2px solid var(--gold-warm);border-radius:10px;padding:7px 14px;cursor:pointer;white-space:nowrap;
  box-shadow:0 3px 10px rgba(0,0,0,.4);transition:transform .12s;}
.hod-alb-backtop:hover{transform:translateX(-2px);border-color:var(--orange);}
@media(max-width:560px){
  .hod-alb-header{justify-content:center;}
  .hod-alb-header .hod-stage-label{order:-1;width:100%;text-align:center;}
  .hod-alb-header span{display:none;}
}
/* mini-ekipa pod nenalepljenimi (lepljenje na mestu) */
.hod-mini-wrap{margin-top:16px;background:rgba(255,209,102,.06);border:1px solid rgba(255,209,102,.22);border-radius:12px;padding:12px;animation:miniIn .25s ease;}
@keyframes miniIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.hod-mini-h{font-family:'Anton';font-size:15px;color:var(--amber);margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.hod-mini-h span{font-family:'Oswald';font-size:11px;color:var(--muted);font-weight:400;}
.hod-alb-cell.mini-cell{cursor:default;}
.hod-alb-cell.mini-target{cursor:pointer;animation:miniTargetPulse 1s ease-in-out infinite;border-color:var(--red)!important;}
@keyframes miniTargetPulse{0%,100%{box-shadow:0 0 0 0 rgba(220,60,60,.5);}50%{box-shadow:0 0 0 6px rgba(220,60,60,0);}}
.hod-alb-cell.mini-active{outline:2px solid var(--gold);outline-offset:1px;}
/* peel/žig animacija ob prilepitvi */
.hod-alb-cell.mini-peel{animation:miniPeel .55s cubic-bezier(.34,1.56,.5,1);}
@keyframes miniPeel{0%{transform:scale(0) rotate(-12deg);opacity:0;}55%{transform:scale(1.12) rotate(3deg);}100%{transform:scale(1) rotate(0);opacity:1;}}
.hod-stick-stamp{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);width:30px;height:30px;border-radius:50%;background:rgba(46,204,113,.92);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;animation:stampIn .5s ease .12s forwards;z-index:5;}
@keyframes stampIn{0%{transform:translate(-50%,-50%) scale(0) rotate(-30deg);}70%{transform:translate(-50%,-50%) scale(1.25) rotate(8deg);}100%{transform:translate(-50%,-50%) scale(1) rotate(0);opacity:.92;}}
.hod-mini-season{font-family:'Oswald';font-size:12px;font-weight:600;color:var(--gold-deep);margin:10px 0 5px;letter-spacing:.5px;border-bottom:1px solid rgba(255,209,102,.15);padding-bottom:3px;}
.hod-mini-season.target-season{color:#fff;background:rgba(220,60,60,.25);border:1px solid rgba(220,60,60,.5);border-radius:6px;padding:4px 8px;}
.hod-alb-emptymark{font-size:20px;opacity:.6;}
/* lebdeči gumb nenalepljene */
.hod-unstuck-fab{position:fixed;right:14px;bottom:20px;z-index:250;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:1px;width:64px;height:64px;border-radius:50%;border:2px solid var(--gold-warm);
  background:linear-gradient(180deg,#e8541e,#c43d12);color:#fff;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.5);
  font-family:'Oswald';animation:fabPulse 2.4s ease-in-out infinite;}
.hod-unstuck-fab:hover{transform:scale(1.06);}
.hod-fab-ico{font-size:18px;line-height:1;}
.hod-fab-count{font-family:'Anton';font-size:15px;line-height:1;}
.hod-fab-lbl{font-size:6.5px;letter-spacing:.5px;text-transform:uppercase;opacity:.9;}
@keyframes fabPulse{0%,100%{box-shadow:0 6px 18px rgba(0,0,0,.5);}50%{box-shadow:0 6px 24px rgba(232,84,30,.8);}}
.hod-totop-fab{position:fixed;right:20px;bottom:94px;z-index:250;display:flex;align-items:center;justify-content:center;
  width:48px;height:48px;border-radius:50%;border:2px solid var(--gold-warm);background:rgba(20,26,42,.92);
  color:var(--amber);cursor:pointer;font-size:22px;font-family:'Anton';box-shadow:0 4px 14px rgba(0,0,0,.5);}
.hod-totop-fab:hover{transform:scale(1.08);border-color:var(--orange);}
.hod-cd-wrap{display:flex;flex-direction:column;align-items:center;}
.hod-cd-flip{width:260px;height:368px;perspective:1200px;cursor:pointer;}
.hod-cd-inner{position:relative;width:100%;height:100%;transition:transform .6s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d;}
.hod-cd-flip.flipped .hod-cd-inner{transform:rotateY(180deg);}
.hod-cd-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:18px;overflow:hidden;
  box-shadow:0 18px 50px rgba(0,0,0,.7);}
.hod-cd-front{border:3px solid var(--gold-warm);
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:0;text-align:center;}
.hod-cd-front.rar-legendary{border-color:#ffd166;box-shadow:0 0 30px rgba(255,209,102,.6),0 18px 50px rgba(0,0,0,.7);}
.hod-cd-front.rar-rare{border-color:#9ec5e8;}
.hod-cd-front.rar-moment{border-color:#ff4d6d;box-shadow:0 0 30px rgba(255,77,109,.6),0 18px 50px rgba(0,0,0,.7);}
.hod-cd-front.rar-lowlight{border-color:#6b7280;box-shadow:0 0 30px rgba(107,114,128,.5),0 18px 50px rgba(0,0,0,.7);}
.hod-cd-front.rar-slovenski{border-color:#0073e6;box-shadow:0 0 30px rgba(0,115,230,.6),0 18px 50px rgba(0,0,0,.7);}
/* diagonalno ozadje v klubskih barvah */
.hod-cd-bg{position:absolute;inset:0;z-index:0;overflow:hidden;}
.hod-cd-bg-base{position:absolute;inset:0;background:var(--tc1);}
.hod-cd-bg-diag{position:absolute;inset:0;background:var(--tc2);clip-path:polygon(0 62%,100% 38%,100% 100%,0 100%);}
.hod-cd-bg-wm{position:absolute;bottom:-22px;right:-8px;font-family:'Anton';font-size:120px;line-height:.8;
  color:rgba(255,255,255,.10);letter-spacing:-6px;pointer-events:none;}
.hod-cd-teamlbl{position:absolute;top:11px;left:0;right:0;text-align:center;font-family:'Bebas Neue';
  font-size:15px;letter-spacing:3px;z-index:2;opacity:.92;}
.hod-cd-num{position:absolute;top:9px;left:11px;font-family:'Anton';font-size:13px;color:#fff;
  background:rgba(0,0,0,.28);border-radius:5px;padding:1px 6px;z-index:3;}
.hod-cd-photo{width:120px;height:120px;border-radius:50%;border:3px solid #fff;overflow:hidden;margin:34px auto 0;
  position:relative;z-index:1;box-shadow:0 4px 16px rgba(0,0,0,.35);}
.hod-cd-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 8%;}
/* svetla plošča s podatki (berljivost čez barvno ozadje) */
.hod-cd-plate{position:relative;z-index:1;margin:10px 10px 0;background:rgba(244,234,210,.95);
  border-radius:12px;padding:10px 8px 12px;box-shadow:0 4px 14px rgba(0,0,0,.25);}
.hod-cd-name{font-family:'Anton';font-size:19px;color:var(--navy);line-height:1.05;}
.hod-cd-team-szn{font-family:'Bebas Neue';font-size:12px;letter-spacing:1px;color:var(--gold-d);margin:3px 0;}
.hod-cd-rating{font-family:'Anton';font-size:38px;line-height:1;margin:2px 0;}
.hod-cd-stats{display:flex;gap:14px;justify-content:center;margin-top:2px;}
.hod-cd-stats b{font-family:'Anton';font-size:16px;color:var(--navy);display:block;}
.hod-cd-stats span{font-family:'Oswald';font-size:9px;color:var(--gold-d);letter-spacing:1px;}
.hod-cd-hint{position:absolute;bottom:8px;left:0;right:0;font-family:'Oswald';font-size:10px;color:rgba(255,255,255,.85);z-index:2;}
.hod-cd-back{transform:rotateY(180deg);background:
  linear-gradient(180deg,rgba(10,12,20,.82),rgba(10,12,20,.92)),
  linear-gradient(160deg,var(--tc1,#1a2236),var(--tc2,#0d1119));
  border:3px solid var(--gold-warm);
  display:flex;flex-direction:column;align-items:center;padding:22px 16px;}
.hod-cd-back-title{font-family:'Anton';font-size:18px;letter-spacing:3px;color:var(--amber);text-shadow:0 1px 3px rgba(0,0,0,.6);}
.hod-cd-back-nm{font-family:'Bebas Neue';font-size:16px;letter-spacing:1px;color:#fff;margin-bottom:14px;}
.hod-cd-career{width:100%;display:flex;flex-direction:column;gap:8px;overflow-y:auto;}
.hod-cd-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.08);border-radius:8px;padding:7px 10px;}
.hod-cd-dot{width:14px;height:14px;border-radius:50%;flex:none;border:1px solid rgba(255,255,255,.4);}
.hod-cd-team{font-family:'Anton';font-size:15px;color:#fff;flex:none;min-width:46px;text-shadow:0 1px 2px rgba(0,0,0,.5);}
.hod-cd-per{font-family:'Oswald';font-size:13px;color:#ffe0b8;margin-left:auto;text-shadow:0 1px 2px rgba(0,0,0,.5);}
/* sezonske podtabe */
.hod-szn-tabs{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin:4px 0 12px;}
.hod-szn-tab{position:relative;font-family:'Oswald';font-weight:600;font-size:12px;background:#13192a;
  border:1px solid var(--gold-warm);color:var(--amber);border-radius:7px;padding:5px 9px;cursor:pointer;}
.hod-szn-tab span{display:block;font-size:9px;color:var(--muted);}
.hod-szn-tab.on{background:var(--orange);color:#fff;border-color:var(--orange);}
.hod-szn-tab.on span{color:rgba(255,255,255,.85);}
.hod-szn-group{margin-bottom:10px;}
.hod-szn-head{font-family:'Anton';font-size:15px;color:var(--amber);margin:10px 0 6px;border-bottom:1px solid var(--gold-warm);padding-bottom:3px;}
/* ime na praznem polju (orientacija) */
.hod-alb-ghost{position:relative;z-index:1;font-family:'Oswald';font-weight:600;font-size:8.5px;
  color:rgba(180,170,150,.55);line-height:1.1;padding:0 3px;text-align:center;}
/* moment detail */
.hod-moment-card{background:linear-gradient(180deg,#2a1820,#1a1015);border:2px solid #ff4d6d;border-radius:18px;
  padding:22px;max-width:330px;width:90%;text-align:center;box-shadow:0 14px 50px rgba(0,0,0,.7),0 0 30px rgba(255,77,109,.4);color:#fff;}
.hod-moment-badge{font-family:'Anton';font-size:12px;letter-spacing:1px;color:#ff4d6d;margin-bottom:12px;}
.hod-moment-photo{width:90px;height:90px;border-radius:50%;border:3px solid #ff4d6d;overflow:hidden;margin:0 auto 8px;box-shadow:0 0 20px rgba(255,77,109,.6);position:relative;}
.hod-moment-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 8%;display:block;}
.hod-moment-val{font-family:'Anton';font-size:44px;color:#ff4d6d;line-height:1;}
.hod-moment-nm{font-family:'Anton';font-size:22px;color:#fff;margin-top:4px;}
.hod-moment-mom{font-family:'Bebas Neue';font-size:15px;letter-spacing:1px;color:var(--amber);margin:4px 0 12px;}
.hod-moment-desc{font-family:'Oswald';font-size:13px;color:#d8c8b8;line-height:1.5;margin-bottom:16px;}
/* ===== FULL-BLEED FLIP MOMENTNA KARTICA ===== */
.hod-mom-overlay{display:flex;align-items:center;justify-content:center;}
.hod-mom-wrap{display:flex;flex-direction:column;align-items:center;}
.hod-mom-flip{perspective:1400px;cursor:pointer;}
.hod-mom-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;-webkit-transform-style:preserve-3d;transition:transform .7s cubic-bezier(.4,.2,.2,1);}
.hod-mom-flip.flipped .hod-mom-inner{transform:rotateY(180deg);-webkit-transform:rotateY(180deg);}
.hod-mom-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:18px;overflow:hidden;-webkit-transform:translateZ(0);}
/* odprta slika — cela, brez popačenja in rezanja (kartica je istega razmerja) */
.hod-mom-fullimg-contain{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.hod-mom-front{transform:rotateY(0deg);-webkit-transform:rotateY(0deg);border:4px solid #ffd166;box-shadow:0 16px 50px rgba(0,0,0,.7),0 0 34px rgba(255,209,102,.45);background:#1a0a2e;}
.hod-mom-flip.lowlight .hod-mom-front{border-color:#8a9099;box-shadow:0 16px 50px rgba(0,0,0,.8),0 0 30px rgba(138,144,153,.4);background:#0a0b0e;}
.hod-mom-flip.slovenski .hod-mom-front{border-color:#0073e6;box-shadow:0 16px 50px rgba(0,0,0,.7),0 0 34px rgba(0,115,230,.5);background:#0a1426;}
/* slika čez celo kartico — blag zoom skrije tanek rob slike */
.hod-mom-fullimg{position:absolute;width:108%;height:108%;left:-4%;top:-4%;object-fit:cover;object-position:center 40%;}
/* slike z lastnim okvirjem: rahlo povečamo, da lesena podlaga/rob uide čez kartico */
.hod-mom-fullimg.framed{position:absolute;width:118%;height:118%;left:-9%;top:-9%;object-fit:cover;object-position:center 30%;}
/* per-sliko fina nastavitev fokusa (glava zgoraj) */
.hod-mom-fullimg.framed.foc-top{object-position:center 14%;}
.hod-mom-fullimg.framed.foc-high{object-position:center 22%;}
.hod-mom-fallback{position:absolute;inset:0;}
.hod-mom-fallback img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 12%;}
/* rdeč utripajoč trak za lowlight */
.hod-mom-warntop{position:absolute;top:0;left:0;right:0;height:5px;background:transparent;z-index:3;}
.hod-mom-flip.lowlight .hod-mom-warntop{background:#dc3c3c;animation:warnPulse 1.6s ease-in-out infinite;}
@keyframes warnPulse{0%,100%{opacity:1;}50%{opacity:.35;}}
/* napis zgoraj */
.hod-mom-badge{position:absolute;top:0;left:0;right:0;z-index:2;padding:11px 0 16px;text-align:center;
  font-family:'Anton';font-size:13px;letter-spacing:2px;color:#ffd166;
  background:linear-gradient(180deg,rgba(0,0,0,.8),transparent);}
.hod-mom-flip.lowlight .hod-mom-badge{color:#f0f0f0;padding-top:13px;}
.hod-mom-flip.slovenski .hod-mom-badge{color:#4da3ff;}
/* napis spodaj čez sliko */
.hod-mom-bottom{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:40px 16px 18px;text-align:center;
  background:linear-gradient(0deg,rgba(8,4,16,.96),rgba(8,4,16,.6) 55%,transparent);}
.hod-mom-flip.lowlight .hod-mom-bottom{background:linear-gradient(0deg,rgba(5,5,8,.97),rgba(5,5,8,.6) 55%,transparent);}
.hod-mom-val{font-family:'Anton';font-size:42px;line-height:1;color:#ffd166;text-shadow:0 2px 8px rgba(0,0,0,.6);}
.hod-mom-flip.lowlight .hod-mom-val{color:#dc3c3c;}
.hod-mom-flip.slovenski .hod-mom-val{color:#4da3ff;}
.hod-mom-flip.slovenski .hod-mom-sub{color:#9ec5e8;}
.hod-mom-nm{font-family:'Anton';font-size:20px;color:#fff;margin-top:3px;text-shadow:0 2px 6px rgba(0,0,0,.7);}
.hod-mom-sub{font-family:'Oswald';font-size:11px;letter-spacing:1px;color:#ffd166;margin-top:3px;}
.hod-mom-flip.lowlight .hod-mom-sub{color:#b0b6bf;}
.hod-mom-flip-hint{position:absolute;bottom:6px;left:0;right:0;z-index:3;text-align:center;
  font-family:'Oswald';font-size:10px;color:rgba(255,255,255,.6);}
/* HRBTNA STRAN — zgodba */
.hod-mom-back{transform:rotateY(180deg);-webkit-transform:rotateY(180deg);border:4px solid #ffd166;
  background:linear-gradient(160deg,#241830,#0d0816);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 22px;text-align:center;}
.hod-mom-flip.lowlight .hod-mom-back{border-color:#8a9099;background:linear-gradient(160deg,#1c1f26,#0a0b0e);}
.hod-mom-flip.slovenski .hod-mom-back{border-color:#0073e6;background:linear-gradient(160deg,#10243f,#0a1426);}
.hod-mom-flip.slovenski .hod-mom-back-badge{color:#4da3ff;}
.hod-mom-flip.slovenski .hod-mom-back-mom{color:#4da3ff;}
.hod-mom-back-badge{font-family:'Anton';font-size:12px;letter-spacing:2px;color:#ffd166;margin-bottom:14px;}
.hod-mom-flip.lowlight .hod-mom-back-badge{color:#b0b6bf;}
.hod-mom-back-title{font-family:'Anton';font-size:24px;color:#fff;line-height:1.05;}
.hod-mom-back-mom{font-family:'Bebas Neue';font-size:18px;letter-spacing:1px;color:#ffd166;margin:6px 0 2px;}
.hod-mom-flip.lowlight .hod-mom-back-mom{color:#dc3c3c;}
.hod-mom-back-meta{font-family:'Oswald';font-size:11px;letter-spacing:1px;color:var(--muted);margin-bottom:16px;}
.hod-mom-back-desc{font-family:'Oswald';font-size:14px;line-height:1.6;color:#e8ddc8;}
/* lowlight (zloglasni moment) — temno sivo namesto rdeče-zlato */
.hod-moment-card.lowlight{background:linear-gradient(180deg,#1c1f26,#0e1014);border-color:#6b7280;
  box-shadow:0 14px 50px rgba(0,0,0,.8),0 0 24px rgba(107,114,128,.4);}
.hod-moment-card.lowlight .hod-moment-badge{color:#9ca3af;}
.hod-moment-card.lowlight .hod-moment-photo{border-color:#6b7280;box-shadow:0 0 18px rgba(107,114,128,.5);filter:grayscale(.4);}
.hod-moment-card.lowlight .hod-moment-val{color:#9ca3af;}
.hod-alb-rt{font-family:'Anton';font-size:14px;color:var(--orange);position:relative;z-index:1;line-height:1;}
/* paket odpiranje */
.hod-pack-card{background:linear-gradient(180deg,#2e3340,#23262f);border:2px solid var(--gold);border-radius:18px;
  padding:22px 24px;max-width:340px;width:90%;text-align:center;box-shadow:0 14px 50px rgba(0,0,0,.7);color:#fff;}
.hod-pack-h{font-family:'Anton';font-size:20px;letter-spacing:1px;color:var(--gold);margin-bottom:14px;}
.hod-pack-stage{min-height:240px;display:flex;align-items:center;justify-content:center;}
.hod-pack-reveal{background:var(--card-tex);background-size:cover;border:3px solid var(--gold-warm);border-radius:14px;
  padding:16px 12px;width:170px;position:relative;overflow:hidden;animation:packFlip .5s cubic-bezier(.3,1.2,.5,1);}
.hod-pack-reveal::after{content:'';position:absolute;inset:0;background:rgba(244,234,210,.18);pointer-events:none;}
.hod-pack-reveal.rar-rare{border-color:#9ec5e8;box-shadow:0 0 20px rgba(158,197,232,.5);}
.hod-pack-reveal.rar-legendary{border-color:#ffd166;box-shadow:0 0 28px rgba(255,209,102,.7);}
@keyframes packFlip{0%{transform:rotateY(90deg) scale(.8);opacity:0;}100%{transform:rotateY(0) scale(1);opacity:1;}}
.hod-pack-new{position:relative;z-index:2;font-family:'Anton';font-size:13px;color:#fff;background:var(--orange);border-radius:6px;display:inline-block;padding:1px 10px;margin-bottom:6px;}
.hod-pack-dup{position:relative;z-index:2;font-family:'Oswald';font-size:10px;color:var(--gold-d);margin-bottom:6px;}
.hod-pack-photo{position:relative;z-index:2;width:74px;height:74px;border-radius:50%;margin:0 auto 7px;overflow:hidden;border:3px solid var(--orange);}
.hod-pack-rar{position:relative;z-index:2;font-family:'Bebas Neue';font-size:13px;letter-spacing:1px;}
.hod-pack-nm{position:relative;z-index:2;font-family:'Anton';font-size:16px;color:var(--navy);line-height:1.05;margin-top:2px;}
.hod-pack-meta{position:relative;z-index:2;font-family:'Oswald';font-weight:600;font-size:9px;color:var(--gold-d);text-transform:uppercase;letter-spacing:.5px;}
.hod-pack-rt{position:relative;z-index:2;font-family:'Anton';font-size:30px;line-height:1;margin-top:4px;}
.hod-pack-dots{display:flex;gap:6px;justify-content:center;margin-top:12px;}
.hod-pack-dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.2);}
.hod-pack-dot.on{background:var(--amber);}
.hod-pack-dot.done{background:var(--orange);}
/* album top vrstica + tabi + trgovina */
.hod-alb-top{display:flex;justify-content:space-between;align-items:center;max-width:360px;margin:6px auto 4px;
  font-family:'Oswald';font-size:13px;color:var(--ink);gap:10px;}
.hod-alb-top b{font-family:'Anton';color:var(--amber);font-size:17px;}
.hod-alb-coins,.hod-alb-packs{background:#161b2a;border:1px solid var(--gold-warm);border-radius:10px;padding:4px 12px;}
.hod-alb-daily{font-family:'Oswald';font-size:13px;color:var(--green);margin:6px 0;}
.hod-alb-tabsmain{display:flex;gap:6px;justify-content:center;margin:10px 0;flex-wrap:wrap;}
.hod-alb-tabm{font-family:'Bebas Neue';font-size:15px;letter-spacing:1px;background:#161b2a;border:1px solid var(--gold-warm);
  color:var(--amber);border-radius:9px;padding:7px 14px;cursor:pointer;}
.hod-alb-tabm.big{font-size:20px;padding:11px 22px;border-width:2px;box-shadow:0 3px 0 rgba(0,0,0,.3);font-weight:600;}
.hod-alb-tabm.big.on{box-shadow:0 3px 0 #a8470d;}
.hod-alb-tabm.on{background:var(--orange);color:#fff;border-color:var(--orange);}
.hod-alb-tab.moment.on{background:#ff4d6d;border-color:#ff4d6d;}
.hod-alb-cell.rar-moment{border-color:#ff4d6d;box-shadow:0 0 14px rgba(255,77,109,.6);}
.hod-alb-cell.rar-lowlight{border-color:#6b7280;box-shadow:0 0 12px rgba(107,114,128,.5);}
.hod-alb-cell.rar-slovenski{border-color:#0073e6;box-shadow:0 0 14px rgba(0,115,230,.6);}
.hod-alb-cells.stick .hod-alb-cell{cursor:pointer;}
.hod-alb-cells.stick .hod-alb-cell:hover{transform:translateY(-3px);border-color:var(--orange);}
.hod-alb-dup{position:absolute;top:3px;right:3px;z-index:3;background:var(--orange);color:#fff;font-family:'Anton';
  font-size:10px;border-radius:6px;padding:0 5px;}
.hod-alb-stick{position:relative;z-index:1;font-family:'Bebas Neue';font-size:10px;letter-spacing:1px;color:var(--orange);margin-top:2px;}
.hod-shop-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:10px 0;}
.hod-shop-card{background:#161b2a;border:1px solid var(--gold-warm);border-radius:14px;padding:16px;width:150px;
  text-align:center;box-shadow:0 6px 18px rgba(0,0,0,.5);}
.hod-shop-ic{font-size:32px;}
.hod-shop-nm{font-family:'Bebas Neue';font-size:16px;letter-spacing:1px;color:var(--amber);margin:4px 0;}
.hod-shop-pr{font-family:'Oswald';font-weight:600;font-size:14px;color:var(--ink);margin-bottom:10px;}
.hod-shop-pr span{color:var(--green);font-size:11px;}
.hod-btn.gold{background:linear-gradient(180deg,#ff7038,#e8541e);color:#fff;box-shadow:0 5px 0 #a83a13,0 8px 18px rgba(0,0,0,.4);}
.hod-shop-sell{background:#161b2a;border:1px solid var(--gold-warm);border-radius:14px;padding:14px;max-width:360px;margin:12px auto 0;text-align:center;}
.hod-shop-sell-h{font-family:'Bebas Neue';font-size:16px;letter-spacing:1px;color:var(--amber);margin-bottom:6px;}
.hod-shop-sell-d{font-size:13px;color:var(--ink);margin-bottom:10px;}
.hod-shop-sell-d b{color:var(--amber);}
/* nova trgovina */
.hod-shop-h{font-family:'Anton';font-size:16px;color:#fff;margin:16px auto 2px;max-width:480px;text-align:left;}
.hod-shop-sub2{font-size:11px;color:var(--muted);max-width:480px;margin:0 auto 6px;text-align:left;font-style:italic;}
.hod-shop-back{font-family:'Oswald';font-size:13px;color:var(--gold);cursor:pointer;max-width:480px;margin:0 auto 8px;text-align:left;}
.hod-shop-back:hover{text-decoration:underline;}
.hod-shop-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.hod-shop-card.pick{cursor:pointer;transition:.15s;}
.hod-shop-card.pick:hover{border-color:var(--orange);transform:translateY(-2px);}
.hod-shop-card.pick.dis{opacity:.45;pointer-events:none;}
.hod-shop-card.special{width:165px;}
.hod-shop-card.gold-card{border-color:#ffd60a;box-shadow:0 6px 18px rgba(0,0,0,.5),0 0 16px rgba(255,214,10,.25);}
.hod-shop-teams{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;max-width:480px;margin:0 auto;}
.hod-shop-team{font-family:'Oswald';font-weight:600;font-size:13px;background:#161b2a;border:1px solid var(--gold-warm);color:var(--ink);border-radius:9px;padding:9px 13px;cursor:pointer;transition:.12s;}
.hod-shop-team:hover{border-color:var(--orange);background:#1d2438;transform:translateY(-1px);}
.hod-shop-team.dis{opacity:.4;pointer-events:none;}
.hod-shop-offer{background:linear-gradient(135deg,#2a1838,#3a2050);border:2px solid #b388ff;border-radius:16px;padding:16px;max-width:420px;margin:6px auto 14px;text-align:center;box-shadow:0 0 22px rgba(179,136,255,.3);animation:offerGlow 2.4s ease-in-out infinite;}
@keyframes offerGlow{0%,100%{box-shadow:0 0 18px rgba(179,136,255,.25);}50%{box-shadow:0 0 30px rgba(179,136,255,.5);}}
.hod-shop-offer-tag{font-family:'Anton';font-size:11px;letter-spacing:1px;color:#d4b3ff;margin-bottom:6px;}
.hod-shop-offer-nm{font-family:'Bebas Neue';font-size:22px;letter-spacing:1px;color:#fff;}
.hod-shop-offer-pr{font-family:'Oswald';font-size:15px;color:var(--ink);margin:6px 0 10px;}
.hod-shop-offer-pr s{color:var(--muted);font-size:13px;}
.hod-shop-offer-pr b{color:#ffd166;font-size:18px;}
.hod-shop-offer-pr span{color:var(--green);font-size:12px;font-weight:700;}
/* PACK OPENING animacije */
.hod-pko-wrap{display:flex;flex-direction:column;align-items:center;padding:16px;width:100%;}
.hod-pko-stage{width:100%;max-width:420px;min-height:240px;display:flex;align-items:center;justify-content:center;position:relative;}
.hod-pko-pack{width:160px;height:226px;border-radius:14px;cursor:pointer;position:relative;
  background:linear-gradient(150deg,#e8541e,#b03410 60%,#7a2408);border:3px solid var(--amber);
  box-shadow:0 14px 40px rgba(0,0,0,.6),inset 0 2px 10px rgba(255,255,255,.2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  animation:pkoIdle 2.4s ease-in-out infinite;overflow:hidden;}
.hod-pko-pack:active{transform:scale(.96);}
.hod-pko-pack.opening{animation:pkoShake .5s ease-in-out, pkoBurst .35s ease-in .5s forwards;}
@keyframes pkoIdle{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-8px) rotate(1deg);}}
@keyframes pkoShake{0%,100%{transform:rotate(0);}20%{transform:rotate(-5deg) scale(1.04);}40%{transform:rotate(5deg) scale(1.06);}60%{transform:rotate(-4deg) scale(1.07);}80%{transform:rotate(4deg) scale(1.08);}}
@keyframes pkoBurst{0%{transform:scale(1.08);opacity:1;}100%{transform:scale(1.6);opacity:0;}}
.hod-pko-rays{position:absolute;inset:0;opacity:.22;background:repeating-conic-gradient(from 0deg at 50% 50%,#fff 0deg 8deg,transparent 8deg 16deg);}
.hod-pko-tear{position:absolute;top:32px;left:0;right:0;height:0;border-top:2px dashed rgba(255,255,255,.7);}
.hod-pko-logo{font-family:'Anton';font-size:28px;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.5);line-height:.85;text-align:center;position:relative;z-index:1;}
.hod-pko-logo span{color:var(--navy);}
.hod-pko-sub{font-family:'Bebas Neue';font-size:12px;letter-spacing:3px;color:var(--navy);position:relative;z-index:1;}
.hod-pko-tap{font-family:'Oswald';font-size:10px;color:rgba(255,255,255,.85);margin-top:8px;position:relative;z-index:1;letter-spacing:1px;}
.hod-pko-fan{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;opacity:0;pointer-events:none;}
.hod-pko-fan.show{opacity:1;pointer-events:auto;position:relative;inset:auto;width:100%;padding:10px 0;}
.hod-pko-stage:has(.hod-pko-fan.show){min-height:0;height:auto;}
.hod-pko-stage.opened{min-height:0;height:auto;display:block;}
.hod-flip{width:96px;height:138px;perspective:800px;cursor:pointer;flex:none;}
@media(max-width:430px){
  .hod-flip{width:72px;height:104px;}
  .hod-pko-fan.show{gap:5px;}
  .hod-flip-photo{width:36px;height:36px;}
  .hod-flip-rt{font-size:17px;}
  .hod-flip-nm{font-size:9px;}
}
.hod-flip.pop{animation:pkoCardPop .5s cubic-bezier(.2,1.3,.4,1) backwards;}
@keyframes pkoCardPop{0%{transform:translateY(50px) scale(.4);opacity:0;}100%{transform:translateY(0) scale(1);opacity:1;}}
.hod-flip-inner{position:relative;width:100%;height:100%;transition:transform .6s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d;}
.hod-flip.flipped .hod-flip-inner{transform:rotateY(180deg);}
.hod-flip-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:10px;overflow:hidden;}
.hod-flip-back{background:linear-gradient(150deg,#e8541e,#c43d12);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;}
.hod-flip-back::after{content:'HOD';font-family:'Anton';font-size:20px;color:#fff;opacity:.85;}
.hod-flip-wreath{position:absolute;width:62px;height:62px;border-radius:50%;border:2px solid var(--gold-d);opacity:.4;}
.hod-flip-front{transform:rotateY(180deg);background-color:#f4ead2;background-image:var(--card-tex);background-size:cover;background-blend-mode:normal;border:2px solid var(--gold-warm);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px;text-align:center;}
.hod-flip-front::after{content:'';position:absolute;inset:0;background:rgba(244,234,210,.08);}
.hod-flip-rays-top{height:8px;width:100%;position:absolute;top:0;left:0;z-index:2;background:repeating-linear-gradient(125deg,var(--orange) 0 8px,#d8481a 8px 16px);}
.hod-flip-photo{width:46px;height:46px;border-radius:50%;border:2px solid var(--orange);margin:6px auto 4px;overflow:hidden;position:relative;z-index:1;}
.hod-flip-nm{font-family:'Anton';font-size:11px;color:var(--navy);line-height:1;position:relative;z-index:1;}
.hod-flip-rt{font-family:'Anton';font-size:22px;line-height:1;margin-top:2px;position:relative;z-index:1;}
.hod-flip-rar{font-family:'Bebas Neue';font-size:9px;letter-spacing:.5px;position:relative;z-index:1;}
.hod-flip-new{position:absolute;top:10px;right:4px;z-index:3;font-family:'Anton';font-size:8px;background:var(--orange);color:#fff;border-radius:4px;padding:0 4px;}
.hod-flip-dup{position:absolute;top:10px;right:4px;z-index:3;font-family:'Anton';font-size:8px;background:var(--gold-d);color:#fff;border-radius:4px;padding:0 4px;}
/* redka */
.hod-flip.rar-rare .hod-flip-front{border-color:#9ec5e8;box-shadow:0 0 16px rgba(158,197,232,.7);}
.hod-flip.rar-rare.flipped{animation:pkoRareGlow 1s ease;}
@keyframes pkoRareGlow{0%{filter:brightness(1);}40%{filter:brightness(1.35) drop-shadow(0 0 14px #9ec5e8);}100%{filter:brightness(1);}}
/* legendarna */
.hod-flip.rar-legendary .hod-flip-front{border-color:#ffd166;box-shadow:0 0 26px rgba(255,209,102,.9);}
.hod-flip.rar-legendary.flipped{animation:pkoLegShake .7s ease;}
@keyframes pkoLegShake{0%{transform:scale(1) rotate(0);}15%{transform:scale(1.15) rotate(-3deg);}30%{transform:scale(1.12) rotate(3deg);}45%{transform:scale(1.14) rotate(-2deg);}100%{transform:scale(1) rotate(0);}}
